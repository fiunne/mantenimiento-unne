<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGM PRO 2026 - Ingeniería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .tab-active { border-bottom: 4px solid #1e40af; color: #1e40af; font-weight: bold; background: #f8fafc; }
        .card-vencida { border-left: 8px solid #ef4444; background: #fff1f2; }
        .card-proxima { border-left: 8px solid #f59e0b; background: #fffbeb; }
        .card-ok { border-left: 8px solid #22c55e; background: #f0fdf4; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 p-2 text-slate-800 font-sans">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[2000] p-4">
        <div class="bg-white p-8 rounded-[40px] shadow-2xl w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-lg">
                <span class="text-white text-4xl font-black">S</span>
            </div>
            <h2 class="font-black text-2xl mb-2 uppercase tracking-tighter">SGM PRO 2026</h2>
            <p class="text-slate-400 text-xs mb-8 font-bold">ACCESO PERSONALIZADO</p>
            <input type="password" id="pin-input" placeholder="INGRESE PIN" class="w-full border-2 p-4 rounded-3xl text-center text-3xl mb-4 outline-none focus:border-blue-500 transition-all">
            <button onclick="verificarAcceso()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-3xl uppercase tracking-widest transition-all">Entrar</button>
        </div>
    </div>

    <div id="loader" class="loading-overlay">
        <div class="w-14 h-14 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-black text-blue-900 animate-pulse uppercase text-[10px] tracking-widest">Sincronizando Datos...</p>
    </div>

    <div id="main-content" class="max-w-4xl mx-auto bg-white rounded-[45px] shadow-2xl p-4 hidden mt-2 mb-10 overflow-hidden">
        
        <div class="flex border-b mb-6 overflow-x-auto no-scrollbar text-[11px] font-black uppercase whitespace-nowrap sticky top-0 bg-white z-10">
            <button onclick="tab('nueva')" id="btn-nueva" class="flex-1 py-5 tab-active transition-all">Nueva OT</button>
            <button onclick="tab('pendientes')" id="btn-pendientes" class="flex-1 py-5 text-slate-400 transition-all">Cerrar OT</button>
            <button onclick="tab('extintores')" id="btn-extintores" class="flex-1 py-5 text-red-500 transition-all">🛡️ Extintores</button>
            <button onclick="tab('historial')" id="btn-historial" class="flex-1 py-5 text-slate-400 transition-all">Historial</button>
        </div>

        <div id="sec-nueva" class="space-y-4 animate-fadeIn">
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[9px] font-black ml-2 uppercase text-slate-400">Tipo Trabajo</label>
                    <select id="n-tipo" class="w-full p-4 bg-slate-50 border rounded-2xl text-xs font-bold focus:ring-2 ring-blue-500 outline-none"><option>Correctivo</option><option>Preventivo</option><option>Mejora</option></select>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black ml-2 uppercase text-slate-400">Especialidad</label>
                    <select id="n-rubro" onchange="checkRefrig()" class="w-full p-4 bg-slate-50 border rounded-2xl text-xs font-bold focus:ring-2 ring-blue-500 outline-none"><option>Electricidad</option><option>General</option><option>Refrigeración</option><option>Herrería</option></select>
                </div>
            </div>
            
            <select id="n-edif" onchange="loadCascada('n-edif','n-sec','n-ubi')" class="w-full p-4 border-2 border-blue-100 rounded-2xl text-xs font-black bg-blue-50 outline-none"></select>
            <select id="n-sec" onchange="filterUbi('n-sec','n-ubi')" class="w-full p-4 border rounded-2xl text-xs font-bold bg-white" disabled><option>Seleccione Sector...</option></select>
            <select id="n-ubi" onchange="autoFill()" class="w-full p-4 border rounded-2xl text-xs font-bold bg-white" disabled><option>Seleccione Ubicación...</option></select>
            
            <div id="div-refrig" class="hidden grid grid-cols-2 gap-3 bg-blue-50 p-4 rounded-3xl border border-blue-100">
                <div class="space-y-1">
                    <label class="text-[9px] font-black uppercase text-blue-400">N° Inventario</label>
                    <input id="n-inv" class="w-full p-3 bg-white border rounded-xl text-xs font-bold" readonly>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black uppercase text-blue-400">Equipo Técnico</label>
                    <input id="n-eq" class="w-full p-3 bg-white border rounded-xl text-xs font-bold" readonly>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input id="n-rep" placeholder="Reportado por..." class="p-4 border rounded-2xl text-xs font-bold bg-slate-50 outline-none">
                <select id="n-tec" class="p-4 border-2 border-yellow-200 rounded-2xl text-xs font-black bg-yellow-50 outline-none">
                    <option value="">Técnico Responsable...</option><option>DSF</option><option>AGL</option><option>MAP</option><option>RRG</option>
                </select>
            </div>
            
            <textarea id="n-desc" placeholder="Detalle la tarea o problema..." class="w-full p-5 border rounded-3xl text-xs font-medium bg-slate-50 outline-none focus:ring-2 ring-blue-500" rows="3"></textarea>
            
            <button onclick="saveOT()" class="w-full bg-blue-700 hover:bg-blue-800 text-white p-5 rounded-[25px] font-black uppercase shadow-xl transform active:scale-95 transition-all">Generar Orden de Trabajo</button>
        </div>

        <div id="sec-pendientes" class="hidden space-y-4">
            <div class="space-y-1">
                <label class="text-[9px] font-black ml-2 uppercase text-green-600">Seleccionar Orden Abierta</label>
                <select id="c-lista" class="w-full p-4 border-2 border-green-100 rounded-2xl text-xs font-black bg-green-50 outline-none"></select>
            </div>

            <div class="p-5 bg-slate-50 rounded-[35px] border-2 border-dashed border-slate-200 space-y-4">
                <p class="text-[10px] font-black text-slate-500 uppercase text-center tracking-widest">Insumos y Materiales</p>
                <div class="grid grid-cols-1 gap-2">
                    <select id="m-rub" onchange="loadG()" class="w-full p-3 border rounded-xl text-[11px] font-bold bg-white"></select>
                    <div class="grid grid-cols-2 gap-2">
                        <select id="m-gru" onchange="loadI()" class="p-3 border rounded-xl text-[11px] font-bold bg-white" disabled><option>Grupo</option></select>
                        <select id="m-ite" class="p-3 border rounded-xl text-[11px] font-bold bg-white" disabled><option>Item</option></select>
                    </div>
                </div>
                <div class="flex gap-3 items-center border-t pt-4">
                    <input type="number" id="m-cant" value="1" min="1" class="w-24 p-4 border-2 border-blue-200 rounded-2xl text-center font-black text-blue-700">
                    <button onclick="addItem()" class="flex-1 bg-slate-800 text-white p-4 rounded-2xl font-black text-xs uppercase shadow-md hover:bg-black transition-all">Añadir Insumo</button>
                </div>
                <div id="cesta" class="space-y-2 max-h-40 overflow-y-auto pr-2"></div>
            </div>

            <textarea id="c-obs" placeholder="Observaciones finales del técnico..." class="w-full p-5 border rounded-3xl text-xs font-medium bg-slate-50 outline-none" rows="3"></textarea>
            
            <button onclick="cerrarOT()" class="w-full bg-green-600 hover:bg-green-700 text-white p-6 rounded-[30px] font-black uppercase shadow-xl transform active:scale-95 transition-all italic">Cerrar Orden y Actualizar Stock</button>
        </div>

        <div id="sec-extintores" class="hidden space-y-4 text-center">
            <div class="flex flex-col gap-3">
                <select id="e-edif" onchange="loadExt()" class="w-full p-5 bg-slate-900 text-white rounded-[25px] font-black text-sm shadow-lg outline-none cursor-pointer"></select>
                <button onclick="downloadOC()" class="w-full bg-red-600 hover:bg-red-700 text-white p-4 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg flex items-center justify-center gap-2">
                    <span>📄 Generar Orden de Compra</span>
                </button>
            </div>
            <div id="e-lista" class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-h-[60vh] overflow-y-auto pr-2 custom-scroll"></div>
        </div>

        <div id="sec-historial" class="hidden space-y-4">
            <div class="relative">
                <input type="text" id="h-search" onkeyup="filterHist()" placeholder="Buscar por OT, Edificio o 'Abierta'..." class="w-full p-5 pl-12 border-2 border-slate-100 rounded-[25px] text-xs font-bold bg-slate-50 outline-none focus:border-blue-300 transition-all">
                <span class="absolute left-5 top-1/2 -translate-y-1/2">🔍</span>
            </div>
            <div id="hist-lista" class="space-y-3 max-h-[70vh] overflow-y-auto pr-2"></div>
        </div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxLGxYOx-emB5Jmyow9y0SRGs05cAiAiq3--tkcAv7JiiDtn83_-sZC7m8CcXtM6yN4/exec"; 
        const PIN_CORRECTO = "4370";
        let dbU = [], dbM = {}, dbE = [], cesta = [], dbH = [];

        function showL(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }

        // --- MANEJO DE SESIÓN PERSISTENTE ---
        window.onload = () => {
            const session = localStorage.getItem('sgm_session');
            if(session === PIN_CORRECTO) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                init();
            }
        };

        function verificarAcceso() {
            const input = document.getElementById('pin-input').value;
            if(input === PIN_CORRECTO) {
                localStorage.setItem('sgm_session', PIN_CORRECTO);
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                init();
            } else {
                alert("PIN INCORRECTO");
                document.getElementById('pin-input').value = "";
            }
        }

        async function init() {
            showL(true);
            try {
                const eds = await fetch(`${URL}?action=getEdificios&token=${PIN_CORRECTO}`).then(r=>r.json());
                ['n-edif','e-edif'].forEach(id => {
                    document.getElementById(id).innerHTML = '<option value="">Seleccionar Edificio...</option>' + eds.map(e=>`<option value="${e}">${e}</option>`).join("");
                });
                dbM = await fetch(`${URL}?action=getMateriales&token=${PIN_CORRECTO}`).then(r=>r.json());
                document.getElementById('m-rub').innerHTML = '<option value="">Seleccionar Rubro de Stock</option>' + Object.keys(dbM).map(x=>`<option value="${x}">${x}</option>`).join("");
            } catch(e) { console.error(e); }
            showL(false);
        }

        function tab(t) {
            ['nueva','pendientes','extintores','historial'].forEach(s => {
                document.getElementById('sec-'+s).classList.toggle('hidden', s!==t);
                document.getElementById('btn-'+s).classList.toggle('tab-active', s===t);
                if(s!==t) document.getElementById('btn-'+s).classList.add('text-slate-400');
            });
            if(t==='pendientes') loadAbiertas();
            if(t==='historial') loadHist();
        }

        // --- LÓGICA EXTINTORES ---
        async function loadExt() {
            const ed = document.getElementById('e-edif').value; if(!ed) return;
            showL(true);
            dbE = await fetch(`${URL}?action=getExtintores&edificio=${encodeURIComponent(ed)}&token=${PIN_CORRECTO}`).then(r=>r.json());
            const list = document.getElementById('e-lista'); list.innerHTML = "";
            const hoy = new Date();
            
            dbE.forEach(x => {
                const partes = x.f_venc.split('/');
                const fv = new Date(partes[2], partes[1]-1, partes[0]);
                const diff = (fv - hoy) / (1000 * 60 * 60 * 24);
                let cls = "card-ok";
                if(diff < 0) cls = "card-vencida"; else if(diff < 30) cls = "card-proxima";
                
                list.innerHTML += `
                <div class="p-5 rounded-[30px] border shadow-sm text-left ${cls} transition-all transform hover:scale-[1.02]">
                    <div class="flex justify-between items-start mb-2">
                        <span class="font-black text-slate-900 text-sm tracking-tighter">${x.unne}</span>
                        <span class="text-[9px] bg-white/80 px-3 py-1 rounded-full border font-black shadow-sm uppercase">N° ${x.serie}</span>
                    </div>
                    <p class="text-[10px] font-bold text-slate-600 mb-1">📍 ${x.sector} - ${x.ubi}</p>
                    <div class="bg-white/40 p-2 rounded-xl text-[10px] font-bold flex justify-between">
                        <span>AGENTE: ${x.tipo}</span>
                        <span>CAPACIDAD: ${x.cap} KG</span>
                    </div>
                    <p class="text-[10px] mt-3 font-black uppercase ${diff<0?'text-red-600':''}">Vencimiento: ${x.f_venc}</p>
                </div>`;
            });
            showL(false);
        }

        function downloadOC() {
            const resumen = {};
            dbE.forEach(x => {
                const partes = x.f_venc.split('/');
                const fv = new Date(partes[2], partes[1]-1, partes[0]);
                if(fv < new Date()) {
                    const clave = `${x.tipo}_${x.cap}`;
                    if(!resumen[clave]) resumen[clave] = { tipo: x.tipo, cap: x.cap, cant: 0 };
                    resumen[clave].cant++;
                }
            });

            if(Object.keys(resumen).length === 0) return alert("NO HAY EXTINTORES VENCIDOS EN ESTE EDIFICIO");
            
            let txt = "ORDEN DE COMPRA Y CARGA - SGM 2026\n";
            txt += "EDIFICIO: " + document.getElementById('e-edif').value + "\n";
            txt += "----------------------------------------\n\n";
            Object.values(resumen).forEach(r => {
                txt += `CANTIDAD: ${r.cant}  |  AGENTE: ${r.tipo}  |  CAPACIDAD: ${r.cap} KG\n`;
            });
            txt += "\n\nFirma Responsable Mantenimiento";
            
            const blob = new Blob([txt], {type: "text/plain"});
            const a = document.createElement("a");
            a.href = window.URL.createObjectURL(blob);
            a.download = "Orden_Compra_" + document.getElementById('e-edif').value + ".txt";
            a.click();
        }

        // --- LÓGICA CIERRE OT ---
        async function loadAbiertas() {
            showL(true);
            const d = await fetch(`${URL}?action=getAbiertas&token=${PIN_CORRECTO}`).then(r=>r.json());
            document.getElementById('c-lista').innerHTML = d.map(o=>`<option value="${o.id}">${o.detalle}</option>`).join("");
            showL(false);
        }

        function loadG() {
            const r = document.getElementById('m-rub').value;
            const g = document.getElementById('m-gru');
            g.innerHTML = '<option>Grupo...</option>' + Object.keys(dbM[r]).map(x=>`<option value="${x}">${x}</option>`).join("");
            g.disabled = false;
        }

        function loadI() {
            const r = document.getElementById('m-rub').value;
            const g = document.getElementById('m-gru').value;
            const i = document.getElementById('m-ite');
            i.innerHTML = '<option>Item...</option>' + dbM[r][g].map(x=>`<option value='${JSON.stringify(x)}'>${x.nombre} (Stock: ${x.stock})</option>`).join("");
            i.disabled = false;
        }

        function addItem() {
            const raw = document.getElementById('m-ite').value; if(!raw || raw.includes('Item')) return;
            const it = JSON.parse(raw);
            const cant = document.getElementById('m-cant').value;
            cesta.push({nombre: it.nombre, cantidad: parseInt(cant), hoja: it.hoja});
            renderCesta();
        }

        function renderCesta() {
            document.getElementById('cesta').innerHTML = cesta.map((x,idx)=>`
            <div class="flex justify-between items-center bg-blue-600 text-white p-3 rounded-2xl text-[10px] font-black">
                <span>${x.cantidad} x ${x.nombre}</span>
                <button onclick="cesta.splice(${idx},1);renderCesta()" class="bg-white text-blue-600 w-6 h-6 rounded-lg font-bold">X</button>
            </div>`).join("");
        }

        async function cerrarOT() {
            const id = document.getElementById('c-lista').value;
            if(!id) return alert("Seleccione una OT para cerrar");
            showL(true);
            const p = { 
                action: 'cerrarOT', 
                token: PIN_CORRECTO, 
                idOT: id, 
                materialesUsados: cesta.map(x=>`${x.cantidad} ${x.nombre}`).join(", "), 
                listaParaDescontar: cesta, 
                comentarioFinal: document.getElementById('c-obs').value 
            };
            try {
                const res = await fetch(URL, {method:'POST', body: JSON.stringify(p)}).then(r=>r.text());
                if(res === "Ok") {
                    alert("✅ ORDEN CERRADA CON ÉXITO");
                    location.reload();
                } else alert("Error: " + res);
            } catch(e) { alert("Error de Conexión"); }
            showL(false);
        }

        // --- NUEVA OT ---
        async function loadCascada(edId, secId, ubiId) {
            const ed = document.getElementById(edId).value; if(!ed) return;
            showL(true);
            dbU = await fetch(`${URL}?action=getSectores&edificio=${encodeURIComponent(ed)}&token=${PIN_CORRECTO}`).then(r=>r.json());
            const sec = document.getElementById(secId);
            sec.innerHTML = '<option value="">Seleccione Sector...</option>' + [...new Set(dbU.map(x=>x.sector))].map(s=>`<option value="${s}">${s}</option>`).join("");
            sec.disabled = false;
            showL(false);
        }

        function filterUbi(secId, ubiId) {
            const s = document.getElementById(secId).value;
            const u = document.getElementById(ubiId);
            u.innerHTML = '<option value="">Seleccione Ubicación...</option>' + dbU.filter(x=>x.sector===s).map(x=>`<option value='${JSON.stringify(x)}'>${x.ubi}</option>`).join("");
            u.disabled = false;
        }

        function autoFill() {
            const raw = document.getElementById('n-ubi').value; if(!raw) return;
            const d = JSON.parse(raw);
            document.getElementById('n-inv').value = d.inv_aire || "N/A";
            document.getElementById('n-eq').value = d.eq_aire || "N/A";
        }

        function checkRefrig() {
            document.getElementById('div-refrig').classList.toggle('hidden', document.getElementById('n-rubro').value !== "Refrigeración");
        }

        async function saveOT() {
            const uRaw = document.getElementById('n-ubi').value; if(!uRaw) return alert("Falta ubicación");
            const u = JSON.parse(uRaw);
            showL(true);
            const p = {
                action: 'nuevaOT', token: PIN_CORRECTO,
                tipo: document.getElementById('n-tipo').value, especialidad: document.getElementById('n-rubro').value,
                edificio: document.getElementById('n-edif').value, sector: document.getElementById('n-sec').value,
                ubicacion: u.ubi, nInventario: document.getElementById('n-inv').value, equipo: document.getElementById('n-eq').value,
                reportadoPor: document.getElementById('n-rep').value, personal: document.getElementById('n-tec').value,
                descripcion: document.getElementById('n-desc').value
            };
            await fetch(URL, {method:'POST', body: JSON.stringify(p)});
            alert("✅ ORDEN REGISTRADA");
            location.reload();
        }

        // --- HISTORIAL ---
        async function loadHist() {
            showL(true);
            dbH = await fetch(`${URL}?action=getHistorial&token=${PIN_CORRECTO}`).then(r=>r.json());
            filterHist();
            showL(false);
        }

        function filterHist() {
            const q = document.getElementById('h-search').value.toLowerCase();
            const list = document.getElementById('hist-lista');
            list.innerHTML = dbH.filter(o => o.est.toLowerCase().includes(q) || o.edif.toLowerCase().includes(q) || o.id.toString().includes(q))
                .map(o => `
                <div class="bg-white p-4 rounded-3xl border-l-[10px] shadow-sm ${o.est==='Abierta'?'border-orange-500':'border-blue-600'}">
                    <div class="flex justify-between font-black text-[11px] mb-1">
                        <span>#${o.id}</span>
                        <span class="${o.est==='Abierta'?'text-orange-500':'text-blue-600'} uppercase">${o.est}</span>
                    </div>
                    <p class="font-black text-xs uppercase text-slate-700">${o.edif}</p>
                    <p class="text-[10px] text-slate-500 font-bold mb-2">${o.tarea}</p>
                    <div class="flex justify-between items-center border-t pt-2 text-[9px] font-black text-slate-400">
                        <span>TÉC: ${o.tec}</span>
                        <span>FECHA: ${o.fecha}</span>
                    </div>
                </div>`).join("");
        }
    </script>
</body>
</html>
