<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGM PRO 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: none; justify-content: center; align-items: center; z-index: 3000; flex-direction: column; }
        .tab-active { border-bottom: 4px solid #1e40af; color: #1e40af; font-weight: bold; background: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card-ot { border-left: 5px solid #3b82f6; }
        .card-cerrada { border-left: 5px solid #10b981; opacity: 0.8; }
        @keyframes pulse-red { 0%, 100% { background-color: #fef2f2; } 50% { background-color: #fee2e2; } }
        .vencido-anim { animation: pulse-red 2s infinite; border-left: 8px solid #dc2626 !important; }
    </style>
</head>
<body class="bg-slate-100 p-2 text-slate-800 font-sans">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[2000] p-4">
        <div class="bg-white p-10 rounded-[45px] shadow-2xl w-full max-w-sm text-center">
            <h2 class="font-black text-2xl mb-8 text-blue-900 tracking-tighter">SGM INGENIERÍA</h2>
            <input type="password" id="pin-input" placeholder="PIN" class="w-full border-2 p-5 rounded-3xl text-center text-4xl mb-6 outline-none focus:border-blue-600">
            <button onclick="verificarAcceso()" class="w-full bg-blue-600 text-white font-black py-5 rounded-3xl uppercase shadow-lg active:scale-95 transition-all">Entrar</button>
        </div>
    </div>

    <div id="loader" class="loading-overlay">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-black text-blue-900 text-[10px] uppercase tracking-widest text-center px-4">Sincronizando base de datos...</p>
    </div>

    <div id="main-content" class="max-w-4xl mx-auto bg-white rounded-[40px] shadow-xl p-4 hidden mt-2 mb-10 min-h-[80vh]">
        
        <div class="flex border-b mb-6 overflow-x-auto no-scrollbar text-[10px] font-black uppercase whitespace-nowrap sticky top-0 bg-white z-50">
            <button onclick="tab('nueva')" id="btn-nueva" class="flex-1 py-5 tab-active">Nueva OT</button>
            <button onclick="tab('pendientes')" id="btn-pendientes" class="flex-1 py-5 text-slate-400">Cerrar OT</button>
            <button onclick="tab('relev')" id="btn-relev" class="flex-1 py-5 text-blue-600">Relevamiento</button>
            <button onclick="tab('extintores')" id="btn-extintores" class="flex-1 py-5 text-red-500">Extintores</button>
            <button onclick="tab('historial')" id="btn-historial" class="flex-1 py-5 text-slate-400">Historial</button>
        </div>

        <div id="sec-nueva" class="space-y-4">
            <div class="grid grid-cols-2 gap-2">
                <select id="n-tipo" class="p-4 bg-slate-50 border rounded-2xl text-xs font-bold"><option>Correctivo</option><option>Preventivo</option><option>Mejora</option></select>
                <select id="n-rubro" onchange="checkRefrig()" class="p-4 bg-slate-50 border rounded-2xl text-xs font-bold"><option>Electricidad</option><option>General</option><option>Refrigeración</option><option>Herrería</option></select>
            </div>
            <select id="n-edif" onchange="loadCascada('n-edif','n-sec','n-ubi')" class="w-full p-4 border-2 border-blue-100 rounded-2xl text-xs font-black bg-blue-50"></select>
            <select id="n-sec" onchange="filterUbi('n-sec','n-ubi')" class="w-full p-4 border rounded-2xl text-xs" disabled><option>Sector...</option></select>
            <select id="n-ubi" onchange="autoFill()" class="w-full p-4 border rounded-2xl text-xs font-bold" disabled><option>Ubicación...</option></select>
            <div id="div-refrig" class="hidden grid grid-cols-2 gap-2 bg-blue-50 p-4 rounded-2xl border border-blue-100">
                <input id="n-inv" placeholder="N° Inv" class="p-3 border rounded-xl bg-white text-xs" readonly>
                <input id="n-eq" placeholder="Equipo" class="p-3 border rounded-xl bg-white text-xs" readonly>
            </div>
            <input id="n-rep" placeholder="Reportó..." class="w-full p-4 border rounded-2xl text-xs bg-slate-50">
            <select id="n-tec" class="w-full p-4 border-2 border-yellow-200 rounded-2xl text-xs font-black bg-yellow-50"><option value="">Técnico...</option><option>DSF</option><option>AGL</option><option>MAP</option><option>RRG</option></select>
            <textarea id="n-desc" placeholder="Descripción de la falla..." class="w-full p-4 border rounded-2xl bg-slate-50 text-xs" rows="3"></textarea>
            <button onclick="saveOT()" class="w-full bg-blue-700 text-white p-5 rounded-3xl font-black uppercase shadow-lg">Registrar OT</button>
        </div>

        <div id="sec-pendientes" class="hidden space-y-4">
            <select id="c-lista" class="w-full p-4 border-2 border-green-100 rounded-2xl font-black bg-green-50 text-xs"></select>
            <div class="p-5 bg-slate-50 rounded-[35px] border-2 border-dashed space-y-3">
                <select id="m-rub" onchange="loadG()" class="w-full p-3 border rounded-xl bg-white text-xs font-bold"></select>
                <div class="grid grid-cols-2 gap-2">
                    <select id="m-gru" onchange="loadI()" class="p-3 border rounded-xl bg-white text-xs" disabled><option>Grupo...</option></select>
                    <select id="m-ite" class="p-3 border rounded-xl bg-white text-[10px]" disabled><option>Item...</option></select>
                </div>
                <div class="flex gap-2">
                    <input type="number" id="m-cant" value="1" class="w-20 p-3 border-2 border-blue-200 rounded-xl text-center font-black">
                    <button onclick="addItem()" class="flex-1 bg-slate-800 text-white rounded-xl font-black text-[10px] uppercase">Añadir</button>
                </div>
                <div id="cesta" class="space-y-1"></div>
            </div>
            <textarea id="c-obs" placeholder="Observaciones técnicas..." class="w-full p-4 border rounded-2xl bg-slate-50 text-xs" rows="3"></textarea>
            <button onclick="cerrarOT()" class="w-full bg-green-600 text-white p-6 rounded-[35px] font-black uppercase shadow-lg">Finalizar Cierre</button>
        </div>

        <div id="sec-relev" class="hidden space-y-3">
            <select id="r-edif" onchange="loadCascadaRelev()" class="w-full p-4 border-2 border-blue-100 rounded-2xl text-xs font-black bg-blue-50"></select>
            <select id="r-sec" onchange="filterUbiRelev()" class="w-full p-4 border rounded-2xl text-xs" disabled><option>Sector...</option></select>
            <select id="r-ubi" onchange="fillRelevFields()" class="w-full p-4 border rounded-2xl text-xs font-bold" disabled><option>Ubicación...</option></select>
            <div id="relev-form" class="hidden bg-white p-6 rounded-[40px] border shadow-inner space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1"><label class="text-[9px] font-bold">Inv. Aire</label><input id="r-inv-a" class="w-full p-3 border rounded-xl text-xs"></div>
                    <div class="space-y-1"><label class="text-[9px] font-bold">Equipo Aire</label><input id="r-eq-a" class="w-full p-3 border rounded-xl text-xs"></div>
                    <div class="space-y-1"><label class="text-[9px] font-bold">Tipo Lum.</label><input id="r-t-lum" class="w-full p-3 border rounded-xl text-xs"></div>
                    <div class="space-y-1"><label class="text-[9px] font-bold">Cant Lám.</label><input id="r-c-lam" type="number" class="w-full p-3 border rounded-xl text-xs"></div>
                </div>
                <button onclick="saveRelevamiento()" class="w-full bg-blue-600 text-white p-5 rounded-3xl font-black uppercase text-xs">Guardar</button>
            </div>
        </div>

        <div id="sec-extint
