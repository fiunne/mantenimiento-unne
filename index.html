<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGM PRO 2026 - FIUNNE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --fiunne-orange: #f06423; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 4px solid var(--fiunne-orange); color: var(--fiunne-orange); font-weight: 900; background: #fff7ed; }
        .ext-vencido { border-left: 5px solid #ef4444; background-color: #fef2f2; }
        .ext-ok { border-left: 5px solid #22c55e; background-color: #f0fdf4; }
        @media print { .no-print { display: none; } .print-only { display: block !important; } }
    </style>
</head>
<body class="p-2">

    <div id="loader" class="fixed inset-0 bg-black/80 hidden z-[5000] flex-col items-center justify-center text-white">
        <div class="w-10 h-10 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-2"></div>
        <p class="text-[10px] font-black uppercase">Sincronizando...</p>
    </div>

    <div class="max-w-4xl mx-auto pb-20 no-print">
        <header class="mb-4 p-4 bg-white rounded-2xl border shadow-sm">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-black text-slate-900 uppercase">Panel FIUNNE</h1>
                <span id="fecha-actual" class="text-[10px] font-black bg-slate-900 text-white px-3 py-1 rounded-lg uppercase"></span>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="tab('pendientes')" class="bg-blue-50 p-3 rounded-xl border text-center">
                    <p class="text-[8px] font-black text-blue-500">VER ABIERTAS</p>
                    <p id="dash-ot" class="text-xl font-black">0</p>
                </button>
                <div class="bg-slate-50 p-3 rounded-xl border text-center"><p class="text-[8px] font-black text-slate-500">EDIFICIOS</p><p id="dash-sec" class="text-xl font-black">0</p></div>
                <div class="bg-green-50 p-3 rounded-xl border text-center"><p class="text-[8px] font-black text-green-500">ESTADO</p><p class="text-xl font-black">OK</p></div>
            </div>
        </header>

        <nav class="flex border-b mb-6 bg-white rounded-t-xl sticky top-0 z-50 shadow-sm overflow-x-auto">
            <button onclick="tab('nueva')" id="btn-nueva" class="flex-1 py-4 text-[10px] font-black uppercase">Nueva OT</button>
            <button onclick="tab('pendientes')" id="btn-pendientes" class="flex-1 py-4 text-[10px] font-black uppercase">Cerrar OT</button>
            <button onclick="tab('relev')" id="btn-relev" class="flex-1 py-4 text-[10px] font-black uppercase">Relevamiento</button>
            <button onclick="tab('extintores')" id="btn-extintores" class="flex-1 py-4 text-[10px] font-black uppercase">Extintores</button>
            <button onclick="tab('historial')" id="btn-historial" class="flex-1 py-4 text-[10px] font-black uppercase">Historial</button>
        </nav>

        <div id="sec-nueva" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-2xl border shadow-sm space-y-3">
                <select id="n-edif" onchange="actualizarSectores(this.value)" class="w-full p-4 border rounded-xl font-bold bg-slate-50"></select>
                <select id="n-sec" class="w-full p-4 border rounded-xl text-sm"><option>Seleccione Sector...</option></select>
                <input type="text" id="n-ubi" placeholder="Ubicación (Aula, Oficina...)" class="w-full p-4 border rounded-xl text-sm">
                <textarea id="n-desc" placeholder="Descripción de la tarea..." class="w-full p-4 border rounded-xl text-sm h-24"></textarea>
                <div class="flex gap-2">
                    <button onclick="registrarOT()" class="flex-1 bg-[#f06423] text-white p-4 rounded-xl font-black uppercase shadow-lg">Registrar</button>
                    <button onclick="imprimirPDF()" class="bg-slate-800 text-white p-4 rounded-xl shadow-lg">PDF</button>
                </div>
            </div>
        </div>

        <div id="sec-relev" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-2xl border shadow-sm">
                <h3 class="font-black text-xs uppercase mb-3">Relevamiento General</h3>
                <div id="relev-container" class="space-y-2 text-xs">Cargando sectores...</div>
            </div>
        </div>

        <div id="sec-extintores" class="hidden space-y-4">
            <div class="flex justify-between items-center bg-white p-4 rounded-xl border">
                <select id="e-edif" onchange="loadExtintores()" class="p-2 border rounded-lg text-xs font-bold"></select>
                <button onclick="generarTXT()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-black text-[10px] uppercase shadow-md">Exportar OC</button>
            </div>
            <div id="ext-container" class="space-y-2"></div>
        </div>

        <div id="sec-historial" class="hidden space-y-2"><div id="hist-container"></div></div>

        <div id="sec-pendientes" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-2xl border shadow-sm">
                <h3 class="font-black text-xs uppercase mb-3 text-blue-600">OTs en Curso</h3>
                <div id="pendientes-list" class="space-y-2"></div>
            </div>
            <select id="c-lista" class="w-full p-4 border-2 border-orange-200 rounded-xl font-black bg-white text-xs"></select>
            <button class="w-full bg-green-600 text-white p-4 rounded-xl font-black uppercase">Cerrar Seleccionada</button>
        </div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxn__Hv8IHQikHxVut92LHrJPG2INaG-uWaTfhCd8PltfiAzjYHp8HhiYPVcDs4Idgm/exec"; 
        const PIN = "4370";

        function showL(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }

        function actualizarFecha() {
            document.getElementById('fecha-actual').innerText = new Date().toLocaleDateString('es-AR', {day:'2-digit', month:'short', year:'numeric'});
        }

        async function actualizarSectores(edif) {
            if(!edif) return;
            const res = await fetch(`${URL}?action=getSectores&token=${PIN}&edificio=${encodeURIComponent(edif)}`);
            const data = await res.json();
            document.getElementById('n-sec').innerHTML = data.map(s => `<option value="${s}">${s}</option>`).join("");
        }

        async function loadExtintores() {
            showL(true);
            const edif = document.getElementById('e-edif').value;
            try {
                const res = await fetch(`${URL}?action=getExtintores&token=${PIN}&edificio=${encodeURIComponent(edif)}`);
                const data = await res.json();
                document.getElementById('ext-container').innerHTML = data.map(e => `
                    <div class="p-3 rounded-lg border shadow-sm flex justify-between text-xs ${e.vencido ? 'ext-vencido' : 'ext-ok'}">
                        <div><p class="font-black">${e.tipo} ${e.cap}</p><p>S/N: ${e.serie} - ${e.sector}</p></div>
                        <div class="text-right font-bold ${e.vencido ? 'text-red-600' : 'text-green-600'}">Vence: ${e.f_venc}</div>
                    </div>
                `).join("");
            } catch (e) {}
            showL(false);
        }

        async function loadAbiertas() {
            showL(true);
            try {
                const res = await fetch(`${URL}?action=getAbiertas&token=${PIN}`);
                const data = await res.json();
                document.getElementById('dash-ot').innerText = data.length;
                document.getElementById('pendientes-list').innerHTML = data.map(o => `
                    <div class="p-2 bg-slate-50 border rounded text-[10px]">
                        <span class="font-black">#${o.id}</span> | ${o.edif} | ${o.detalle}
                    </div>
                `).join("");
                document.getElementById('c-lista').innerHTML = data.map(o => `<option value="${o.id}">#${o.id} - ${o.detalle}</option>`).join("");
            } catch (e) {}
            showL(false);
        }

        function tab(name) {
            ['nueva', 'pendientes', 'relev', 'extintores', 'historial'].forEach(s => {
                document.getElementById('sec-' + s).classList.add('hidden');
                document.getElementById('btn-' + s)?.classList.remove('tab-active');
            });
            document.getElementById('sec-' + name).classList.remove('hidden');
            document.getElementById('btn-' + name)?.classList.add('tab-active');
            if(name === 'pendientes') loadAbiertas();
            if(name === 'extintores') loadExtintores();
        }

        async function init() {
            actualizarFecha();
            showL(true);
            try {
                const res = await fetch(`${URL}?action=getEdificios&token=${PIN}`);
                const eds = await res.json();
                const opt = eds.map(e => `<option value="${e}">${e}</option>`).join("");
                document.getElementById('n-edif').innerHTML = '<option value="">Edificio...</option>' + opt;
                document.getElementById('e-edif').innerHTML = opt;
                document.getElementById('dash-sec').innerText = eds.length;
                loadAbiertas();
                tab('nueva');
            } catch (e) {}
            showL(false);
        }

        window.onload = init;
    </script>
</body>
</html>
