<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGM - Ingeniería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .tab-active { border-bottom: 4px solid #1e40af; color: #1e40af; font-weight: bold; }
        .card-ot { border-left: 5px solid; }
        .card-abierta { border-left-color: #eab308; }
        .card-cerrada { border-left-color: #22c55e; }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-4 text-gray-800">
    <div id="loader" class="loading-overlay font-bold italic text-blue-600">Procesando...</div>

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-4 md:p-6">
        <div class="flex border-b mb-6 overflow-x-auto">
            <button onclick="tab('nueva')" id="btn-n" class="flex-1 py-3 tab-active uppercase text-[10px] font-bold min-w-[80px]">Nueva OT</button>
            <button onclick="tab('pendientes')" id="btn-p" class="flex-1 py-3 text-gray-500 uppercase text-[10px] font-bold min-w-[80px]">Cerrar</button>
            <button onclick="tab('historial')" id="btn-h" class="flex-1 py-3 text-gray-500 uppercase text-[10px] font-bold min-w-[80px]">Historial</button>
        </div>

        <div id="sec-nueva" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-3">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase">Clasificación</label>
                    <div class="flex gap-2">
                        <select id="tipo" class="w-1/2 border p-2 rounded text-sm bg-gray-50">
                            <option value="Correctivo">Correctivo</option>
                            <option value="Preventivo">Preventivo</option>
                            <option value="Mejora">Mejora</option>
                        </select>
                        <select id="rubro" onchange="toggleRefrigeracion()" class="w-1/2 border p-2 rounded text-sm bg-blue-50 font-bold">
                            <option value="General">General</option>
                            <option value="Electricidad">Electricidad</option>
                            <option value="Refrigeración">Refrigeración</option>
                        </select>
                    </div>

                    <label class="block text-[10px] font-bold text-gray-400 uppercase mt-2">Ubicación</label>
                    <select id="edificio" onchange="loadSectores()" class="w-full border p-2 rounded text-sm"><option value="">Edificio...</option></select>
                    <select id="sector" onchange="filterUbi()" class="w-full border p-2 rounded text-sm" disabled><option value="">Sector...</option></select>
                    <select id="ubiSel" onchange="setUbi()" class="w-full border p-2 rounded text-sm" disabled><option value="">Ubicación...</option></select>
                    
                    <div id="refi-fields" class="hidden p-3 bg-orange-50 border border-orange-200 rounded-lg space-y-2">
                        <input type="text" id="disp_eq" class="w-full bg-white border p-2 rounded text-sm font-bold" readonly placeholder="Equipo">
                        <input type="text" id="disp_inv" class="w-full bg-white border p-2 rounded text-sm font-bold" readonly placeholder="N° Inventario">
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase">Origen y Personal</label>
                    <div class="flex gap-2">
                        <input type="text" id="reportado" placeholder="Avisó..." class="w-2/3 border p-2 rounded text-sm">
                        <select id="medio" class="w-1/3 border p-2 rounded text-sm bg-gray-50">
                            <option value="WhatsApp">WhatsApp</option><option value="Personal">Personal</option>
                            <option value="Mail">Mail</option><option value="Llamada">Llamada</option>
                        </select>
                    </div>
                    <select id="tecnico" class="w-full border p-2 rounded text-sm font-bold border-blue-200">
                        <option value="">Técnico...</option>
                        <option value="ALG">ALG</option><option value="DSF">DSF</option>
                        <option value="MAP">MAP</option><option value="RRG">RRG</option>
                    </select>
                    <textarea id="desc" rows="3" class="w-full border p-2 rounded text-sm" placeholder="Tarea a realizar..."></textarea>
                    
                    <div class="flex gap-2">
                        <select id="estado" class="w-1/2 border p-2 rounded text-sm font-bold bg-yellow-50">
                            <option value="Abierta">ABIERTA</option>
                            <option value="Cerrada">CERRADA</option>
                        </select>
                        <button onclick="guardarOT()" class="w-1/2 bg-blue-600 text-white font-bold py-2 rounded">GUARDAR</button>
                    </div>
                </div>
            </div>
            <input type="hidden" id="h_ubi"><input type="hidden" id="h_inv"><input type="hidden" id="h_eq">
        </div>

        <div id="sec-pendientes" class="hidden space-y-4">
            <select id="listaOT" class="w-full border p-3 rounded-lg font-bold text-blue-900 border-blue-200"></select>
            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                    <select id="rubroStock" onchange="cambioRubro()" class="border p-2 rounded text-xs font-bold bg-white"><option value="">1. Rubro</option></select>
                    <select id="grupoStock" onchange="cambioGrupo()" class="border p-2 rounded text-xs bg-white" disabled><option value="">2. Grupo</option></select>
                    <select id="matStock" class="border p-2 rounded text-xs bg-white" disabled><option value="">3. Material</option></select>
                </div>
                <div class="flex gap-2 mt-2">
                    <input type="number" id="cant" value="1" min="1" class="w-20 border p-2 rounded text-center font-bold">
                    <button onclick="addMat()" class="flex-1 bg-gray-800 text-white font-bold rounded">+</button>
                </div>
                <div id="carrito" class="mt-3 space-y-1"></div>
            </div>
            <textarea id="obsFinal" rows="2" class="w-full border p-2 rounded-lg text-sm bg-green-50" placeholder="Comentario técnico..."></textarea>
            <button onclick="cerrarOT()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl">FINALIZAR Y DESCONTAR</button>
        </div>

        <div id="sec-historial" class="hidden space-y-3">
            <p class="text-[10px] font-bold text-gray-400 uppercase">Últimas 20 Órdenes Registradas</p>
            <div id="contenedor-historial" class="space-y-2">
                </div>
        </div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzWyALQSEMYnl-KnHQNP5zeelYINl2FluKDvaLm64abidX_E4i-cnUye70Im-61DNtO/exec";
        const TOKEN = "MANTENIMIENTO_FI_2026";
        let dbUbi = []; let dbStock = {}; let items = [];

        function tab(t) {
            document.getElementById('sec-nueva').classList.toggle('hidden', t!=='nueva');
            document.getElementById('sec-pendientes').classList.toggle('hidden', t!=='pendientes');
            document.getElementById('sec-historial').classList.toggle('hidden', t!=='historial');
            document.getElementById('btn-n').className = `flex-1 py-3 ${t==='nueva'?'tab-active text-blue-800':'text-gray-500'}`;
            document.getElementById('btn-p').className = `flex-1 py-3 ${t==='pendientes'?'tab-active text-blue-800':'text-gray-500'}`;
            document.getElementById('btn-h').className = `flex-1 py-3 ${t==='historial'?'tab-active text-blue-800':'text-gray-500'}`;
            if(t==='pendientes') loadAbiertas();
            if(t==='historial') loadHistorial();
        }

        window.onload = () => {
            fetch(`${URL}?action=getEdificios&token=${TOKEN}`).then(r=>r.json()).then(d=>{
                const e = document.getElementById('edificio');
                d.forEach(n=>e.innerHTML+=`<option value="${n}">${n}</option>`);
            });
            fetch(`${URL}?action=getMateriales&token=${TOKEN}`).then(r=>r.json()).then(d=>{
                dbStock = d;
                const rs = document.getElementById('rubroStock');
                Object.keys(d).forEach(r => rs.innerHTML+=`<option value="${r}">${r}</option>`);
            });
        };

        // CARGAR HISTORIAL
        async function loadHistorial() {
            const cont = document.getElementById('contenedor-historial');
            cont.innerHTML = '<p class="text-center py-10 text-gray-400 italic">Cargando historial...</p>';
            const d = await fetch(`${URL}?action=getHistorial&token=${TOKEN}`).then(r=>r.json());
            cont.innerHTML = "";
            d.forEach(o => {
                const color = o.estado.toLowerCase() === 'abierta' ? 'card-abierta' : 'card-cerrada';
                cont.innerHTML += `
                    <div class="bg-gray-50 p-3 rounded shadow-sm card-ot ${color}">
                        <div class="flex justify-between items-start">
                            <span class="font-bold text-blue-900 text-sm">${o.id}</span>
                            <span class="text-[9px] bg-white px-2 py-1 rounded border">${o.fecha}</span>
                        </div>
                        <p class="text-xs mt-1"><b>${o.edif}</b>: ${o.tarea}</p>
                        <div class="flex justify-between mt-2 text-[10px] text-gray-500 border-t pt-1">
                            <span>Tec: ${o.tecnico}</span>
                            <span class="uppercase font-bold">${o.estado}</span>
                        </div>
                    </div>`;
            });
        }

        // LÓGICA RESTANTE IGUAL QUE ANTES...
        function toggleRefrigeracion() {
            document.getElementById('refi-fields').classList.toggle('hidden', document.getElementById('rubro').value !== "Refrigeración");
        }
        async function loadSectores() {
            const ed = document.getElementById('edificio').value;
            document.getElementById('loader').style.display="flex";
            dbUbi = await fetch(`${URL}?action=getSectores&edificio=${encodeURIComponent(ed)}&token=${TOKEN}`).then(r=>r.json());
            const s = document.getElementById('sector');
            s.innerHTML = '<option value="">Sector...</option>';
            [...new Set(dbUbi.map(i=>i.sector))].forEach(sec=>s.innerHTML+=`<option value="${sec}">${sec}</option>`);
            s.disabled = false; document.getElementById('loader').style.display="none";
        }
        function filterUbi() {
            const sec = document.getElementById('sector').value;
            const u = document.getElementById('ubiSel');
            u.innerHTML = '<option value="">Ubicación...</option>';
            dbUbi.filter(i=>i.sector===sec).forEach(i=>u.innerHTML+=`<option value='${JSON.stringify(i)}'>${i.ubicacion}</option>`);
            u.disabled = false;
        }
        function setUbi() {
            const i = JSON.parse(document.getElementById('ubiSel').value);
            document.getElementById('h_ubi').value = i.ubicacion; document.getElementById('h_inv').value = i.inventario;
            document.getElementById('h_eq').value = i.equipo; document.getElementById('disp_eq').value = i.equipo || "N/A";
            document.getElementById('disp_inv').value = i.inventario || "N/A";
        }
        function cambioRubro() {
            const r = document.getElementById('rubroStock').value;
            const gs = document.getElementById('grupoStock');
            gs.innerHTML = '<option value="">Grupo...</option>';
            if(dbStock[r]) { Object.keys(dbStock[r]).forEach(g => gs.innerHTML+=`<option value="${g}">${g}</option>`); gs.disabled = false; }
        }
        function cambioGrupo() {
            const r = document.getElementById('rubroStock').value;
            const g = document.getElementById('grupoStock').value;
            const ms = document.getElementById('matStock');
            ms.innerHTML = '<option value="">Material...</option>';
            if(dbStock[r][g]) { dbStock[r][g].forEach(m => ms.innerHTML+=`<option value='${JSON.stringify(m)}'>${m.nombre}</option>`); ms.disabled = false; }
        }
        function addMat() {
            const raw = document.getElementById('matStock').value; if(!raw) return;
            const m = JSON.parse(raw); items.push({...m, cantidad: document.getElementById('cant').value});
            const c = document.getElementById('carrito'); c.innerHTML = "";
            items.forEach((x,idx)=>c.innerHTML+=`<div class="flex justify-between bg-white p-2 rounded text-[11px] border shadow-sm"><span><b>${x.cantidad}</b> x ${x.nombre}</span><button onclick="items.splice(${idx},1);addMat()" class="text-red-500 font-bold px-2">X</button></div>`);
        }
        async function guardarOT() {
            document.getElementById('loader').style.display="flex";
            const p = { token: TOKEN, tipo: document.getElementById('tipo').value, especialidad: document.getElementById('rubro').value, edificio: document.getElementById('edificio').value, sector: document.getElementById('sector').value, ubicacion: document.getElementById('h_ubi').value, nInventario: document.getElementById('h_inv').value, equipo: document.getElementById('h_eq').value, reportadoPor: document.getElementById('reportado').value, medioReporte: document.getElementById('medio').value, personal: document.getElementById('tecnico').value, descripcion: document.getElementById('desc').value, estado: document.getElementById('estado').value };
            await fetch(URL, {method:'POST', body: JSON.stringify(p)}); location.reload();
        }
        async function loadAbiertas() {
            const d = await fetch(`${URL}?action=getAbiertas&token=${TOKEN}`).then(r=>r.json());
            const s = document.getElementById('listaOT');
            s.innerHTML = d.map(o=>`<option value="${o.id}">${o.detalle}</option>`).join("");
        }
        async function cerrarOT() {
            if(!document.getElementById('listaOT').value) return;
            document.getElementById('loader').style.display="flex";
            const p = { action:'cerrarOT', token: TOKEN, idOT: document.getElementById('listaOT').value, materialesUsados: items.map(x=>`${x.cantidad} ${x.nombre}`).join(", "), listaParaDescontar: items, comentarioFinal: document.getElementById('obsFinal').value };
            await fetch(URL, {method:'POST', body: JSON.stringify(p)}); location.reload();
        }
    </script>
</body>
</html>
