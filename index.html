<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGM - Integral FI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .tab-active { border-bottom: 4px solid #1e40af; color: #1e40af; font-weight: bold; }
        .vencido { border-left: 5px solid #ef4444; background: #fee2e2; }
        .por-vencer { border-left: 5px solid #f59e0b; background: #fef3c7; }
        .al-dia { border-left: 5px solid #22c55e; }
    </style>
</head>
<body class="bg-gray-100 p-2 text-gray-800">
    <div id="loader" class="loading-overlay font-bold italic text-blue-600 italic">Actualizando Planillas...</div>

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-3">
        <div class="flex border-b mb-4 overflow-x-auto text-[9px] font-bold uppercase whitespace-nowrap">
            <button onclick="tab('nueva')" id="btn-n" class="px-4 py-3 tab-active">Nueva OT</button>
            <button onclick="tab('pendientes')" id="btn-p" class="px-4 py-3 text-gray-500">Cerrar</button>
            <button onclick="tab('relevamiento')" id="btn-r" class="px-4 py-3 text-gray-500">Relevar Edif</button>
            <button onclick="tab('extintores')" id="btn-e" class="px-4 py-3 text-gray-500 text-red-600">Extintores</button>
            <button onclick="tab('historial')" id="btn-h" class="px-4 py-3 text-gray-500">Historial</button>
        </div>

        <div id="sec-extintores" class="hidden space-y-3">
            <div class="flex gap-2">
                <select id="ext-edificio" onchange="loadExtintores()" class="flex-1 border p-2 rounded text-sm bg-blue-50 font-bold"><option value="">Seleccionar Edificio...</option></select>
                <input type="text" id="ext-busqueda" oninput="filtrarExt()" placeholder="Buscar UNNE o N°..." class="flex-1 border p-2 rounded text-sm">
            </div>
            <div id="lista-extintores" class="space-y-2 max-h-[500px] overflow-y-auto">
                </div>
        </div>

        <div id="form-extintor" class="hidden fixed inset-0 bg-black/50 p-4 z-50 flex items-center justify-center">
            <div class="bg-white p-5 rounded-xl w-full max-w-sm space-y-3">
                <h3 id="ext-titulo" class="font-bold text-blue-800 border-b pb-2"></h3>
                <div>
                    <label class="text-[10px] font-bold uppercase text-gray-400">Fecha de Carga (Hoy)</label>
                    <input type="date" id="ext-f-carga" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-gray-400">Observaciones / Estado</label>
                    <textarea id="ext-obs" class="w-full border p-2 rounded text-sm" rows="3"></textarea>
                </div>
                <div class="flex gap-2">
                    <button onclick="document.getElementById('form-extintor').classList.add('hidden')" class="flex-1 bg-gray-200 py-2 rounded font-bold">CANCELAR</button>
                    <button onclick="guardarExtintor()" class="flex-1 bg-blue-600 text-white py-2 rounded font-bold">GUARDAR</button>
                </div>
            </div>
        </div>

        <div id="sec-relevamiento" class="hidden space-y-3">
            <div class="bg-blue-50 p-3 rounded-lg border border-blue-200 grid grid-cols-1 md:grid-cols-3 gap-2">
                <select id="rel-edificio" onchange="loadSectoresRel()" class="border p-2 rounded text-sm"><option value="">Edificio...</option></select>
                <select id="rel-sector" onchange="filterUbiRel()" class="border p-2 rounded text-sm" disabled><option value="">Sector...</option></select>
                <select id="rel-ubi" onchange="cargarDatosRel()" class="border p-2 rounded text-sm" disabled><option value="">Ubicación...</option></select>
            </div>
            <div id="form-relevamiento" class="hidden space-y-3 p-3 border rounded-xl shadow-inner bg-gray-50">
                <div class="grid grid-cols-2 gap-3 text-[9px] font-bold uppercase text-gray-400">
                    <div class="col-span-2 md:col-span-1">Equipo Aire<input type="text" id="r-eq" class="w-full border p-2 rounded text-sm font-bold text-black"></div>
                    <div class="col-span-2 md:col-span-1">Inventario Aire (C)<input type="text" id="r-inv-aire" class="w-full border p-2 rounded text-sm font-bold text-black"></div>
                    <div class="col-span-2">Tipo Luminarias<input type="text" id="r-tlum" class="w-full border p-2 rounded text-sm text-black"></div>
                    <div>Cant. Art.<input type="number" id="r-cart" class="w-full border p-2 rounded text-sm text-black"></div>
                    <div>Cant. Lamp.<input type="number" id="r-clam" class="w-full border p-2 rounded text-sm text-black"></div>
                    <div>Emergencia<input type="text" id="r-em" class="w-full border p-2 rounded text-sm text-black"></div>
                    <div>Ventiladores<input type="text" id="r-vent" class="w-full border p-2 rounded text-sm text-black"></div>
                    <div class="col-span-2">Inv. Vent. / Otros (J)<input type="text" id="r-inv-vent" class="w-full border p-2 rounded text-sm font-bold text-black"></div>
                </div>
                <button onclick="guardarRelevamiento()" class="w-full bg-blue-700 text-white font-bold py-3 rounded-lg">ACTUALIZAR LOCAL</button>
            </div>
        </div>

        <div id="sec-nueva" class="space-y-3">
             <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div class="space-y-2">
                    <div class="flex gap-1">
                        <select id="tipo" class="w-1/2 border p-2 rounded text-xs bg-gray-50"><option value="Correctivo">Correctivo</option><option value="Preventivo">Preventivo</option><option value="Mejora">Mejora</option></select>
                        <select id="rubro" onchange="toggleRefri()" class="w-1/2 border p-2 rounded text-xs bg-blue-50 font-bold"><option value="General">General</option><option value="Electricidad">Electricidad</option><option value="Refrigeración">Refrigeración</option></select>
                    </div>
                    <select id="edificio" onchange="loadSectores()" class="w-full border p-2 rounded text-xs"><option value="">Edificio...</option></select>
                    <select id="sector" onchange="filterUbi()" class="w-full border p-2 rounded text-xs" disabled><option value="">Sector...</option></select>
                    <select id="ubiSel" onchange="setUbi()" class="w-full border p-2 rounded text-xs" disabled><option value="">Ubicación...</option></select>
                    <div id="refi-box" class="hidden p-2 bg-orange-50 border border-orange-200 rounded text-xs">
                        <input type="text" id="d-eq" class="w-full mb-1 p-1 rounded border" readonly placeholder="Equipo"><input type="text" id="d-inv" class="w-full p-1 rounded border" readonly placeholder="Inv">
                    </div>
                </div>
                <div class="space-y-2">
                    <div class="flex gap-1"><input type="text" id="rep" placeholder="Avisó..." class="w-2/3 border p-2 rounded text-xs"><select id="med" class="w-1/3 border p-2 rounded text-xs bg-gray-50"><option value="WhatsApp">WhatsApp</option><option value="Personal">Personal</option><option value="Mail">Mail</option></select></div>
                    <select id="tec" class="w-full border p-2 rounded text-xs font-bold border-blue-200"><option value="">Técnico...</option><option value="ALG">ALG</option><option value="DSF">DSF</option><option value="MAP">MAP</option><option value="RRG">RRG</option></select>
                    <textarea id="desc" rows="2" class="w-full border p-2 rounded text-xs" placeholder="Tarea..."></textarea>
                    <div class="flex gap-2">
                        <select id="est" class="w-1/2 border p-2 rounded text-xs font-bold bg-yellow-50"><option value="Abierta">ABIERTA</option><option value="Cerrada">CERRADA</option></select>
                        <button onclick="saveOT()" class="w-1/2 bg-blue-600 text-white font-bold py-2 rounded">GUARDAR</button>
                    </div>
                </div>
            </div>
            <input type="hidden" id="h-u"><input type="hidden" id="h-i"><input type="hidden" id="h-e">
        </div>

        <div id="sec-pendientes" class="hidden space-y-3">
            <select id="listaOT" class="w-full border p-2 rounded font-bold text-blue-900"></select>
            <div class="bg-gray-50 p-3 rounded-lg border">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                    <select id="rS" onchange="cR()" class="border p-2 rounded text-xs font-bold bg-white"><option value="">Rubro</option></select>
                    <select id="gS" onchange="cG()" class="border p-2 rounded text-xs bg-white" disabled><option value="">Grupo</option></select>
                    <select id="mS" class="border p-2 rounded text-xs bg-white" disabled><option value="">Material</option></select>
                </div>
                <div class="flex gap-2 mt-2"><input type="number" id="cnt" value="1" min="1" class="w-16 border p-2 rounded text-center font-bold"><button onclick="aM()" class="flex-1 bg-gray-800 text-white font-bold rounded">+</button></div>
                <div id="car" class="mt-2 space-y-1"></div>
            </div>
            <textarea id="obs" rows="2" class="w-full border p-2 rounded text-xs bg-green-50" placeholder="Comentario técnico..."></textarea>
            <button onclick="cOT()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg">FINALIZAR Y DESCONTAR</button>
        </div>

        <div id="sec-historial" class="hidden space-y-2 max-h-[400px] overflow-y-auto"></div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbwxRL8OnMqLjYbTi8hK9vISmYNuxy6d_kJJgbXNskL8jwdO_AaYj4_PJW3onyqH_8WR/exec";
        const TOKEN = "MANTENIMIENTO_FI_2026";
        let dbU = []; let dbS = {}; let its = []; let dbR = []; let dbExt = []; let extUnneSel = "";

        function tab(t) {
            ['nueva','pendientes','relevamiento','extintores','historial'].forEach(s => document.getElementById('sec-'+s).classList.toggle('hidden', t!==s));
            ['n','p','r','e','h'].forEach(b => {
                const btn = document.getElementById('btn-'+b);
                btn.className = `px-4 py-3 ${t===(b==='n'?'nueva':b==='p'?'pendientes':b==='r'?'relevamiento':b==='e'?'extintores':'historial')?'tab-active text-blue-800':'text-gray-500'}`;
            });
            if(t==='pendientes') loadA(); if(t==='historial') loadH();
        }

        window.onload = () => {
            fetch(`${URL}?action=getEdificios&token=${TOKEN}`).then(r=>r.json()).then(d=>{
                d.forEach(n=>{
                    document.getElementById('edificio').innerHTML+=`<option value="${n}">${n}</option>`;
                    document.getElementById('rel-edificio').innerHTML+=`<option value="${n}">${n}</option>`;
                    document.getElementById('ext-edificio').innerHTML+=`<option value="${n}">${n}</option>`;
                });
            });
            fetch(`${URL}?action=getMateriales&token=${TOKEN}`).then(r=>r.json()).then(d=>{
                dbS = d;
                Object.keys(d).forEach(r => document.getElementById('rS').innerHTML+=`<option value="${r}">${r}</option>`);
            });
        };

        // --- LÓGICA EXTINTORES ---
        async function loadExtintores() {
            const ed = document.getElementById('ext-edificio').value; if(!ed) return;
            document.getElementById('loader').style.display="flex";
            dbExt = await fetch(`${URL}?action=getExtintores&edificio=${encodeURIComponent(ed)}&token=${TOKEN}`).then(r=>r.json());
            filtrarExt();
            document.getElementById('loader').style.display="none";
        }

        function filtrarExt() {
            const txt = document.getElementById('ext-busqueda').value.toLowerCase();
            const cont = document.getElementById('lista-extintores');
            cont.innerHTML = "";
            const ahora = new Date();

            dbExt.filter(x => x.unne.toLowerCase().includes(txt) || x.nro.toString().includes(txt) || x.sector.toLowerCase().includes(txt))
                 .forEach(x => {
                    const venc = new Date(x.f_venc);
                    const diff = (venc - ahora) / (1000 * 60 * 60 * 24);
                    let clase = "al-dia";
                    if(diff < 0) clase = "vencido";
                    else if(diff < 30) clase = "por-vencer";

                    cont.innerHTML += `
                        <div onclick="abrirFormExt('${x.unne}', '${x.obs}')" class="p-3 rounded-lg shadow-sm border ${clase} cursor-pointer bg-white">
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="text-blue-800 font-bold text-sm">${x.unne}</span>
                                    <span class="text-[10px] bg-gray-100 px-1 rounded ml-2">N° ${x.nro}</span>
                                </div>
                                <span class="text-[10px] font-bold uppercase">${x.tipo} - ${x.cap}</span>
                            </div>
                            <p class="text-[11px] text-gray-600 mt-1">${x.sector}</p>
                            <div class="flex justify-between mt-2 text-[10px] border-t pt-1">
                                <span>Carga: ${new Date(x.f_carga).toLocaleDateString()}</span>
                                <span class="font-bold">Vence: ${new Date(x.f_venc).toLocaleDateString()}</span>
                            </div>
                            ${x.obs ? `<p class="text-[10px] italic text-blue-600 mt-1">Obs: ${x.obs}</p>` : ''}
                        </div>`;
                 });
        }

        function abrirFormExt(unne, obs) {
            extUnneSel = unne;
            document.getElementById('ext-titulo').innerText = "Actualizar: " + unne;
            document.getElementById('ext-obs').value = obs || "";
            document.getElementById('ext-f-carga').value = new Date().toISOString().split('T')[0];
            document.getElementById('form-extintor').classList.remove('hidden');
        }

        async function guardarExtintor() {
            document.getElementById('loader').style.display="flex";
            const p = {
                action: 'updateExtintor', token: TOKEN, 
                edificio: document.getElementById('ext-edificio').value,
                unne: extUnneSel,
                f_carga: document.getElementById('ext-f-carga').value,
                obs: document.getElementById('ext-obs').value
            };
            await fetch(URL, {method:'POST', body: JSON.stringify(p)});
            location.reload();
        }

        // --- LAS DEMÁS FUNCIONES SE MANTIENEN IGUAL (Nueva OT, Relevamiento, Historial) ---
        async function loadSectoresRel() {
            const ed = document.getElementById('rel-edificio').value;
            document.getElementById('loader').style.display="flex";
            dbR = await fetch(`${URL}?action=getSectores&edificio=${encodeURIComponent(ed)}&token=${TOKEN}`).then(r=>r.json());
            const s = document.getElementById('rel-sector'); s.innerHTML = '<option value="">Sector...</option>';
            [...new Set(dbR.map(i=>i.sector))].forEach(sec=>s.innerHTML+=`<option value="${sec}">${sec}</option>`);
            s.disabled = false; document.getElementById('loader').style.display="none";
        }
        function filterUbiRel() {
            const sec = document.getElementById('rel-sector').value;
            const u = document.getElementById('rel-ubi'); u.innerHTML = '<option value="">Ubicación...</option>';
            dbR.filter(i=>i.sector===sec).forEach(i=>u.innerHTML+=`<option value='${JSON.stringify(i)}'>${i.ubi}</option>`);
            u.disabled = false;
        }
        function cargarDatosRel() {
            const d = JSON.parse(document.getElementById('rel-ubi').value);
            document.getElementById('r-inv-aire').value = d.inv_aire; document.getElementById('r-eq').value = d.eq_aire;
            document.getElementById('r-tlum').value = d.t_lum; document.getElementById('r-cart').value = d.c_art;
            document.getElementById('r-clam').value = d.c_lam; document.getElementById('r-em').value = d.em;
            document.getElementById('r-vent').value = d.vent; document.getElementById('r-inv-vent').value = d.inv_vent;
            document.getElementById('form-relevamiento').classList.remove('hidden');
        }
        async function guardarRelevamiento() {
            document.getElementById('loader').style.display="flex";
            const u = JSON.parse(document.getElementById('rel-ubi').value);
            const p = { action: 'updateRelevamiento', token: TOKEN, edificio: document.getElementById('rel-edificio').value, sector: u.sector, ubi: u.ubi, inv_aire: document.getElementById('r-inv-aire').value, eq_aire: document.getElementById('r-eq').value, t_lum: document.getElementById('r-tlum').value, c_art: document.getElementById('r-cart').value, c_lam: document.getElementById('r-clam').value, em: document.getElementById('r-em').value, vent: document.getElementById('r-vent').value, inv_vent: document.getElementById('r-inv-vent').value };
            await fetch(URL, {method:'POST', body: JSON.stringify(p)}); location.reload();
        }
        function toggleRefri() { document.getElementById('refi-box').classList.toggle('hidden', document.getElementById('rubro').value !== "Refrigeración"); }
        async function loadSectores() {
            const ed = document.getElementById('edificio').value;
            document.getElementById('loader').style.display="flex";
            dbU = await fetch(`${URL}?action=getSectores&edificio=${encodeURIComponent(ed)}&token=${TOKEN}`).then(r=>r.json());
            const s = document.getElementById('sector'); s.innerHTML = '<option value="">Sector...</option>';
            [...new Set(dbU.map(i=>i.sector))].forEach(sec=>s.innerHTML+=`<option value="${sec}">${sec}</option>`);
            s.disabled = false; document.getElementById('loader').style.display="none";
        }
        function filterUbi() {
            const sec = document.getElementById('sector').value;
            const u = document.getElementById('ubiSel'); u.innerHTML = '<option value="">Ubicación...</option>';
            dbU.filter(i=>i.sector===sec).forEach(i=>u.innerHTML+=`<option value='${JSON.stringify(i)}'>${i.ubi}</option>`);
            u.disabled = false;
        }
        function setUbi() {
            const i = JSON.parse(document.getElementById('ubiSel').value);
            document.getElementById('h-u').value = i.ubi; document.getElementById('h-i').value = i.inv_aire;
            document.getElementById('h-e').value = i.eq_aire; document.getElementById('d-eq').value = i.eq_aire || "N/A";
            document.getElementById('d-inv').value = i.inv_aire || "N/A";
        }
        function cR() { const r = document.getElementById('rS').value; const g = document.getElementById('gS'); g.innerHTML = '<option value="">Grupo</option>'; if(dbS[r]) { Object.keys(dbS[r]).forEach(gr => g.innerHTML+=`<option value="${gr}">${gr}</option>`); g.disabled = false; } }
        function cG() { const r = document.getElementById('rS').value; const g = document.getElementById('gS').value; const m = document.getElementById('mS'); m.innerHTML = '<option value="">Material</option>'; if(dbS[r][g]) { dbS[r][g].forEach(ma => m.innerHTML+=`<option value='${JSON.stringify(ma)}'>${ma.nombre}</option>`); m.disabled = false; } }
        function aM() { const raw = document.getElementById('mS').value; if(!raw) return; const m = JSON.parse(raw); its.push({...m, cantidad: document.getElementById('cnt').value}); const c = document.getElementById('car'); c.innerHTML = ""; its.forEach((x,idx)=>c.innerHTML+=`<div class="flex justify-between bg-white p-2 rounded text-[10px] border shadow-sm"><span><b>${x.cantidad}</b> x ${x.nombre}</span><button onclick="its.splice(${idx},1);aM()" class="text-red-500 font-bold px-2">X</button></div>`); }
        async function saveOT() {
            document.getElementById('loader').style.display="flex";
            const p = { token: TOKEN, tipo: document.getElementById('tipo').value, especialidad: document.getElementById('rubro').value, edificio: document.getElementById('edificio').value, sector: document.getElementById('sector').value, ubicacion: document.getElementById('h-u').value, nInventario: document.getElementById('h-i').value, equipo: document.getElementById('h-e').value, reportadoPor: document.getElementById('rep').value, medioReporte: document.getElementById('med').value, personal: document.getElementById('tec').value, descripcion: document.getElementById('desc').value, estado: document.getElementById('est').value };
            await fetch(URL, {method:'POST', body: JSON.stringify(p)}); location.reload();
        }
        async function loadA() {
            const d = await fetch(`${URL}?action=getAbiertas&token=${TOKEN}`).then(r=>r.json());
            document.getElementById('listaOT').innerHTML = d.map(o=>`<option value="${o.id}">${o.detalle}</option>`).join("");
        }
        async function cOT() {
            if(!document.getElementById('listaOT').value) return; document.getElementById('loader').style.display="flex";
            const p = { action:'cerrarOT', token: TOKEN, idOT: document.getElementById('listaOT').value, materialesUsados: its.map(x=>`${x.cantidad} ${x.nombre}`).join(", "), listaParaDescontar: its, comentarioFinal: document.getElementById('obs').value };
            await fetch(URL, {method:'POST', body: JSON.stringify(p)}); location.reload();
        }
        async function loadH() {
            const h = document.getElementById('sec-historial'); h.innerHTML = '<p class="text-center text-xs p-5">Cargando...</p>';
            const d = await fetch(`${URL}?action=getHistorial&token=${TOKEN}`).then(r=>r.json());
            h.innerHTML = d.map(o => `<div class="bg-gray-50 p-2 rounded border-l-4 ${o.estado==='Cerrada'?'border-green-500':'border-yellow-500'} text-[10px] shadow-sm"><div class="flex justify-between"><b>${o.id}</b><span>${o.fecha}</span></div><p>${o.edif} - ${o.tarea}</p><b>${o.tecnico}</b></div>`).join("");
        }
    </script>
</body>
</html>
