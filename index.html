<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Gestión OT - Facultad de Ingeniería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none !important; } .print-area { border: 1px solid black; padding: 20px; } }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e3a8a; display: flex; justify-content: center; align-items: center; z-index: 2000; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    
    <div id="auth-screen">
        <div class="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-sm w-full">
            <h2 class="text-xl font-bold mb-4">Acceso Mantenimiento</h2>
            <input type="password" id="pin-input" maxlength="4" placeholder="PIN" class="w-full text-center text-3xl border rounded-lg p-3 mb-4">
            <button onclick="verificarPIN()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">ACCEDER</button>
        </div>
    </div>

    <div id="loader" class="loading-overlay italic text-blue-600 font-bold">Guardando Orden...</div>

    <div id="main-content" class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-6 print-area hidden">
        <h1 class="text-2xl font-bold text-blue-800 mb-6 text-center border-b pb-4">Orden de Trabajo</h1>
        
        <form id="otForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold">Tipo / Especialidad</label>
                    <div class="flex gap-2">
                        <select id="tipo" class="w-1/2 border p-2 rounded" required>
                            <option value="Preventivo" selected>Preventivo</option>
                            <option value="Correctivo">Correctivo</option>
                            <option value="Mejora">Mejora</option>
                        </select>
                        <select id="especialidad" class="w-1/2 border p-2 rounded" required>
                            <option value="Electricidad">Electricidad</option>
                            <option value="Refrigeración">Refrigeración</option>
                            <option value="Ferretería">Ferretería</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold">Estado de la OT</label>
                    <select id="estado" class="w-full border p-2 rounded bg-yellow-50 font-bold text-blue-800" onchange="actualizarColorEstado()">
                        <option value="Abierta">🟡 ABIERTA (Pendiente / En curso)</option>
                        <option value="Cerrada">🟢 CERRADA (Finalizada)</option>
                    </select>
                </div>
            </div>

            <div class="space-y-4 bg-blue-50 p-4 rounded-lg">
                <select id="edificio" onchange="cargarSectores()" class="w-full border p-2 rounded" required><option value="">Edificio...</option></select>
                <select id="sector" onchange="filtrarUbicaciones()" class="w-full border p-2 rounded" disabled required><option value="">Sector...</option></select>
                <select id="ubicacionSelect" onchange="actualizarDetalles()" class="w-full border p-2 rounded" disabled required><option value="">Ubicación...</option></select>
                <input type="hidden" id="ubicacion_text"><input type="hidden" id="nInventario"><input type="hidden" id="equipo">
            </div>

            <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-3 gap-4 border-t pt-4">
                <input type="text" id="reportadoPor" placeholder="Reportado por..." class="border p-2 rounded" required>
                <select id="personal" class="border p-2 rounded" required>
                    <option value="">Técnico Asignado...</option>
                    <option value="DSG">DSG</option><option value="MAP">MAP</option>
                    <option value="AGL">AGL</option><option value="RRG">RRG</option>
                </select>
                <select id="prioridad" class="border p-2 rounded">
                    <option value="Media">Prioridad Media</option>
                    <option value="Alta">Alta</option><option value="Urgente">Urgente</option>
                </select>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-bold">Descripción de Tarea</label>
                <textarea id="descripcion" rows="2" class="w-full border p-2 rounded" required placeholder="¿Qué se hizo o qué se encontró?"></textarea>
            </div>

            <div class="md:col-span-2 bg-yellow-50 p-3 rounded border border-yellow-200">
                <label class="block text-sm font-bold text-yellow-800">Observaciones / Repuestos Faltantes</label>
                <textarea id="observaciones" rows="2" class="w-full border p-2 rounded" placeholder="Ej: Se requiere comprar 2 lámparas LED de 18W."></textarea>
            </div>

            <div class="md:col-span-2 flex justify-between gap-4 no-print">
                <button type="button" onclick="window.print()" class="bg-gray-500 text-white font-bold py-3 px-6 rounded-lg">IMPRIMIR</button>
                <button type="submit" class="flex-1 bg-blue-600 text-white font-extrabold py-3 rounded-lg shadow-lg">GUARDAR ORDEN</button>
            </div>
        </form>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzYWpfFh6A6ZPbD6JAB6KDh1XsrnrzK7SlbtQQ5tiEcR6Z0miT9wYa6SfKY5JQylUGw/exec"; 
        const TOKEN = "MANTENIMIENTO_FI_2026";
        const PIN_CORRECTO = "2026";
        let rawData = [];

        function verificarPIN() {
            if (document.getElementById('pin-input').value === PIN_CORRECTO) {
                localStorage.setItem('auth_mantenimiento', 'true');
                mostrarApp();
            }
        }
        window.onload = () => { if (localStorage.getItem('auth_mantenimiento') === 'true') mostrarApp(); };
        function mostrarApp() { document.getElementById('auth-screen').style.display='none'; document.getElementById('main-content').classList.remove('hidden'); inicializarDatos(); }
        
        async function inicializarDatos() {
            const res = await fetch(`${WEB_APP_URL}?action=getEdificios&token=${TOKEN}`);
            const edificios = await res.json();
            const select = document.getElementById('edificio');
            edificios.forEach(n => { let opt = document.createElement('option'); opt.value = n; opt.textContent = n; select.appendChild(opt); });
        }

        async function cargarSectores() {
            const edif = document.getElementById('edificio').value;
            const res = await fetch(`${WEB_APP_URL}?action=getSectores&edificio=${encodeURIComponent(edif)}&token=${TOKEN}`);
            rawData = await res.json();
            const secSel = document.getElementById('sector');
            secSel.innerHTML = '<option value="">Sector...</option>';
            [...new Set(rawData.map(i => i.sector))].forEach(s => { let opt = document.createElement('option'); opt.value = s; opt.textContent = s; secSel.appendChild(opt); });
            secSel.disabled = false;
        }

        function filtrarUbicaciones() {
            const sector = document.getElementById('sector').value;
            const ubiSel = document.getElementById('ubicacionSelect');
            ubiSel.innerHTML = '<option value="">Ubicación...</option>';
            rawData.filter(i => i.sector === sector).forEach(item => { let opt = document.createElement('option'); opt.value = rawData.indexOf(item); opt.textContent = item.ubicacion; ubiSel.appendChild(opt); });
            ubiSel.disabled = false;
        }

        function actualizarDetalles() {
            const info = rawData[document.getElementById('ubicacionSelect').value];
            document.getElementById('nInventario').value = info.inventario;
            document.getElementById('equipo').value = info.equipo;
            document.getElementById('ubicacion_text').value = info.ubicacion;
        }

        function actualizarColorEstado() {
            const val = document.getElementById('estado').value;
            document.getElementById('estado').className = `w-full border p-2 rounded font-bold ${val === 'Abierta' ? 'bg-yellow-50 text-yellow-800' : 'bg-green-50 text-green-800'}`;
        }

        document.getElementById('otForm').onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('loader').style.display = "flex";
            const payload = {
                token: TOKEN,
                tipo: document.getElementById('tipo').value,
                especialidad: document.getElementById('especialidad').value,
                prioridad: document.getElementById('prioridad').value,
                edificio: document.getElementById('edificio').value,
                sector: document.getElementById('sector').value,
                ubicacion: document.getElementById('ubicacion_text').value,
                nInventario: document.getElementById('nInventario').value,
                equipo: document.getElementById('equipo').value,
                reportadoPor: document.getElementById('reportadoPor').value,
                medioReporte: "App",
                personal: document.getElementById('personal').value,
                descripcion: document.getElementById('descripcion').value,
                observaciones: document.getElementById('observaciones').value,
                estado: document.getElementById('estado').value
            };
            await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("¡Orden Guardada!");
            location.reload();
        };
    </script>
</body>
</html>
