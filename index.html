<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGM PRO 2026 - SISTEMA INTEGRAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .tab-active { background-color: #1e40af !important; color: white !important; font-weight: bold; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { background-color: #f3f4f6; }
    </style>
</head>
<body class="p-2 text-gray-800 font-sans">

    <div id="login-screen" class="fixed inset-0 bg-blue-900 flex items-center justify-center z-[2000] p-6">
        <div class="bg-white p-8 rounded-[40px] shadow-2xl w-full max-w-sm text-center">
            <h1 class="text-2xl font-black text-blue-900 mb-6 uppercase tracking-tighter">SGM PRO 2026</h1>
            <input type="password" id="pin" placeholder="••••" class="w-full text-center text-3xl p-4 bg-gray-50 border-2 border-gray-100 rounded-3xl mb-4 outline-none focus:border-blue-500">
            <button onclick="checkL()" class="w-full bg-blue-600 text-white py-4 rounded-3xl font-bold shadow-lg active:scale-95 transition-all uppercase tracking-widest">Entrar</button>
        </div>
    </div>

    <div id="main-app" class="hidden max-w-lg mx-auto pb-24">
        <nav class="flex overflow-x-auto gap-2 mb-6 p-1 no-scrollbar justify-center">
            <button onclick="st(1)" id="t1" class="tab-active bg-white whitespace-nowrap px-6 py-2 rounded-full shadow-sm text-sm border border-gray-200 text-blue-800">Nueva OT</button>
            <button onclick="st(2); loadAbiertas();" id="t2" class="bg-white whitespace-nowrap px-6 py-2 rounded-full shadow-sm text-sm border border-gray-200 text-gray-500">Cerrar OT</button>
            <button onclick="st(3)" id="t3" class="bg-white whitespace-nowrap px-6 py-2 rounded-full shadow-sm text-sm border border-gray-200 text-gray-500">Relevamiento</button>
            <button onclick="st(4)" id="t4" class="bg-white whitespace-nowrap px-6 py-2 rounded-full shadow-sm text-sm border border-gray-200 text-gray-500">Extintores</button>
        </nav>

        <section id="s1" class="bg-white p-6 rounded-[40px] shadow-sm border border-gray-100 space-y-4">
            <h3 class="font-black text-blue-800 mb-6 uppercase flex items-center gap-2">
                <span class="w-1.5 h-6 bg-blue-600 rounded-full"></span> EMISIÓN DE OT
            </h3>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 ml-3 uppercase">Tipo</label>
                    <select id="tipo" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm outline-none"><option>Correctivo</option><option>Preventivo</option><option>Mejora</option></select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 ml-3 uppercase">Prioridad</label>
                    <select id="prioridad" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm outline-none"><option>Baja</option><option selected>Media</option><option>Alta</option><option>Urgente</option></select>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-400 ml-3 uppercase">Especialidad</label>
                <select id="rubro" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm outline-none"><option>Aire Acondicionado</option><option>Electricidad</option><option>Sanitarios</option><option>Edificio</option></select>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-400 ml-3 uppercase">Edificio</label>
                <select id="edificio" onchange="loadS()" class="w-full p-4 bg-blue-50 border border-blue-100 rounded-2xl text-sm font-bold outline-none"></select>
            </div>

            <div id="sel-sect" class="hidden space-y-1">
                <label class="text-[10px] font-bold text-gray-400 ml-3 uppercase">Sector / Área</label>
                <select id="sector" class="w-full p-4 bg-white border-2 border-blue-200 rounded-2xl text-sm font-bold"></select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input id="h-u" readonly placeholder="Ubicación" class="p-4 bg-gray-100 border rounded-2xl text-xs text-gray-500">
                <input id="h-i" readonly placeholder="N° Inventario" class="p-4 bg-gray-100 border rounded-2xl text-xs text-gray-500">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-400 ml-3 uppercase tracking-widest">Asignar Técnico</label>
                <select id="tec" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold">
                    <option>Téc. Arrieta</option>
                    <option>Téc. Coria</option>
                    <option>Téc. Orellano</option>
                    <option>Téc. Sosa</option>
                    <option>Mantenimiento General</option>
                </select>
            </div>

            <textarea id="desc" rows="3" placeholder="Detalle de la tarea..." class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm outline-none"></textarea>
            
            <button onclick="saveOT()" class="w-full bg-blue-600 text-white p-5 rounded-3xl font-black text-md mt-4 shadow-xl active:scale-95 transition-all uppercase tracking-tighter">Emitir Orden de Trabajo</button>
        </section>

        <section id="s2" class="hidden bg-white p-6 rounded-[40px] shadow-sm border border-gray-100 space-y-4">
            <h3 class="font-black text-red-800 uppercase flex items-center gap-2"><span class="w-1.5 h-6 bg-red-600 rounded-full"></span> Cerrar Orden</h3>
            <select id="abiertas-list" class="w-full p-4 bg-red-50 border border-red-100 rounded-2xl text-sm font-bold"></select>
            <textarea id="c-mat" placeholder="Materiales utilizados..." class="w-full p-4 bg-gray-50 border rounded-2xl text-sm outline-none"></textarea>
            <textarea id="c-com" placeholder="Observaciones de cierre..." class="w-full p-4 bg-gray-50 border rounded-2xl text-sm outline-none"></textarea>
            <button onclick="cerrarOT()" class="w-full bg-red-600 text-white p-5 rounded-3xl font-bold shadow-lg uppercase">Finalizar Tarea</button>
        </section>
    </div>

    <div id="loader" class="loading-overlay">
        <div class="w-12 h-12 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin mb-4"></div>
        <p class="font-black text-blue-900 text-xs uppercase animate-pulse">Sincronizando sistema...</p>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycby7CEtlOv7ThK7R8OebGtM_U-JAlnPX4OlCKu8ylHgsqokttAkmD6o1_A8-Thksii1jQA/exec"; 
        const PIN_CORRECTO = "4370";
        let SECTORES = [];

        function checkL() {
            if(document.getElementById('pin').value === PIN_CORRECTO) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                loadEdificios();
            } else { alert("PIN Incorrecto"); }
        }

        function st(n) {
            for(let i=1; i<=4; i++) {
                document.getElementById('s'+i)?.classList.add('hidden');
                document.getElementById('t'+i)?.classList.remove('tab-active');
                document.getElementById('t'+i)?.classList.add('text-gray-500');
            }
            document.getElementById('s'+n).classList.remove('hidden');
            document.getElementById('t'+n).classList.add('tab-active');
            document.getElementById('t'+n).classList.remove('text-gray-500');
        }

        function showL(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }

        async function loadEdificios() {
            showL(true);
            try {
                const res = await fetch(`${URL}?action=getEdificios&token=${PIN_CORRECTO}`).then(r=>r.json());
                document.getElementById('edificio').innerHTML = '<option value="">Seleccione Edificio...</option>' + res.map(e => `<option value="${e}">${e}</option>`).join('');
            } catch(e) { console.error(e); }
            showL(false);
        }

        async function loadS() {
            const edif = document.getElementById('edificio').value;
            if(!edif) return;
            showL(true);
            try {
                const res = await fetch(`${URL}?action=getSectores&edificio=${encodeURIComponent(edif)}&token=${PIN_CORRECTO}`).then(r=>r.json());
                SECTORES = res;
                document.getElementById('sector').innerHTML = res.map((s,i) => `<option value="${s.sector}" data-idx="${i}">${s.sector}</option>`).join('');
                document.getElementById('sel-sect').classList.remove('hidden');
                
                document.getElementById('sector').onchange = (e) => {
                    const s = SECTORES[e.target.options[e.target.selectedIndex].dataset.idx];
                    document.getElementById('h-u').value = s.ubi || "N/A";
                    document.getElementById('h-i').value = s.inv_aire || "N/A";
                };
                document.getElementById('sector').dispatchEvent(new Event('change'));
            } catch(e) { alert("Error al conectar con la base de datos"); }
            showL(false);
        }

        async function saveOT() {
            const edif = document.getElementById('edificio').value;
            if(!edif) { alert("Debe seleccionar un edificio"); return; }
            showL(true);
            const p = {
                token: PIN_CORRECTO, action: 'nuevaOT',
                tipo: document.getElementById('tipo').value, prioridad: document.getElementById('prioridad').value,
                especialidad: document.getElementById('rubro').value, edificio: edif,
                sector: document.getElementById('sector').value, ubicacion: document.getElementById('h-u').value,
                nInventario: document.getElementById('h-i').value, personal: document.getElementById('tec').value,
                descripcion: document.getElementById('desc').value
            };
            try {
                await fetch(URL, { method: 'POST', body: JSON.stringify(p) });
                alert("✅ ORDEN EMITIDA CON ÉXITO");
                location.reload();
            } catch(e) { location.reload(); }
        }

        async function loadAbiertas() {
            showL(true);
            try {
                const res = await fetch(`${URL}?action=getAbiertas&token=${PIN_CORRECTO}`).then(r=>r.json());
                document.getElementById('abiertas-list').innerHTML = res.map(o => `<option value="${o.id}">${o.detalle}</option>`).join('');
            } catch(e) { }
            showL(false);
        }
    </script>
</body>
</html>
