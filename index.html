<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Gestión OT - Facultad de Ingeniería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .print-area { border: 1px solid black; padding: 20px; width: 100%; }
        }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); display: none; 
            justify-content: center; align-items: center; z-index: 1000;
        }
        /* Estilos para el bloqueo por PIN */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1e3a8a; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    
    <div id="auth-screen">
        <div class="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-sm w-full">
            <div class="mb-4 inline-block p-3 bg-blue-100 rounded-full text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-xl font-bold text-gray-800 mb-2">Acceso Restringido</h2>
            <p class="text-sm text-gray-500 mb-6">Ingrese el PIN de 4 dígitos para continuar</p>
            <input type="password" id="pin-input" maxlength="4" placeholder="••••" 
                   class="w-full text-center text-3xl tracking-[1rem] border-2 border-blue-200 rounded-lg p-3 mb-4 focus:outline-none focus:border-blue-500">
            <button onclick="verificarPIN()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-colors">
                ACCEDER
            </button>
            <p id="pin-error" class="text-red-500 text-sm mt-3 hidden italic">PIN Incorrecto. Intente de nuevo.</p>
        </div>
    </div>

    <div id="loader" class="loading-overlay italic text-blue-600 font-bold text-lg">Procesando...</div>

    <div id="main-content" class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-6 print-area hidden">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h1 class="text-2xl font-bold text-blue-800">Orden de Trabajo de Mantenimiento</h1>
            <span class="text-sm font-mono bg-gray-100 p-2 rounded no-print">Año: 2026</span>
        </div>
        
        <form id="otForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Tipo de Trabajo</label>
                    <select id="tipo" class="w-full border p-2 rounded" required>
                        <option value="">Seleccione...</option>
                        <option value="Preventivo">Preventivo</option>
                        <option value="Correctivo">Correctivo</option>
                        <option value="Mejora">Mejora</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Especialidad</label>
                    <select id="especialidad" class="w-full border p-2 rounded" required>
                        <option value="">Seleccione...</option>
                        <option value="Electricidad">Electricidad</option>
                        <option value="Refrigeración">Refrigeración</option>
                        <option value="Ferretería">Ferretería</option>
                        <option value="Herrería">Herrería</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Prioridad</label>
                    <select id="prioridad" class="w-full border p-2 rounded" required>
                        <option value="Baja">Baja</option>
                        <option value="Media" selected>Media</option>
                        <option value="Alta">Alta</option>
                        <option value="Urgente">Urgente</option>
                    </select>
                </div>
            </div>

            <div class="space-y-4 bg-blue-50 p-4 rounded-lg border border-blue-100">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Edificio / Departamento</label>
                    <select id="edificio" onchange="cargarSectores()" class="w-full border p-2 rounded bg-white" required>
                        <option value="">Cargando edificios...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Sector / Nivel</label>
                    <select id="sector" onchange="filtrarUbicaciones()" class="w-full border p-2 rounded bg-white" disabled required>
                        <option value="">Primero elija edificio...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Ubicación Precisa / Aula</label>
                    <select id="ubicacionSelect" onchange="actualizarDetalles()" class="w-full border p-2 rounded bg-white" disabled required>
                        <option value="">Primero elija sector...</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="hidden" id="ubicacion_text">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">N° Inventario</label>
                        <input type="text" id="nInventario" class="w-full bg-gray-50 p-2 text-sm rounded border" readonly>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Equipo</label>
                        <input type="text" id="equipo" class="w-full bg-gray-50 p-2 text-sm rounded border" readonly>
                    </div>
                </div>
            </div>

            <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-3 gap-4 border-t pt-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Reportado Por</label>
                    <input type="text" id="reportadoPor" class="w-full border p-2 rounded" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Medio</label>
                    <select id="medioReporte" class="w-full border p-2 rounded">
                        <option value="WhatsApp">WhatsApp</option>
                        <option value="Personalmente">Personalmente</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Personal Asignado</label>
                    <input type="text" id="personal" class="w-full border p-2 rounded" required>
                </div>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-semibold text-gray-700">Descripción de Tarea</label>
                <textarea id="descripcion" rows="3" class="w-full border p-2 rounded" required></textarea>
            </div>

            <div class="md:col-span-2 flex flex-col md:flex-row justify-between items-center bg-gray-50 p-4 rounded border gap-4 no-print">
                <button type="button" onclick="window.print()" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-lg">
                    IMPRIMIR OT
                </button>
                <button type="submit" id="btnGuardar" class="bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-3 px-10 rounded-lg shadow-xl transition-all">
                    GUARDAR EN REGISTRO
                </button>
            </div>
        </form>
    </div>

    <script>
        // CONFIGURACIÓN (Actualiza la URL con la de tu Apps Script de Configuración)
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxNXs3KSaSqUU_MUhhwMvgyN1INlNKsA0Qj1E_Uwec-X2rlGwX9fDR9FDpJ6xcO8D4t/exec"; 
        const TOKEN = "MANTENIMIENTO_FI_2026";
        const PIN_CORRECTO = "2026"; // <--- AQUÍ PUEDES CAMBIAR EL PIN
        
        let rawData = [];

        // FUNCIÓN DE VERIFICACIÓN DE PIN
        function verificarPIN() {
            const pinIngresado = document.getElementById('pin-input').value;
            if (pinIngresado === PIN_CORRECTO) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
                inicializarFormulario();
            } else {
                document.getElementById('pin-error').classList.remove('hidden');
                document.getElementById('pin-input').value = "";
            }
        }

        async function inicializarFormulario() {
            try {
                const res = await fetch(`${WEB_APP_URL}?action=getEdificios&token=${TOKEN}`);
                const edificios = await res.json();
                const select = document.getElementById('edificio');
                select.innerHTML = '<option value="">Seleccione Edificio...</option>';
                edificios.forEach(n => {
                    let opt = document.createElement('option');
                    opt.value = n; opt.textContent = n; select.appendChild(opt);
                });
            } catch (e) { alert("Error al cargar edificios"); }
        }

        async function cargarSectores() {
            const edif = document.getElementById('edificio').value;
            const secSel = document.getElementById('sector');
            const ubiSel = document.getElementById('ubicacionSelect');
            secSel.disabled = true; ubiSel.disabled = true;
            secSel.innerHTML = '<option>Cargando...</option>';
            try {
                const res = await fetch(`${WEB_APP_URL}?action=getSectores&edificio=${encodeURIComponent(edif)}&token=${TOKEN}`);
                rawData = await res.json();
                const sectoresUnicos = [...new Set(rawData.map(item => item.sector))];
                secSel.innerHTML = '<option value="">Seleccione sector...</option>';
                sectoresUnicos.forEach(s => {
                    let opt = document.createElement('option');
                    opt.value = s; opt.textContent = s; secSel.appendChild(opt);
                });
                secSel.disabled = false;
            } catch (e) { alert("Error cargando sectores"); }
        }

        function filtrarUbicaciones() {
            const sectorElegido = document.getElementById('sector').value;
            const ubiSel = document.getElementById('ubicacionSelect');
            ubiSel.innerHTML = '<option value="">Seleccione ubicación...</option>';
            const filtrados = rawData.filter(item => item.sector === sectorElegido);
            filtrados.forEach((item) => {
                let opt = document.createElement('option');
                opt.value = rawData.indexOf(item); 
                opt.textContent = item.ubicacion;
                ubiSel.appendChild(opt);
            });
            ubiSel.disabled = false;
        }

        function actualizarDetalles() {
            const realIdx = document.getElementById('ubicacionSelect').value;
            if (realIdx !== "") {
                const info = rawData[realIdx];
                document.getElementById('nInventario').value = info.inventario || "n/c";
                document.getElementById('equipo').value = info.equipo || "n/c";
                document.getElementById('ubicacion_text').value = info.ubicacion;
            }
        }

        document.getElementById('otForm').onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('loader').style.display = "flex";
            const payload = {
                token: TOKEN,
                tipo: document.getElementById('tipo').value,
                especialidad: document.getElementById('especialidad').value,
                prioridad: document.getElementById('prioridad').value,
                edificio: document.getElementById('edificio').value,
                sector: document.getElementById('sector').value,
                ubicacion: document.getElementById('ubicacion_text').value,
                nInventario: document.getElementById('nInventario').value,
                equipo: document.getElementById('equipo').value,
                reportadoPor: document.getElementById('reportadoPor').value,
                medioReporte: document.getElementById('medioReporte').value,
                personal: document.getElementById('personal').value,
                descripcion: document.getElementById('descripcion').value,
                materiales: "",
                estado: "Abierta",
                observaciones: ""
            };
            try {
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("¡Orden registrada exitosamente!");
                location.reload();
            } catch (error) { alert("Error al guardar"); document.getElementById('loader').style.display = "none"; }
        };
    </script>
</body>
</html>
