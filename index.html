<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGM FIUNNE 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .tab-active { border-bottom: 4px solid #f06423; color: #f06423; font-weight: 900; background: #fff7ed; }
        .card-ot { transition: all 0.2s; border-left-width: 8px; }
        .vencido-anim { animation: pulse-red 2s infinite; border-left-color: #dc2626 !important; background-color: #fef2f2; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body class="p-2">

    <div id="loader" class="fixed inset-0 bg-slate-900/90 hidden z-[5000] flex flex-col items-center justify-center text-white">
        <div class="w-12 h-12 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-black text-xs tracking-widest uppercase">Sincronizando FIUNNE...</p>
    </div>

    <div id="main-content" class="max-w-4xl mx-auto pb-24">
        <header class="p-4 bg-white rounded-2xl shadow-sm mb-4 border flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-slate-900 tracking-tighter uppercase leading-none">Panel de Control</h1>
                <p class="text-[9px] font-black text-orange-600 uppercase tracking-widest mt-1">FIUNNE • Gestión Operativa</p>
            </div>
            <div id="dash-venc-box" class="bg-red-50 px-3 py-2 rounded-xl border border-red-100 text-center">
                <p class="text-[8px] font-black text-red-500 uppercase">HySL Vencidos</p>
                <p id="dash-venc" class="text-xl font-black text-red-700">0</p>
            </div>
        </header>

        <nav class="flex bg-white rounded-xl shadow-sm border mb-4 sticky top-2 z-40 overflow-x-auto no-scrollbar">
            <button onclick="tab('nueva')" id="btn-nueva" class="flex-1 py-4 text-[10px] font-black uppercase">Nueva OT</button>
            <button onclick="tab('cerrar')" id="btn-cerrar" class="flex-1 py-4 text-[10px] font-black uppercase">Cerrar OT</button>
            <button onclick="tab('rel')" id="btn-rel" class="flex-1 py-4 text-[10px] font-black uppercase">Relevamiento</button>
            <button onclick="tab('hysl')" id="btn-hysl" class="flex-1 py-4 text-[10px] font-black uppercase text-green-600">HySL / Ext.</button>
            <button onclick="tab('hist')" id="btn-hist" class="flex-1 py-4 text-[10px] font-black uppercase">Historial</button>
        </nav>

        <div id="sec-cerrar" class="hidden space-y-4">
            <div class="bg-white p-5 rounded-2xl shadow-sm border space-y-4">
                <label class="text-[10px] font-black uppercase text-slate-400">Seleccionar Orden Abierta</label>
                <select id="c-lista" class="w-full p-4 border-2 border-orange-200 rounded-xl font-bold text-xs"></select>
                
                <div class="bg-slate-50 p-4 rounded-xl space-y-2 border">
                    <p class="text-[10px] font-black uppercase text-slate-500">Insumos Utilizados</p>
                    <div class="flex gap-2">
                        <select id="ins-sel" class="flex-1 p-3 border rounded-lg text-xs"></select>
                        <input type="number" id="ins-cant" value="1" class="w-16 p-3 border rounded-lg text-center font-black">
                        <button onclick="addInsumo()" class="bg-slate-900 text-white px-4 rounded-lg font-black text-xl">+</button>
                    </div>
                    <ul id="ins-lista" class="text-[10px] font-bold text-blue-600 space-y-1 py-1"></ul>
                </div>
                <textarea id="c-obs" placeholder="Observaciones del cierre..." class="w-full p-4 border rounded-xl h-24 text-sm"></textarea>
                <button onclick="ejecutarCierre()" class="w-full bg-green-600 text-white p-5 rounded-2xl font-black uppercase shadow-lg">Finalizar y Descontar Stock</button>
            </div>
        </div>

        <div id="sec-hysl" class="hidden space-y-4">
            <div class="flex gap-2">
                <select id="e-edif" onchange="loadExtintores(this.value)" class="flex-1 p-4 border-2 border-slate-200 rounded-xl text-xs font-black bg-white"></select>
                <button onclick="descargarOC()" class="bg-slate-900 text-white px-5 rounded-xl text-[9px] font-black uppercase shadow-md">Generar OC (.txt)</button>
            </div>
            <div id="ext-lista" class="grid grid-cols-1 gap-2"></div>
        </div>

        <div id="sec-hist" class="hidden space-y-2" id="historial-container"></div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbwnkEvpeOZMGS_5uynNjrJKQh5zqrX_QTBwIib5f8qbjLkrxrEvcyjNlAhGVor6Gh5U/exec"; 
        const PIN = "4370";
        let cesta = [];

        function showL(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }

        async function tab(t) {
            ['nueva','cerrar','rel','hysl','hist'].forEach(s => {
                document.getElementById('sec-'+s)?.classList.add('hidden');
                document.getElementById('btn-'+s)?.classList.remove('tab-active');
            });
            document.getElementById('sec-'+t).classList.remove('hidden');
            document.getElementById('btn-'+t).classList.add('tab-active');
            if(t === 'cerrar') loadAbiertas();
            if(t === 'hist') loadHistorial();
        }

        async function loadAbiertas() {
            showL(true);
            const res = await fetch(`${URL}?action=getAbiertas&token=${PIN}`);
            const data = await res.json();
            // Solución al problema de identificación: El detalle ya viene con Edif/Sector/Ubi desde el servidor
            document.getElementById('c-lista').innerHTML = data.map(o => `<option value="${o.id}">${o.detalle}</option>`).join("");
            
            const resM = await fetch(`${URL}?action=getMateriales&token=${PIN}`);
            const mats = await resM.json();
            document.getElementById('ins-sel').innerHTML = mats.map(m => `<option value="${m.nombre}">${m.nombre} (Stock: ${m.stock})</option>`).join("");
            showL(false);
        }

        async function loadHistorial() {
            showL(true);
            const res = await fetch(`${URL}?action=getHistorial&token=${PIN}`);
            const data = await res.json();
            document.getElementById('sec-hist').innerHTML = data.map(h => `
                <div class="card-ot p-4 bg-white rounded-xl shadow-sm border-l-8 ${h.est==='Cerrada'?'border-green-500 opacity-70':'border-blue-500'}">
                    <div class="flex justify-between text-[9px] font-black text-slate-400">
                        <span>#${h.id}</span><span>${h.fecha}</span>
                    </div>
                    <p class="font-black text-slate-800 text-[11px] uppercase mt-1">${h.edif} / ${h.sector} / ${h.ubi}</p>
                    <p class="text-slate-600 text-[11px] mt-1 italic">${h.tarea}</p>
                    <div class="flex justify-between mt-3 border-t pt-2 text-[9px] font-bold uppercase">
                        <span>👷 ${h.tec}</span>
                        <span class="${h.est==='Abierta'?'text-blue-600':'text-green-600'}">${h.est}</span>
                    </div>
                </div>
            `).join("");
            showL(false);
        }

        function descargarOC() {
            const edif = document.getElementById('e-edif').value;
            const vencidos = document.querySelectorAll('.vencido-anim h4');
            if(vencidos.length === 0) return alert("No hay equipos vencidos.");
            
            let contenido = `SGM FIUNNE - REQUERIMIENTO DE RECARGA\nEDIFICIO: ${edif}\nFECHA: ${new Date().toLocaleDateString()}\n\n`;
            vencidos.forEach(el => contenido += `- ${el.innerText}\n`);
            
            const blob = new Blob([contenido], {type:'text/plain'});
            const a = document.createElement('a');
            a.download = `OC_Extintores_${edif}_${new Date().getTime()}.txt`;
            a.href = window.URL.createObjectURL(blob);
            a.click();
        }

        // ... Resto de funciones de inicialización y guardado ...
    </script>
</body>
</html>
