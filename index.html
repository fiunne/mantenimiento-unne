<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGM PRO 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: none; justify-content: center; align-items: center; z-index: 3000; flex-direction: column; }
        .tab-active { border-bottom: 4px solid #1e40af; color: #1e40af; font-weight: bold; background: #f8fafc; }
        .card-vencida { border-left: 8px solid #ef4444; background: #fff1f2; }
        .card-proxima { border-left: 8px solid #f59e0b; background: #fffbeb; }
        .card-ok { border-left: 8px solid #22c55e; background: #f0fdf4; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 p-2 text-slate-800">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[2000] p-4">
        <div class="bg-white p-10 rounded-[45px] shadow-2xl w-full max-w-sm text-center">
            <h2 class="font-black text-2xl mb-8 uppercase tracking-tighter text-blue-900">SGM INGENIERÍA</h2>
            <input type="password" id="pin-input" placeholder="PIN" class="w-full border-2 p-5 rounded-3xl text-center text-4xl mb-6 outline-none focus:border-blue-500">
            <button onclick="verificarAcceso()" class="w-full bg-blue-600 text-white font-black py-5 rounded-3xl uppercase shadow-lg active:scale-95 transition-all">Entrar</button>
        </div>
    </div>

    <div id="loader" class="loading-overlay">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-black text-blue-900 text-[10px] uppercase animate-pulse">Sincronizando Sistema...</p>
    </div>

    <div id="main-content" class="max-w-4xl mx-auto bg-white rounded-[40px] shadow-xl p-4 hidden mt-2 mb-10 overflow-hidden">
        
        <div class="flex border-b mb-6 overflow-x-auto no-scrollbar text-[10px] font-black uppercase whitespace-nowrap bg-white sticky top-0 z-50">
            <button onclick="tab('nueva')" id="btn-nueva" class="flex-1 py-5 tab-active">Nueva OT</button>
            <button onclick="tab('pendientes')" id="btn-pendientes" class="flex-1 py-5 text-slate-400">Cerrar OT</button>
            <button onclick="tab('relev')" id="btn-relev" class="flex-1 py-5 text-blue-600">Relevamiento</button>
            <button onclick="tab('extintores')" id="btn-extintores" class="flex-1 py-5 text-red-500">Extintores</button>
            <button onclick="tab('historial')" id="btn-historial" class="flex-1 py-5 text-slate-400">Historial</button>
        </div>

        <div id="sec-pendientes" class="hidden space-y-4">
            <p class="text-[10px] font-black text-slate-400 uppercase ml-2">Seleccione Orden de Trabajo</p>
            <select id="c-lista" class="w-full p-4 border-2 border-green-100 rounded-2xl font-black bg-green-50 text-xs"></select>
            
            <div class="p-5 bg-slate-50 rounded-[35px] border-2 border-dashed border-slate-200 space-y-3">
                <p class="text-[9px] font-black text-slate-400 uppercase text-center">Insumos de Almacén</p>
                <select id="m-rub" onchange="loadG()" class="w-full p-3 border rounded-xl bg-white text-xs font-bold"></select>
                <div class="grid grid-cols-2 gap-2">
                    <select id="m-gru" onchange="loadI()" class="p-3 border rounded-xl bg-white text-xs" disabled><option>Grupo...</option></select>
                    <select id="m-ite" class="p-3 border rounded-xl bg-white text-[10px]" disabled><option>Item...</option></select>
                </div>
                <div class="flex gap-2 items-center">
                    <input type="number" id="m-cant" value="1" class="w-20 p-3 border-2 border-blue-200 rounded-xl text-center font-black">
                    <button onclick="addItem()" class="flex-1 bg-slate-800 text-white p-3 rounded-xl font-black text-[10px] uppercase">Añadir Material</button>
                </div>
                <div id="cesta" class="space-y-1"></div>
            </div>

            <textarea id="c-obs" placeholder="Observaciones finales del técnico..." class="w-full p-4 border rounded-2xl bg-slate-50 text-xs" rows="3"></textarea>
            <button onclick="cerrarOT()" class="w-full bg-green-600 text-white p-6 rounded-[35px] font-black uppercase shadow-lg active:scale-95 transition-all">Cerrar Orden y Actualizar Stock</button>
        </div>

        <div id="sec-nueva" class="space-y-4">
            <div class="grid grid-cols-2 gap-2">
                <select id="n-tipo" class="p-4 bg-slate-50 border rounded-2xl text-xs font-bold"><option>Correctivo</option><option>Preventivo</option><option>Mejora</option></select>
                <select id="n-rubro" onchange="checkRefrig()" class="p-4 bg-slate-50 border rounded-2xl text-xs font-bold"><option>Electricidad</option><option>General</option><option>Refrigeración</option><option>Herrería</option></select>
            </div>
            <select id="n-edif" onchange="loadCascada('n-edif','n-sec','n-ubi','dbU')" class="w-full p-4 border-2 border-blue-100 rounded-2xl text-xs font-black bg-blue-50"></select>
            <select id="n-sec" onchange="filterUbi('n-sec','n-ubi','dbU')" class="w-full p-4 border rounded-2xl text-xs" disabled><option>Sector...</option></select>
            <select id="n-ubi" onchange="autoFill()" class="w-full p-4 border rounded-2xl text-xs font-bold" disabled><option>Ubicación...</option></select>
            <div id="div-refrig" class="hidden grid grid-cols-2 gap-2 bg-blue-50 p-4 rounded-2xl border border-blue-100">
                <input id="n-inv" placeholder="N° Inv" class="p-3 border rounded-xl bg-white text-xs" readonly>
                <input id="n-eq" placeholder="Equipo" class="p-3 border rounded-xl bg-white text-xs" readonly>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input id="n-rep" placeholder="Reportó..." class="p-4 border rounded-2xl text-xs bg-slate-50">
                <select id="n-tec" class="p-4 border-2 border-yellow-200 rounded-2xl text-xs font-black bg-yellow-50"><option value="">Técnico...</option><option>DSF</option><option>AGL</option><option>MAP</option><option>RRG</option></select>
            </div>
            <textarea id="n-desc" placeholder="Descripción de la tarea..." class="w-full p-4 border rounded-2xl bg-slate-50 text-xs" rows="3"></textarea>
            <button onclick="saveOT()" class="w-full bg-blue-700 text-white p-5 rounded-3xl font-black uppercase shadow-lg">Generar Orden</button>
        </div>

        <div id="sec-relev" class="hidden"><p class="text-center p-10 font-bold">Módulo Relevamiento Activo</p></div>
        <div id="sec-extintores" class="hidden"><p class="text-center p-10 font-bold">Módulo Extintores Activo</p></div>
        <div id="sec-historial" class="hidden"><p class="text-center p-10 font-bold">Módulo Historial Activo</p></div>

    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxvI_4TsVZY65PUo6xqgIK4hG1OtbqCB50VA2YkChgTcvdD6XLyYTFwwibv8UdtXcAh/exec"; // RECUERDA CAMBIAR ESTO
        const PIN_CORRECTO = "4370";
        let dbU = [], dbR = [], dbM = {}, cesta = [], dbH = [];

        function showL(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }

        window.onload = () => { if(localStorage.getItem('sgm_session') === PIN_CORRECTO) loginExitoso(); };

        function verificarAcceso() {
            if(document.getElementById('pin-input').value === PIN_CORRECTO) {
                localStorage.setItem('sgm_session', PIN_CORRECTO);
                loginExitoso();
            } else alert("PIN Incorrecto");
        }

        function loginExitoso() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            init();
        }

        async function init() {
            showL(true);
            try {
                const eds = await fetch(`${URL}?action=getEdificios&token=${PIN_CORRECTO}`).then(r=>r.json());
                ['n-edif'].forEach(id => {
                    document.getElementById(id).innerHTML = '<option value="">Seleccione Edificio...</option>' + eds.map(e=>`<option value="${e}">${e}</option>`).join("");
                });
                // Cargamos materiales para tenerlos listos
                dbM = await fetch(`${URL}?action=getMateriales&token=${PIN_CORRECTO}`).then(r=>r.json());
                document.getElementById('m-rub').innerHTML = '<option value="">1. Rubro (Hoja)</option>' + Object.keys(dbM).map(x=>`<option value="${x}">${x}</option>`).join("");
            } catch(e) { console.error(e); }
            showL(false);
        }

        function tab(t) {
            ['nueva','pendientes','relev','extintores','historial'].forEach(s => {
                document.getElementById('sec-'+s).classList.toggle('hidden', s!==t);
                document.getElementById('btn-'+s).classList.toggle('tab-active', s===t);
            });
            if(t==='pendientes') loadAbiertas();
        }

        // --- LÓGICA DE CIERRE Y MATERIALES ---
        async function loadAbiertas() {
            showL(true);
            const d = await fetch(`${URL}?action=getAbiertas&token=${PIN_CORRECTO}`).then(r=>r.json());
            document.getElementById('c-lista').innerHTML = d.map(o=>`<option value="${o.id}">${o.detalle}</option>`).join("");
            showL(false);
        }

        function loadG() {
            const rubro = document.getElementById('m-rub').value;
            if(!rubro) return;
            const grupos = Object.keys(dbM[rubro]);
            document.getElementById('m-gru').innerHTML = '<option value="">2. Grupo...</option>' + grupos.map(x=>`<option value="${x}">${x}</option>`).join("");
            document.getElementById('m-gru').disabled = false;
        }

        function loadI() {
            const rubro = document.getElementById('m-rub').value;
            const grupo = document.getElementById('m-gru').value;
            if(!grupo) return;
            document.getElementById('m-ite').innerHTML = '<option value="">3. Item...</option>' + dbM[rubro][grupo].map(x=>`<option value='${JSON.stringify(x)}'>${x.nombre} (Stock: ${x.stock})</option>`).join("");
            document.getElementById('m-ite').disabled = false;
        }

        function addItem() {
            const itRaw = document.getElementById('m-ite').value;
            if(!itRaw) return;
            const it = JSON.parse(itRaw);
            const cant = document.getElementById('m-cant').value;
            cesta.push({nombre: it.nombre, cantidad: cant, hoja: it.hoja});
            renderCesta();
        }

        function renderCesta() {
            document.getElementById('cesta').innerHTML = cesta.map((x,i)=>`
            <div class="flex justify-between bg-blue-600 text-white p-2 rounded-xl text-[9px] font-bold">
                <span>${x.cantidad} x ${x.nombre}</span>
                <button onclick="cesta.splice(${i},1);renderCesta()" class="bg-white text-blue-600 w-5 h-5 rounded-full">X</button>
            </div>`).join("");
        }

        async function cerrarOT() {
            const idOT = document.getElementById('c-lista').value;
            if(!idOT) return alert("Seleccione una OT");
            showL(true);
            const data = {
                action: 'cerrarOT',
                token: PIN_CORRECTO,
                idOT: idOT,
                materialesUsados: cesta.map(x=>`${x.cantidad} ${x.nombre}`).join(", "),
                listaParaDescontar: cesta,
                comentarioFinal: document.getElementById('c-obs').value
            };
            try {
                const res = await fetch(URL, {method:'POST', body: JSON.stringify(data)});
                const txt = await res.text();
                if(txt === "Ok") { alert("OT CERRADA Y STOCK ACTUALIZADO"); location.reload(); }
                else { throw new Error(txt); }
            } catch(e) {
                alert("Error al cerrar: " + e.message);
                showL(false);
            }
        }

        // --- FUNCIONES DE NUEVA OT (MANTENIDAS) ---
        async function loadCascada(edId, secId, ubiId, dbName) {
            const ed = document.getElementById(edId).value; if(!ed) return;
            showL(true);
            const r = await fetch(`${URL}?action=getSectores&edificio=${encodeURIComponent(ed)}&token=${PIN_CORRECTO}`).then(r=>r.json());
            dbU = r;
            document.getElementById(secId).innerHTML = '<option value="">Sector...</option>' + [...new Set(r.map(x=>x.sector))].map(s=>`<option value="${s}">${s}</option>`).join("");
            document.getElementById(secId).disabled = false;
            showL(false);
        }

        function filterUbi(secId, ubiId) {
            const s = document.getElementById(secId).value;
            document.getElementById(ubiId).innerHTML = '<option value="">Ubicación...</option>' + dbU.filter(x=>x.sector===s).map(x=>`<option value='${JSON.stringify(x)}'>${x.ubi}</option>`).join("");
            document.getElementById(ubiId).disabled = false;
        }

        function autoFill() {
            const d = JSON.parse(document.getElementById('n-ubi').value);
            document.getElementById('n-inv').value = d.inv_aire || "N/A";
            document.getElementById('n-eq').value = d.eq_aire || "N/A";
        }
    </script>
</body>
</html>
