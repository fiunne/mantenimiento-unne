<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGM PRO 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .tab-active { border-bottom: 4px solid #1e40af; color: #1e40af; font-weight: bold; background: white; }
        .card-vencida { border-left: 8px solid #ef4444; background: #fff1f2; }
        .card-ok { border-left: 8px solid #22c55e; background: #f0fdf4; }
    </style>
</head>
<body class="bg-gray-100 p-2 text-gray-800 font-sans">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[2000] p-4">
        <div class="bg-white p-8 rounded-[40px] shadow-2xl w-full max-w-sm text-center">
            <h2 class="font-black text-xl mb-6 uppercase">SGM LOGIN</h2>
            <input type="password" id="pin-input" placeholder="PIN" class="w-full border-2 p-4 rounded-3xl text-center text-3xl mb-4">
            <button onclick="verificarAcceso()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-3xl">ENTRAR</button>
        </div>
    </div>

    <div id="loader" class="loading-overlay">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-bold text-blue-800 animate-pulse uppercase text-xs">Sincronizando...</p>
    </div>

    <div id="main-content" class="max-w-4xl mx-auto bg-white rounded-3xl shadow-lg p-3 hidden">
        <div class="flex border-b mb-4 overflow-x-auto text-[10px] font-black uppercase whitespace-nowrap">
            <button onclick="tab('nueva')" id="btn-nueva" class="flex-1 py-4 tab-active">Nueva OT</button>
            <button onclick="tab('pendientes')" id="btn-pendientes" class="flex-1 py-4 text-gray-400">Cerrar OT</button>
            <button onclick="tab('extintores')" id="btn-extintores" class="flex-1 py-4 text-red-500">🛡️ Extintores</button>
            <button onclick="tab('historial')" id="btn-historial" class="flex-1 py-4 text-gray-400">Historial</button>
        </div>

        <div id="sec-nueva" class="space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <select id="n-tipo" class="p-3 border rounded-xl text-xs"><option>Correctivo</option><option>Preventivo</option><option>Mejora</option></select>
                <select id="n-rubro" onchange="checkRefrig()" class="p-3 border rounded-xl text-xs"><option>Electricidad</option><option>General</option><option>Refrigeración</option></select>
            </div>
            <select id="n-edif" onchange="loadCascada('n-edif','n-sec','n-ubi')" class="w-full p-3 border rounded-xl text-xs font-bold bg-blue-50"></select>
            <select id="n-sec" onchange="filterUbi('n-sec','n-ubi')" class="w-full p-3 border rounded-xl text-xs" disabled><option>Sector...</option></select>
            <select id="n-ubi" onchange="autoFill()" class="w-full p-3 border rounded-xl text-xs" disabled><option>Ubicación...</option></select>
            
            <div id="div-refrig" class="hidden grid grid-cols-2 gap-2">
                <input id="n-inv" placeholder="Inventario" class="p-3 bg-gray-100 border rounded-xl text-xs" readonly>
                <input id="n-eq" placeholder="Equipo" class="p-3 bg-gray-100 border rounded-xl text-xs" readonly>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <input id="n-rep" placeholder="Reportado por" class="p-3 border rounded-xl text-xs">
                <select id="n-tec" class="p-3 border rounded-xl text-xs font-bold"><option value="">Técnico...</option><option>DSF</option><option>AGL</option><option>MAP</option><option>RRG</option></select>
            </div>
            <textarea id="n-desc" placeholder="Descripción del trabajo..." class="w-full p-3 border rounded-xl text-xs" rows="3"></textarea>
            <button onclick="saveOT()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold uppercase shadow-lg">Guardar OT</button>
        </div>

        <div id="sec-pendientes" class="hidden space-y-3">
            <select id="c-lista" class="w-full p-3 border rounded-xl text-xs font-bold bg-green-50"></select>
            <div class="p-3 bg-gray-50 rounded-2xl border space-y-2">
                <div class="grid grid-cols-3 gap-1">
                    <select id="m-rub" onchange="loadG()" class="p-2 border rounded-lg text-[10px]"><option value="">Rubro</option></select>
                    <select id="m-gru" onchange="loadI()" class="p-2 border rounded-lg text-[10px]" disabled><option value="">Grupo</option></select>
                    <select id="m-ite" class="p-2 border rounded-lg text-[10px]" disabled><option value="">Item</option></select>
                </div>
                <div class="flex gap-2">
                    <input type="number" id="m-cant" value="1" class="w-16 p-2 border rounded-lg text-center font-bold">
                    <button onclick="addItem()" class="flex-1 bg-slate-800 text-white rounded-lg text-xs font-bold">AÑADIR MATERIAL</button>
                </div>
                <div id="cesta" class="text-[10px] font-bold text-blue-700"></div>
            </div>
            <textarea id="c-obs" placeholder="Observaciones de cierre..." class="w-full p-3 border rounded-xl text-xs"></textarea>
            <button onclick="cerrarOT()" class="w-full bg-green-700 text-white p-4 rounded-2xl font-bold uppercase shadow-lg">Cerrar y Descontar</button>
        </div>

        <div id="sec-extintores" class="hidden space-y-3 text-center">
            <select id="e-edif" onchange="loadExt()" class="w-full p-4 bg-slate-800 text-white rounded-2xl font-bold text-xs"></select>
            <div id="e-lista" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[500px] overflow-y-auto"></div>
        </div>

        <div id="sec-historial" class="hidden space-y-2" id="hist-lista"></div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzsdrDEV6-LYL2at09jXCGtl3YZetnowDBs5Fs31gnHdd1nXJCcCsYk2nSUEDIANQ7Y/exec"; 
        const PIN_CORRECTO = "4370";
        let dbU = [], dbM = {}, cesta = [];

        function showL(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }

        function verificarAcceso() {
            if(document.getElementById('pin-input').value === PIN_CORRECTO) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                init();
            } else alert("PIN Incorrecto");
        }

        async function init() {
            showL(true);
            const r = await fetch(`${URL}?action=getEdificios&token=${PIN_CORRECTO}`).then(r=>r.json());
            ['n-edif','e-edif'].forEach(id => {
                document.getElementById(id).innerHTML = '<option value="">Seleccionar Edificio...</option>' + r.map(e=>`<option value="${e}">${e}</option>`).join("");
            });
            dbM = await fetch(`${URL}?action=getMateriales&token=${PIN_CORRECTO}`).then(r=>r.json());
            document.getElementById('m-rub').innerHTML = '<option value="">Rubro</option>' + Object.keys(dbM).map(x=>`<option value="${x}">${x}</option>`).join("");
            showL(false);
        }

        function tab(t) {
            ['nueva','pendientes','extintores','historial'].forEach(s => {
                document.getElementById('sec-'+s).classList.toggle('hidden', s!==t);
                document.getElementById('btn-'+s).classList.toggle('tab-active', s===t);
            });
            if(t==='pendientes') loadAbiertas();
            if(t==='historial') loadHist();
        }

        // Cascada Nueva OT
        async function loadCascada(edId, secId, ubiId) {
            const ed = document.getElementById(edId).value; if(!ed) return;
            showL(true);
            dbU = await fetch(`${URL}?action=getSectores&edificio=${encodeURIComponent(ed)}&token=${PIN_CORRECTO}`).then(r=>r.json());
            const sec = document.getElementById(secId);
            sec.innerHTML = '<option value="">Sector...</option>' + [...new Set(dbU.map(x=>x.sector))].map(s=>`<option value="${s}">${s}</option>`).join("");
            sec.disabled = false;
            showL(false);
        }

        function filterUbi(secId, ubiId) {
            const s = document.getElementById(secId).value;
            const u = document.getElementById(ubiId);
            u.innerHTML = '<option value="">Ubicación...</option>' + dbU.filter(x=>x.sector===s).map(x=>`<option value='${JSON.stringify(x)}'>${x.ubi}</option>`).join("");
            u.disabled = false;
        }

        function autoFill() {
            const d = JSON.parse(document.getElementById('n-ubi').value);
            document.getElementById('n-inv').value = d.inv_aire;
            document.getElementById('n-eq').value = d.eq_aire;
        }

        function checkRefrig() {
            document.getElementById('div-refrig').classList.toggle('hidden', document.getElementById('n-rubro').value !== "Refrigeración");
        }

        async function saveOT() {
            showL(true);
            const u = JSON.parse(document.getElementById('n-ubi').value);
            const p = {
                action: 'nuevaOT', token: PIN_CORRECTO,
                tipo: document.getElementById('n-tipo').value, especialidad: document.getElementById('n-rubro').value,
                edificio: document.getElementById('n-edif').value, sector: document.getElementById('n-sec').value,
                ubicacion: u.ubi, nInventario: document.getElementById('n-inv').value, equipo: document.getElementById('n-eq').value,
                reportadoPor: document.getElementById('n-rep').value, medioReporte: "WhatsApp", personal: document.getElementById('n-tec').value,
                descripcion: document.getElementById('n-desc').value, estado: "Abierta"
            };
            await fetch(URL, {method:'POST', body: JSON.stringify(p)});
            alert("OT Creada"); location.reload();
        }

        // Cierre y Materiales
        async function loadAbiertas() {
            const d = await fetch(`${URL}?action=getAbiertas&token=${PIN_CORRECTO}`).then(r=>r.json());
            document.getElementById('c-lista').innerHTML = d.map(o=>`<option value="${o.id}">${o.detalle}</option>`).join("");
        }

        function loadG() {
            const r = document.getElementById('m-rub').value;
            const g = document.getElementById('m-gru');
            g.innerHTML = '<option value="">Grupo</option>' + Object.keys(dbM[r]).map(x=>`<option value="${x}">${x}</option>`).join("");
            g.disabled = false;
        }

        function loadI() {
            const r = document.getElementById('m-rub').value;
            const g = document.getElementById('m-gru').value;
            const i = document.getElementById('m-ite');
            i.innerHTML = '<option value="">Item</option>' + dbM[r][g].map(x=>`<option value='${JSON.stringify(x)}'>${x.nombre} (Stock: ${x.stock})</option>`).join("");
            i.disabled = false;
        }

        function addItem() {
            const raw = document.getElementById('m-ite').value; if(!raw) return;
            const item = JSON.parse(raw);
            cesta.push({nombre: item.nombre, cantidad: parseInt(document.getElementById('m-cant').value), hoja: item.hoja});
            document.getElementById('cesta').innerHTML = cesta.map((x,idx)=>`<div>${x.cantidad} x ${x.nombre} <span class='text-red-500' onclick='cesta.splice(${idx},1);addItem()'>[X]</span></div>`).join("");
        }

        async function cerrarOT() {
            showL(true);
            const p = {
                action: 'cerrarOT', token: PIN_CORRECTO,
                idOT: document.getElementById('c-lista').value,
                materialesUsados: cesta.map(x=>`${x.cantidad} ${x.nombre}`).join(", "),
                listaParaDescontar: cesta,
                comentarioFinal: document.getElementById('c-obs').value
            };
            await fetch(URL, {method:'POST', body: JSON.stringify(p)});
            alert("OT Cerrada y Stock actualizado"); location.reload();
        }

        // Extintores
        async function loadExt() {
            const ed = document.getElementById('e-edif').value; if(!ed) return;
            showL(true);
            const d = await fetch(`${URL}?action=getExtintores&edificio=${encodeURIComponent(ed)}&token=${PIN_CORRECTO}`).then(r=>r.json());
            const list = document.getElementById('e-lista'); list.innerHTML = "";
            d.forEach(x => {
                const color = x.f_venc.includes('2024') ? 'card-vencida' : 'card-ok'; // Lógica simple de prueba
                list.innerHTML += `
                    <div class="p-4 rounded-3xl border shadow-sm text-left ${color}">
                        <p class="font-black text-blue-900">${x.serie}</p>
                        <p class="text-[10px] font-bold uppercase">${x.tipo} ${x.cap}kg</p>
                        <p class="text-[9px] text-gray-500 uppercase">${x.sector} - ${x.ubi}</p>
                        <div class="grid grid-cols-2 gap-2 mt-2 pt-2 border-t text-[10px] font-bold">
                            <div>CARGA: ${x.f_carga}</div>
                            <div>VENCE: ${x.f_venc}</div>
                        </div>
                    </div>`;
            });
            showL(false);
        }

        async function loadHist() {
            showL(true);
            const d = await fetch(`${URL}?action=getHistorial&token=${PIN_CORRECTO}`).then(r=>r.json());
            document.getElementById('sec-historial').innerHTML = d.map(o=>`
                <div class="bg-gray-50 p-3 rounded-2xl border text-[10px] border-l-4 ${o.est==='Abierta'?'border-l-orange-500':'border-l-blue-500'}">
                    <div class="flex justify-between font-bold"><span>${o.id}</span><span>${o.fecha}</span></div>
                    <p class="uppercase font-bold">${o.edif} | ${o.tec}</p>
                    <p class="text-gray-600">${o.tarea}</p>
                </div>`).join("");
            showL(false);
        }
    </script>
</body>
</html>
