<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGM PRO 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .tab-active { background-color: #1e40af !important; color: white !important; font-weight: bold; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { background-color: #f3f4f6; } /* Gris claro de fondo */
    </style>
</head>
<body class="p-2 text-gray-800 font-sans">

    <div id="login-screen" class="fixed inset-0 bg-blue-900 flex items-center justify-center z-[2000] p-6">
        <div class="bg-white p-8 rounded-[40px] shadow-2xl w-full max-w-sm text-center">
            <h1 class="text-2xl font-black text-blue-900 mb-6 uppercase tracking-tighter">SGM PRO 2026</h1>
            <input type="password" id="pin" placeholder="••••" class="w-full text-center text-3xl p-4 bg-gray-50 border-2 border-gray-100 rounded-3xl mb-4 outline-none">
            <button onclick="checkL()" class="w-full bg-blue-600 text-white py-4 rounded-3xl font-bold uppercase tracking-widest">Entrar</button>
        </div>
    </div>

    <div id="main-app" class="hidden max-w-lg mx-auto pb-24">
        
        <nav class="flex overflow-x-auto gap-2 mb-6 p-1 no-scrollbar justify-start">
            <button onclick="st(1)" id="t1" class="tab-active bg-white whitespace-nowrap px-6 py-2 rounded-full shadow-sm text-sm border border-gray-200 text-blue-800">Nueva OT</button>
            <button onclick="st(2); loadAbiertas();" id="t2" class="bg-white whitespace-nowrap px-6 py-2 rounded-full shadow-sm text-sm border border-gray-200 text-gray-500">Cerrar OT</button>
            <button onclick="st(3)" id="t3" class="bg-white whitespace-nowrap px-6 py-2 rounded-full shadow-sm text-sm border border-gray-200 text-gray-500">Relevamiento</button>
        </nav>

        <section id="s1" class="bg-white p-6 rounded-[40px] shadow-sm border border-gray-100 space-y-4">
            <h3 class="font-black text-blue-800 mb-4 uppercase flex items-center gap-2">
                <span class="w-1.5 h-6 bg-blue-600 rounded-full"></span> EMISIÓN DE OT
            </h3>
            
            <div class="grid grid-cols-2 gap-3">
                <select id="tipo" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm outline-none"><option>Correctivo</option><option>Preventivo</option></select>
                <select id="prioridad" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm outline-none"><option>Baja</option><option selected>Media</option><option>Alta</option></select>
            </div>

            <select id="rubro" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm outline-none"><option>Aire Acondicionado</option><option>Electricidad</option><option>Sanitarios</option><option>Edificio</option></select>

            <div class="space-y-1">
                <label class="text-[10px] font-bold text-blue-600 ml-3 uppercase">Edificio</label>
                <select id="edificio" onchange="fetchSectores()" class="w-full p-4 bg-blue-50 border border-blue-100 rounded-2xl text-sm font-bold outline-none"></select>
            </div>

            <div id="div-sector" class="hidden space-y-1">
                <label class="text-[10px] font-bold text-blue-600 ml-3 uppercase">Sector (Ala/Área)</label>
                <select id="sector" onchange="filterLocales()" class="w-full p-4 bg-white border-2 border-blue-200 rounded-2xl text-sm font-bold outline-none"></select>
            </div>

            <div id="div-local" class="hidden space-y-1">
                <label class="text-[10px] font-bold text-blue-600 ml-3 uppercase">Local Específico</label>
                <select id="local" onchange="autoFill()" class="w-full p-4 bg-white border-2 border-blue-400 rounded-2xl text-sm font-bold outline-none"></select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input id="h-i" readonly placeholder="N° Inventario" class="p-4 bg-gray-100 border rounded-2xl text-xs text-gray-500">
                <input id="h-e" readonly placeholder="Equipo" class="p-4 bg-gray-100 border rounded-2xl text-xs text-gray-500">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-400 ml-3 uppercase">Personal Técnico</label>
                <select id="tec" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold">
                    <option>Téc. Arrieta</option><option>Téc. Coria</option><option>Téc. Orellano</option><option>Téc. Sosa</option><option>Mantenimiento General</option>
                </select>
            </div>

            <textarea id="desc" rows="3" placeholder="Descripción de la tarea..." class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm outline-none"></textarea>
            
            <button onclick="saveOT()" class="w-full bg-blue-600 text-white p-5 rounded-3xl font-black text-md shadow-xl active:scale-95 transition-all uppercase">Emitir Orden</button>
        </section>

        <section id="s2" class="hidden bg-white p-6 rounded-[40px] shadow-sm border border-gray-100 space-y-4">
            <h3 class="font-black text-red-800 uppercase flex items-center gap-2"><span class="w-1.5 h-6 bg-red-600 rounded-full"></span> Cerrar OT</h3>
            <select id="abiertas-list" class="w-full p-4 bg-red-50 border border-red-100 rounded-2xl text-sm font-bold"></select>
            <textarea id="c-com" placeholder="Observaciones de cierre..." class="w-full p-4 bg-gray-50 border rounded-2xl text-sm outline-none"></textarea>
            <button onclick="cerrarOT()" class="w-full bg-red-600 text-white p-5 rounded-3xl font-bold shadow-lg uppercase">Finalizar Tarea</button>
        </section>
    </div>

    <div id="loader" class="loading-overlay">
        <div class="w-12 h-12 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxXnNUutTr7ecUkChI-etkO8yuFuoZALkDIBft_JVZB3FkDantoZ01i3If_rmtwrSw/exec"; 
        const TOKEN = "4370";
        let RAW_DATA = [];

        function checkL() {
            if(document.getElementById('pin').value === "4370") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                loadEdificios();
            } else { alert("PIN Incorrecto"); }
        }

        function st(n) {
            for(let i=1; i<=3; i++) {
                document.getElementById('s'+i)?.classList.add('hidden');
                document.getElementById('t'+i)?.classList.remove('tab-active');
            }
            document.getElementById('s'+n).classList.remove('hidden');
            document.getElementById('t'+n).classList.add('tab-active');
        }

        function showL(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }

        async function loadEdificios() {
            showL(true);
            const res = await fetch(`${URL}?action=getEdificios&token=${TOKEN}`).then(r=>r.json());
            document.getElementById('edificio').innerHTML = '<option value="">Seleccione Edificio...</option>' + res.map(e => `<option value="${e}">${e}</option>`).join('');
            showL(false);
        }

        async function fetchSectores() {
            const edif = document.getElementById('edificio').value;
            if(!edif) return;
            showL(true);
            RAW_DATA = await fetch(`${URL}?action=getSectores&edificio=${encodeURIComponent(edif)}&token=${TOKEN}`).then(r=>r.json());
            
            // Filtrar Sectores Únicos (Ala Sur, Ala Norte, etc)
            const sectoresUnicos = [...new Set(RAW_DATA.map(item => item.sector))];
            document.getElementById('sector').innerHTML = '<option value="">Seleccione Sector...</option>' + sectoresUnicos.map(s => `<option value="${s}">${s}</option>`).join('');
            
            document.getElementById('div-sector').classList.remove('hidden');
            document.getElementById('div-local').classList.add('hidden');
            showL(false);
        }

        function filterLocales() {
            const sectorSel = document.getElementById('sector').value;
            const localesFiltrados = RAW_DATA.filter(item => item.sector === sectorSel);
            
            document.getElementById('local').innerHTML = '<option value="">Seleccione Local...</option>' + localesFiltrados.map((l, i) => `<option value="${l.ubi}" data-orig-idx="${RAW_DATA.indexOf(l)}">${l.ubi}</option>`).join('');
            document.getElementById('div-local').classList.remove('hidden');
        }

        function autoFill() {
            const localSel = document.getElementById('local');
            const idx = localSel.options[localSel.selectedIndex].dataset.origIdx;
            const data = RAW_DATA[idx];
            document.getElementById('h-i').value = data.inv_aire || "N/A";
            document.getElementById('h-e').value = data.eq_aire || "N/A";
        }

        async function saveOT() {
            showL(true);
            const p = {
                action: 'nuevaOT', token: TOKEN,
                tipo: document.getElementById('tipo').value, edificio: document.getElementById('edificio').value,
                sector: document.getElementById('sector').value, ubicacion: document.getElementById('local').value,
                nInventario: document.getElementById('h-i').value, equipo: document.getElementById('h-e').value,
                personal: document.getElementById('tec').value, descripcion: document.getElementById('desc').value,
                estado: "Abierta"
            };
            await fetch(URL, { method: 'POST', body: JSON.stringify(p) });
            alert("OT EMITIDA"); location.reload();
        }

        async function loadAbiertas() {
            showL(true);
            const res = await fetch(`${URL}?action=getAbiertas&token=${TOKEN}`).then(r=>r.json());
            document.getElementById('abiertas-list').innerHTML = res.map(o => `<option value="${o.id}">${o.detalle}</option>`).join('');
            showL(false);
        }
    </script>
</body>
</html>
