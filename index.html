<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGM PRO 2026 - FIUNNE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --fiunne-orange: #f06423; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 4px solid var(--fiunne-orange); color: var(--fiunne-orange); font-weight: 900; background: #fff7ed; }
        @media print { .no-print { display: none; } .print-only { display: block !important; } }
        .print-only { display: none; }
    </style>
</head>
<body class="p-2">

    <div id="loader" class="fixed inset-0 bg-black/80 hidden z-[5000] flex-col items-center justify-center text-white">
        <div class="w-10 h-10 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-2"></div>
        <p class="text-[10px] font-black uppercase">Procesando...</p>
    </div>

    <div id="ticket-pdf" class="print-only p-10 bg-white text-black">
        <h1 class="text-2xl font-bold border-b-2 pb-2">ORDEN DE TRABAJO - FIUNNE</h1>
        <div id="ticket-content" class="mt-4 space-y-2"></div>
    </div>

    <div class="max-w-4xl mx-auto pb-20 no-print">
        <header class="mb-4 p-4 bg-white rounded-2xl border shadow-sm">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-black text-slate-900 uppercase">Panel FIUNNE</h1>
                <span id="fecha-actual" class="text-[10px] font-black bg-slate-900 text-white px-3 py-1 rounded-lg uppercase"></span>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <div class="bg-blue-50 p-3 rounded-xl border text-center"><p class="text-[8px] font-black text-blue-500">OT ABIERTAS</p><p id="dash-ot" class="text-xl font-black">0</p></div>
                <div class="bg-slate-50 p-3 rounded-xl border text-center"><p class="text-[8px] font-black text-slate-500">EDIFICIOS</p><p id="dash-sec" class="text-xl font-black">0</p></div>
                <div class="bg-green-50 p-3 rounded-xl border text-center"><p class="text-[8px] font-black text-green-500">ESTADO HySL</p><p class="text-xl font-black">OK</p></div>
            </div>
        </header>

        <nav class="flex border-b mb-6 bg-white rounded-t-xl sticky top-0 z-50 shadow-sm overflow-x-auto">
            <button onclick="tab('nueva')" id="btn-nueva" class="flex-1 py-4 text-[10px] font-black uppercase">Nueva OT</button>
            <button onclick="tab('pendientes')" id="btn-pendientes" class="flex-1 py-4 text-[10px] font-black uppercase">Cerrar OT</button>
            <button onclick="tab('extintores')" id="btn-extintores" class="flex-1 py-4 text-[10px] font-black uppercase">Extintores</button>
            <button onclick="tab('historial')" id="btn-historial" class="flex-1 py-4 text-[10px] font-black uppercase">Historial</button>
        </nav>

        <div id="sec-nueva" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-2xl border shadow-sm space-y-3">
                <select id="n-edif" class="w-full p-4 border rounded-xl font-bold bg-slate-50"></select>
                <input type="text" id="n-ubi" placeholder="Ubicación específica..." class="w-full p-4 border rounded-xl text-sm">
                <textarea id="n-desc" placeholder="Descripción de la tarea..." class="w-full p-4 border rounded-xl text-sm h-24"></textarea>
                <div class="flex gap-2">
                    <button onclick="enviarOT()" class="flex-1 bg-[#f06423] text-white p-4 rounded-xl font-black uppercase shadow-lg">Registrar</button>
                    <button onclick="imprimirPDF()" class="bg-slate-800 text-white p-4 rounded-xl shadow-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    </button>
                </div>
            </div>
        </div>

        <div id="sec-extintores" class="hidden space-y-4">
            <div class="flex justify-between items-center bg-white p-4 rounded-xl border">
                <select id="e-edif" onchange="loadExtintores()" class="p-2 border rounded-lg text-xs font-bold"></select>
                <button onclick="generarTXT()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-black text-[10px] uppercase shadow-md">Descargar OC (TXT)</button>
            </div>
            <div id="ext-container" class="space-y-2"></div>
        </div>

        <div id="sec-historial" class="hidden space-y-2">
            <div id="hist-container"></div>
        </div>

        <div id="sec-pendientes" class="hidden space-y-4">
            <select id="c-lista" class="w-full p-4 border-2 border-orange-200 rounded-xl font-black bg-white text-xs"></select>
            <button class="w-full bg-green-600 text-white p-4 rounded-xl font-black uppercase shadow-lg">Finalizar Tarea</button>
        </div>

    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzQrm_X9lHdVdhKkUUOIf1QLcI-2vG6ePO8DovoF1uzJPsEUGdBU3NCkXw-kno5iBT0/exec";
        const PIN = "4370";

        function showL(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }

        // 1. ACTUALIZAR FECHA EN PORTADA
        function actualizarFecha() {
            const opciones = { day: '2-digit', month: 'short', year: 'numeric' };
            document.getElementById('fecha-actual').innerText = new Date().toLocaleDateString('es-AR', opciones);
        }

        function tab(name) {
            ['nueva', 'pendientes', 'extintores', 'historial'].forEach(s => {
                document.getElementById('sec-' + s).classList.add('hidden');
                document.getElementById('btn-' + s)?.classList.remove('tab-active');
            });
            document.getElementById('sec-' + name).classList.remove('hidden');
            document.getElementById('btn-' + name)?.classList.add('tab-active');
            if (name === 'pendientes') loadAbiertas();
            if (name === 'historial') loadHistorial();
            if (name === 'extintores') loadExtintores();
        }

        // 2. BOTÓN IMPRIMIR PDF
        function imprimirPDF() {
            const edif = document.getElementById('n-edif').value;
            const ubi = document.getElementById('n-ubi').value;
            const desc = document.getElementById('n-desc').value;
            
            if(!desc) return alert("Complete la descripción antes de imprimir.");

            document.getElementById('ticket-content').innerHTML = `
                <p><strong>Fecha:</strong> ${new Date().toLocaleString()}</p>
                <p><strong>Edificio:</strong> ${edif}</p>
                <p><strong>Ubicación:</strong> ${ubi}</p>
                <hr>
                <p><strong>Descripción:</strong><br>${desc}</p>
                <br><br><br>
                <div style="border-top: 1px solid black; width: 200px; text-align: center;">Firma Responsable</div>
            `;
            window.print();
        }

        // 3. BOTÓN GENERAR TXT (EXTINTORES)
        function generarTXT() {
            const container = document.getElementById('ext-container');
            const items = container.querySelectorAll('.ext-item');
            if(items.length === 0) return alert("No hay datos para exportar.");

            let contenido = "ORDEN DE CARGA/MANTENIMIENTO - HySL FIUNNE\n";
            contenido += "==========================================\n\n";
            
            items.forEach(div => {
                contenido += div.innerText.replace(/\n/g, " | ") + "\n";
            });

            const blob = new Blob([contenido], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = `OC_Extintores_${new Date().getTime()}.txt`;
            link.click();
        }

        async function loadExtintores() {
            showL(true);
            const edif = document.getElementById('e-edif').value || "Edificio Principal";
            const cont = document.getElementById('ext-container');
            try {
                const res = await fetch(`${URL}?action=getExtintores&token=${PIN}&edificio=${encodeURIComponent(edif)}`);
                const data = await res.json();
                cont.innerHTML = data.map(e => `
                    <div class="ext-item bg-white p-3 rounded-lg border shadow-sm flex justify-between text-xs">
                        <div>
                            <p class="font-black text-orange-600">${e.tipo} ${e.cap}</p>
                            <p>S/N: ${e.serie} - ${e.sector}</p>
                        </div>
                        <div class="text-right font-bold text-red-600">Vence: ${e.f_venc}</div>
                    </div>
                `).join("");
            } catch (e) { console.log(e); }
            showL(false);
        }

        async function loadAbiertas() {
            showL(true);
            try {
                const res = await fetch(`${URL}?action=getAbiertas&token=${PIN}`);
                const data = await res.json();
                document.getElementById('dash-ot').innerText = data.length;
                document.getElementById('c-lista').innerHTML = data.map(o => `<option value="${o.id}">#${o.id} - ${o.ubi} - ${o.detalle}</option>`).join("");
            } catch (e) { }
            showL(false);
        }

        async function loadHistorial() {
            showL(true);
            try {
                const res = await fetch(`${URL}?action=getHistorial&token=${PIN}`);
                const data = await res.json();
                document.getElementById('hist-container').innerHTML = data.map(h => `
                    <div class="bg-white p-3 rounded-lg border-l-4 ${h.est === 'Cerrada' ? 'border-green-500' : 'border-blue-500'} mb-2 text-[10px]">
                        <div class="flex justify-between font-black"><span>#${h.id}</span><span>${h.fecha}</span></div>
                        <p class="uppercase font-bold">${h.edif} - ${h.tarea}</p>
                    </div>
                `).join("");
            } catch (e) { }
            showL(false);
        }

        async function init() {
            actualizarFecha();
            showL(true);
            try {
                const res = await fetch(`${URL}?action=getEdificios&token=${PIN}`);
                const eds = await res.json();
                const opt = eds.map(e => `<option value="${e}">${e}</option>`).join("");
                document.getElementById('n-edif').innerHTML = opt;
                document.getElementById('e-edif').innerHTML = opt;
                document.getElementById('dash-sec').innerText = eds.length;
                loadAbiertas();
                tab('nueva');
            } catch (e) { console.error(e); }
            showL(false);
        }

        window.onload = init;
    </script>
</body>
</html>
