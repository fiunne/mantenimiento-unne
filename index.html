<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión OT 2026</title>
    <style>
        :root { --primary: #0056b3; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; max-width: 800px; margin: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-weight: bold; font-size: 0.8em; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .full { grid-column: span 2; }
        button { width: 100%; padding: 15px; margin-top: 10px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; }
        .btn-save { background: var(--primary); color: white; }
        #loader { color: #0056b3; font-weight: bold; display: none; text-align: center; padding: 10px; background: #e7f0ff; border-radius: 5px; margin-bottom: 15px; }
        @media print { .no-print { display: none; } .container { box-shadow: none; border: 1px solid #ccc; } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color: var(--primary);">Orden de Trabajo 2026</h2>
    <div id="loader">⌛ Conectando con Google Sheets...</div>
    
    <form id="otForm">
        <div class="grid">
            <div class="form-group">
                <label>N° OT</label>
                <input type="text" value="AUTO-GENERADO" disabled style="background:#eee;">
            </div>
            <div class="form-group">
                <label>PRIORIDAD</label>
                <select id="prioridad">
                    <option>Baja</option>
                    <option selected>Media</option>
                    <option>Alta</option>
                    <option>Urgente</option>
                </select>
            </div>
            <div class="form-group">
                <label>EDIFICIO</label>
                <select id="edificio" onchange="getSectores()" required>
                    <option value="">-- Seleccione --</option>
                    <option>Edificio Principal</option>
                    <option>Edificio IEM</option>
                    <option>Lab de Aerodinamica</option>
                    <option>Departamento de Geociencias</option>
                    <option>Departamento de Hidraulica</option>
                </select>
            </div>
            <div class="form-group">
                <label>SECTOR / LOCAL (Col A)</label>
                <select id="sector" onchange="getUbicaciones()" disabled required>
                    <option value="">Primero elija edificio</option>
                </select>
            </div>
            <div class="form-group">
                <label>UBICACIÓN / PISO (Col B)</label>
                <select id="subarea" onchange="getEquipos()" disabled required>
                    <option value="">Primero elija sector</option>
                </select>
            </div>
            <div class="form-group">
                <label>EQUIPO / ACTIVO</label>
                <select id="equipo" onchange="setInventario()">
                    <option value="">-- Seleccione --</option>
                </select>
            </div>
            <div class="form-group">
                <label>N° INVENTARIO</label>
                <input type="text" id="nInventario" readonly style="background:#f9f9f9;">
            </div>
            <div class="form-group">
                <label>ESPECIALIDAD</label>
                <select id="especialidad">
                    <option>Refrigeración</option>
                    <option>Electricidad</option>
                    <option>Herrería y Gral</option>
                    <option>HySL</option>
                </select>
            </div>
            <div class="form-group">
                <label>TIPO DE TRABAJO</label>
                <select id="tipo">
                    <option>Correctivo</option>
                    <option>Preventivo</option>
                    <option>Mejora</option>
                </select>
            </div>
            <div class="form-group">
                <label>REPORTADO POR</label>
                <input type="text" id="reportadoPor" placeholder="Nombre">
            </div>
            <div class="form-group">
                <label>MEDIO DE REPORTE</label>
                <select id="medioReporte">
                    <option selected>App Digital</option>
                    <option>WhatsApp</option>
                    <option>Personalmente</option>
                    <option>Teléfono</option>
                </select>
            </div>
            <div class="form-group">
                <label>PERSONAL ASIGNADO</label>
                <select id="personal">
                    <option>GLA</option><option>DSF</option><option>RRG</option><option>MAP</option><option>SDB</option>
                </select>
            </div>
            <div class="form-group full">
                <label>DESCRIPCIÓN DEL TRABAJO</label>
                <textarea id="descripcion" rows="3" required placeholder="Detalle de la tarea..."></textarea>
            </div>
            <div class="form-group full">
                <label>MATERIALES UTILIZADOS</label>
                <input type="text" id="materiales" placeholder="Repuestos, gas, cables, etc.">
            </div>
            <div class="form-group full">
                <label>OBSERVACIONES</label>
                <input type="text" id="observaciones" placeholder="Referencias adicionales">
            </div>
            <div class="form-group">
                <label>ESTADO</label>
                <select id="estado">
                    <option>Abierta</option>
                    <option>Cerrada</option>
                </select>
            </div>
        </div>
        <div class="no-print">
            <button type="submit" id="btnSave" class="btn-save">GUARDAR EN SISTEMA</button>
            <button type="button" onclick="window.print()" style="background:#6c757d; color:white;">IMPRIMIR PDF</button>
        </div>
    </form>
</div>

<script>
    // URL de tu Apps Script (mantenemos la que pasaste)
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzYEJnB7L5qtF5DZo0l1SrkQIi0ekHsw7uj9GxKebLg5Gv1sfHqDZk-nNlTx10qInOxaw/exec';
    let rawData = [];

    // PASO 1: CARGAR SECTORES (COL A)
    async function getSectores() {
        const edif = document.getElementById('edificio').value;
        const loader = document.getElementById('loader');
        const selSector = document.getElementById('sector');
        
        if(!edif) return;
        
        loader.style.display = 'block';
        selSector.disabled = true;

        try {
            // Agregamos parámetros para evitar cache y manejar mejor la respuesta
            const response = await fetch(`${WEB_APP_URL}?action=getSectores&edificio=${encodeURIComponent(edif)}`);
            rawData = await response.json();
            
            if(rawData.error) {
                alert("Error: " + rawData.error);
                return;
            }

            const sectores = [...new Set(rawData.map(d => d.sector))];
            selSector.innerHTML = '<option value="">-- Seleccione Sector --</option>';
            sectores.forEach(s => {
                let op = document.createElement('option');
                op.value = s; op.text = s;
                selSector.appendChild(op);
            });
            selSector.disabled = false;
        } catch(e) {
            console.error(e);
            alert("Error de conexión con Google Sheets. Verifique la implementación del script.");
        } finally {
            loader.style.display = 'none';
        }
    }

    // PASO 2: CARGAR UBICACIONES (COL B)
    function getUbicaciones() {
        const sec = document.getElementById('sector').value;
        const selUbic = document.getElementById('subarea');
        
        const filtered = rawData.filter(d => d.sector === sec);
        const ubics = [...new Set(filtered.map(d => d.ubicacion))];
        
        selUbic.innerHTML = '<option value="">-- Seleccione Ubicación --</option>';
        ubics.forEach(u => {
            let op = document.createElement('option');
            op.value = u; op.text = u;
            selUbic.appendChild(op);
        });
        selUbic.disabled = false;
    }

    // PASO 3: CARGAR EQUIPOS
    function getEquipos() {
        const sec = document.getElementById('sector').value;
        const ubi = document.getElementById('subarea').value;
        const selEq = document.getElementById('equipo');
        
        const filtered = rawData.filter(d => d.sector === sec && d.ubicacion === ubi);
        selEq.innerHTML = '<option value="">-- Seleccione Equipo --</option>';
        
        filtered.forEach(d => {
            if(d.equipo) {
                let op = document.createElement('option');
                op.value = d.equipo;
                op.text = d.equipo;
                op.dataset.inv = d.inventario;
                selEq.appendChild(op);
            }
        });
    }

    function setInventario() {
        const sel = document.getElementById('equipo');
        document.getElementById('nInventario').value = sel.options[sel.selectedIndex].dataset.inv || "";
    }

    // GUARDAR DATOS
    document.getElementById('otForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSave');
        btn.innerText = "REGISTRANDO..."; btn.disabled = true;
        
        const payload = {
            edificio: document.getElementById('edificio').value,
            sector: document.getElementById('sector').value,
            ubicacion: document.getElementById('subarea').value,
            equipo: document.getElementById('equipo').value,
            nInventario: document.getElementById('nInventario').value,
            prioridad: document.getElementById('prioridad').value,
            especialidad: document.getElementById('especialidad').value,
            tipo: document.getElementById('tipo').value,
            reportadoPor: document.getElementById('reportadoPor').value,
            medioReporte: document.getElementById('medioReporte').value,
            personal: document.getElementById('personal').value,
            descripcion: document.getElementById('descripcion').value,
            materiales: document.getElementById('materiales').value,
            observaciones: document.getElementById('observaciones').value,
            estado: document.getElementById('estado').value
        };

        try {
            // El modo 'no-cors' es necesario para evitar bloqueos al enviar datos a Apps Script
            await fetch(WEB_APP_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                cache: 'no-cache',
                body: JSON.stringify(payload) 
            });
            alert("¡ORDEN REGISTRADA EXITOSAMENTE!");
            location.reload();
        } catch(e) { 
            alert("Error al guardar los datos."); 
            btn.disabled = false; 
            btn.innerText = "GUARDAR EN SISTEMA";
        }
    };
</script>
</body>
</html>
