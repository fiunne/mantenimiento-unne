<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión OT 2026 - Avanzado</title>
    <style>
        :root { --p:#0056b3; --s:#6c757d; --bg:#f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 12px; max-width: 800px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }
        label { display: block; font-weight: 600; font-size: 0.8em; margin-bottom: 5px; color: #444; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .loading { color: var(--p); font-size: 0.8em; display: none; }
        .btn-save { background: var(--p); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 20px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--p); margin-top:0;">ORDEN DE TRABAJO 2026</h2>
    <form id="otForm">
        <div class="grid">
            <div>
                <label>N° OT</label>
                <input type="text" value="SISTEMA" disabled style="background:#eee;">
            </div>
            <div>
                <label>ESPECIALIDAD</label>
                <select id="especialidad">
                    <option value="Electricidad">Electricidad</option>
                    <option value="Refrigeración">Refrigeración</option>
                    <option value="Herrería y Gral">Herrería y Gral</option>
                    <option value="HySL">HySL</option>
                </select>
            </div>

            <div>
                <label>EDIFICIO</label>
                <select id="edificio" onchange="fetchSectores()">
                    <option value="">Seleccione...</option>
                    <option value="Edificio Principal">Edificio Principal</option>
                    <option value="Edificio IEM">Edificio IEM</option>
                    <option value="Departamento de Geociencias">Departamento de Geociencias</option>
                    <option value="Departamento de Hidraulica">Departamento de Hidraulica</option>
                    <option value="Lab de Aerodinamica">Lab de Aerodinamica</option>
                </select>
                <span id="loadSectores" class="loading">Cargando locales...</span>
            </div>
            <div>
                <label>SECTOR / LOCAL</label>
                <select id="sector" onchange="filtrarEquipos()">
                    <option value="">Primero elija edificio</option>
                </select>
            </div>

            <div id="divEquipo">
                <label>EQUIPO (AIRES)</label>
                <select id="equipo" onchange="setInventario()">
                    <option value="">Seleccione local...</option>
                </select>
            </div>
            <div>
                <label>N° INVENTARIO</label>
                <input type="text" id="nInventario" placeholder="Auto-completado">
            </div>

            <div class="full">
                <label>DETALLE DE UBICACIÓN / REFERENCIAS</label>
                <input type="text" id="ubicacionDetalle">
            </div>

            <div class="full">
                <label>DESCRIPCIÓN DEL PROBLEMA / TRABAJO</label>
                <textarea id="descripcion" rows="3"></textarea>
            </div>
            
            <div>
                <label>PERSONAL ASIGNADO</label>
                <select id="personal">
                    <option value="GLA">GLA (Elec)</option>
                    <option value="DSF">DSF (Ref)</option>
                    <option value="RRG">RRG (Gral)</option>
                    <option value="MAP">MAP (Cond)</option>
                    <option value="SDB">SDB (HySL)</option>
                </select>
            </div>
            <div>
                <label>ESTADO</label>
                <select id="estado">
                    <option value="Abierta">Abierta</option>
                    <option value="Cerrada">Cerrada</option>
                </select>
            </div>
        </div>

        <button type="submit" id="btn" class="btn-save no-print">GUARDAR OT Y REGISTRAR</button>
        <button type="button" class="no-print" onclick="window.print()" style="width:100%; margin-top:10px; padding:10px; border:1px solid #ccc; border-radius:8px; cursor:pointer;">IMPRIMIR BORRADOR</button>
    </form>
</div>

<script>
    let datosLocalesGlobal = [];
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzZi295AxGJazdnuP9gyA1-mVVNv3SkomTUsJ6ZfpxZHYoyhTIE9tuzMlkJhs10sjUl/exec'; // <--- PEGA TU URL DE IMPLEMENTACIÓN

    async function fetchSectores() {
        const edif = document.getElementById('edificio').value;
        const loader = document.getElementById('loadSectores');
        const sectorSel = document.getElementById('sector');
        
        if(!edif) return;
        loader.style.display = 'inline';
        
        // Aquí llamamos al script para traer los datos reales de tu nueva planilla
        // Nota: En GitHub Pages usaremos fetch. Para pruebas directas en Apps Script se usa google.script.run
        // Por ahora simularemos la carga para que veas la lógica:
        alert("Conectando con la base de datos de locales de " + edif + "...");
        loader.style.display = 'none';
    }

    // Lógica para filtrar equipos cuando eligen un local
    function filtrarEquipos() {
        // Esta función filtrará los equipos (Aires) que pusiste en la columna D
        // del archivo Configuracion_Sistema_OT
    }

    document.getElementById('otForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        const data = {
            edificio: document.getElementById('edificio').value,
            sector: document.getElementById('sector').value,
            equipo: document.getElementById('equipo').value,
            nInventario: document.getElementById('nInventario').value,
            especialidad: document.getElementById('especialidad').value,
            personal: document.getElementById('personal').value,
            descripcion: document.getElementById('descripcion').value,
            ubicacionDetalle: document.getElementById('ubicacionDetalle').value,
            estado: document.getElementById('estado').value,
            tipo: "Mantenimiento"
        };

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            });
            alert("OT REGISTRADA. El número se asignó en el Excel.");
        } catch(e) { alert("Error al guardar"); }
        btn.disabled = false;
        btn.innerText = "GUARDAR OT Y REGISTRAR";
    };
</script>
</body>
</html>
