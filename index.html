<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OT - Mantenimiento FI-UNNE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 15px; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn-submit { background-color: #004a87; color: white; width: 100%; padding: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-4">
            <h3 class="text-center mb-4">Nueva Orden de Trabajo</h3>
            <form id="otForm">
                <div class="mb-3">
                    <label class="form-label">Edificio</label>
                    <select class="form-select" id="edificio" required>
                        <option value="Principal">Edificio Principal</option>
                        <option value="IEM">IEM</option>
                        <option value="Geociencias">Geociencias</option>
                        <option value="Hidraulica">Hidráulica</option>
                        <option value="Aerodinamica">Aerodinámica</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Técnico Responsable</label>
                    <select class="form-select" id="tecnico">
                        <option>Electricista</option>
                        <option>Refrigeración</option>
                        <option>Soldador</option>
                        <option>Miguel (Conducción)</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Descripción del Trabajo</label>
                    <textarea class="form-control" id="descripcion" rows="3" placeholder="¿Qué se reparó?"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Estado</label>
                    <div class="btn-group w-100" role="group">
                        <input type="radio" class="btn-check" name="estado" id="ok" value="Operativo" checked>
                        <label class="btn btn-outline-success" for="ok">OPERATIVO</label>
                        <input type="radio" class="btn-check" name="estado" id="pendiente" value="Pendiente">
                        <label class="btn btn-outline-warning" for="pendiente">PENDIENTE</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-submit mt-3">ENVIAR ORDEN</button>
            </form>
        </div>
    </div>
</body>
</html>
