<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento FI-UNNE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f9; padding: 10px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 8px 16px rgba(0,0,0,0.1); overflow: hidden; }
        .header-logo { background: linear-gradient(135deg, #004a87 0%, #00335e 100%); color: white; padding: 20px; text-align: center; }
        .section-title { background: #e9ecef; color: #495057; padding: 8px 15px; font-weight: bold; font-size: 0.85rem; border-left: 4px solid #004a87; margin-top: 20px; text-transform: uppercase; }
        .form-label { font-weight: 600; font-size: 0.9rem; color: #333; margin-top: 10px; }
        .btn-enviar { background-color: #004a87; border: none; padding: 15px; font-weight: bold; width: 100%; margin-top: 25px; transition: 0.3s; }
        .btn-enviar:hover { background-color: #002d52; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center mb-5">
    <div class="card col-12 col-md-8 col-lg-6">
        <div class="header-logo">
            <h4 class="mb-0">Gestión de OT</h4>
            <p class="small mb-0 opacity-75">Facultad de Ingeniería - UNNE</p>
        </div>
        
        <div class="card-body p-4">
            <form id="otForm">
                
                <div class="section-title">1. Clasificación del Trabajo</div>
                <div class="row">
                    <div class="col-6">
                        <label class="form-label">Tipo</label>
                        <select class="form-select" id="tipo" required>
                            <option value="Preventivo">Preventivo</option>
                            <option value="Correctivo">Correctivo</option>
                            <option value="Mejora / Obra">Mejora / Obra</option>
                            <option value="Emergencia">Emergencia</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Especialidad (Rubro)</label>
                        <select class="form-select" id="especialidad" required>
                            <option value="Electricidad">Electricidad</option>
                            <option value="Refrigeración">Refrigeración</option>
                            <option value="Soldadura">Soldadura</option>
                            <option value="Higiene y Seguridad">Higiene y Seguridad</option>
                            <option value="Mantenimiento General">Mantenimiento Gral.</option>
                        </select>
                    </div>
                </div>
                <div class="col-12">
                    <label class="form-label">Prioridad</label>
                    <select class="form-select" id="prioridad">
                        <option value="Baja">Baja</option>
                        <option value="Media" selected>Media</option>
                        <option value="Alta">Alta</option>
                    </select>
                </div>

                <div class="section-title">2. Ubicación y Activo</div>
                <label class="form-label">Edificio</label>
                <select class="form-select" id="edificio" required>
                    <option value="Edificio Principal">Edificio Principal</option>
                    <option value="IEM">IEM</option>
                    <option value="Geociencias">Geociencias</option>
                    <option value="Hidráulica">Hidráulica</option>
                    <option value="Aerodinámica">Aerodinámica</option>
                </select>
                
                <div class="row">
                    <div class="col-6">
                        <label class="form-label">Sector / Local</label>
                        <input type="text" class="form-control" id="sector" placeholder="Ej: Aula 5" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Equipo / Activo</label>
                        <input type="text" class="form-control" id="equipo" placeholder="Ej: Split 4500">
                    </div>
                </div>
                <label class="form-label">N° Inventario</label>
                <input type="text" class="form-control" id="inventario" placeholder="Si aplica">

                <div class="section-title">3. Reporte y Asignación</div>
                <div class="row">
                    <div class="col-6">
                        <label class="form-label">Reportado por</label>
                        <input type="text" class="form-control" id="reportadoPor" placeholder="Nombre">
                    </div>
                    <div class="col-6">
                        <label class="form-label">Medio</label>
                        <select class="form-select" id="medio">
                            <option value="WhatsApp">WhatsApp</option>
                            <option value="Personal / Verbal">Personal / Verbal</option>
                            <option value="Nota / Exp.">Nota / Exp.</option>
                        </select>
                    </div>
                </div>
                
                <label class="form-label">Personal Asignado</label>
                <select class="form-select" id="personal" required>
                    <option value="" disabled selected>Seleccione técnico...</option>
                    <option value="Técnico Electricista">Técnico Electricista</option>
                    <option value="Técnico Refrigeración">Técnico Refrigeración</option>
                    <option value="Soldador">Soldador</option>
                    <option value="Miguel (Conducción)">Miguel (Conducción)</option>
                    <option value="Ing. HySL">Ing. HySL</option>
                    <option value="Equipo Colaborativo">Equipo Colaborativo (Varios)</option>
                </select>

                <div class="section-title">4. Detalle Técnico</div>
                <label class="form-label">Descripción del Trabajo</label>
                <textarea class="form-control" id="descripcion" rows="3" required></textarea>
                
                <label class="form-label">Materiales Utilizados</label>
                <textarea class="form-control" id="materiales" rows="2" placeholder="Repuestos, cables, gas, etc."></textarea>

                <div class="section-title">5. Cierre y Observaciones</div>
                <label class="form-label">Estado Actual</label>
                <select class="form-select" id="estado">
                    <option value="Operativo">OPERATIVO</option>
                    <option value="Pendiente">PENDIENTE</option>
                    <option value="En Reparación">EN REPARACIÓN</option>
                </select>
                
                <label class="form-label">Observaciones</label>
                <input type="text" class="form-control" id="observaciones">

                <button type="submit" id="btnSubmit" class="btn btn-primary btn-enviar text-white">
                    <span id="spinner" class="spinner-border spinner-border-sm d-none"></span>
                    REGISTRAR ORDEN DE TRABAJO
                </button>
            </form>
            <div id="mensaje" class="alert alert-success mt-3 d-none text-center">¡OT enviada correctamente!</div>
        </div>
    </div>
</div>

<script>
    const URL_GOOGLE_SCRIPT = "https://script.google.com/macros/s/AKfycbzK13KgMLa_6erzqonLaaLgUNjCv8F6H_sFOrVaQoFnBTyvrwRuzHROcsr03CjM3nM07Q/exec";

    document.getElementById('otForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        const spinner = document.getElementById('spinner');
        const mensaje = document.getElementById('mensaje');

        btn.disabled = true;
        spinner.classList.remove('d-none');

        const datos = {
            tipo: document.getElementById('tipo').value,
            especialidad: document.getElementById('especialidad').value,
            prioridad: document.getElementById('prioridad').value,
            edificio: document.getElementById('edificio').value,
            sector: document.getElementById('sector').value,
            equipo: document.getElementById('equipo').value,
            inventario: document.getElementById('inventario').value,
            reportadoPor: document.getElementById('reportadoPor').value,
            medio: document.getElementById('medio').value,
            personal: document.getElementById('personal').value,
            descripcion: document.getElementById('descripcion').value,
            materiales: document.getElementById('materiales').value,
            estado: document.getElementById('estado').value,
            observaciones: document.getElementById('observaciones').value
        };

        fetch(URL_GOOGLE_SCRIPT, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        })
        .then(() => {
            mensaje.classList.remove('d-none');
            document.getElementById('otForm').reset();
            setTimeout(() => { mensaje.classList.add('d-none'); }, 4000);
        })
        .catch(err => alert('Error de conexión: ' + err))
        .finally(() => {
            btn.disabled = false;
            spinner.classList.add('d-none');
        });
    });
</script>

</body>
</html>
