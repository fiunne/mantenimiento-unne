<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión OT - Facultad de Ingeniería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none !important; } .print-area { border: 1px solid black; padding: 20px; } }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e3a8a; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .tab-active { border-bottom: 4px solid #1e40af; color: #1e40af; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-2 md:p-4">
    
    <div id="auth-screen">
        <div class="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-sm w-full">
            <h2 class="text-xl font-bold mb-4">Acceso Mantenimiento</h2>
            <input type="password" id="pin-input" maxlength="4" placeholder="PIN" class="w-full text-center text-3xl border rounded-lg p-3 mb-4 focus:outline-none focus:border-blue-500">
            <button onclick="verificarPIN()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700">ACCEDER</button>
        </div>
    </div>

    <div id="loader" class="loading-overlay italic text-blue-600 font-bold">Procesando...</div>

    <div id="main-content" class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-4 md:p-6 hidden">
        
        <div class="flex border-b mb-6 no-print">
            <button id="tab-nueva" onclick="cambiarTab('nueva')" class="flex-1 py-3 text-center tab-active">NUEVA ORDEN</button>
            <button id="tab-pendientes" onclick="cambiarTab('pendientes')" class="flex-1 py-3 text-center text-gray-500">CERRAR PENDIENTES</button>
        </div>

        <div id="sec-nueva" class="print-area">
            <h1 class="text-xl font-bold text-blue-800 mb-4 text-center border-b pb-2">Nueva Orden de Trabajo</h1>
            <form id="otForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-3">
                    <div class="flex gap-2">
                        <select id="tipo" class="w-1/2 border p-2 rounded text-sm" required>
                            <option value="Preventivo">Preventivo</option>
                            <option value="Correctivo" selected>Correctivo</option>
                        </select>
                        <select id="especialidad" class="w-1/2 border p-2 rounded text-sm" required>
                            <option value="Electricidad">Electricidad</option>
                            <option value="Refrigeración">Refrigeración</option>
                            <option value="Ferretería">Ferretería</option>
                            <option value="Herrería">Herrería</option>
                        </select>
                    </div>
                    <select id="estado" class="w-full border p-2 rounded bg-yellow-50 font-bold text-sm">
                        <option value="Abierta">🟡 ABIERTA (Pendiente)</option>
                        <option value="Cerrada">🟢 CERRADA (Finalizada)</option>
                    </select>
                    <div class="bg-blue-50 p-3 rounded-lg space-y-2">
                        <select id="edificio" onchange="cargarSectores()" class="w-full border p-2 rounded text-sm" required><option value="">Edificio...</option></select>
                        <select id="sector" onchange="filtrarUbicaciones()" class="w-full border p-2 rounded text-sm" disabled required><option value="">Sector...</option></select>
                        <select id="ubicacionSelect" onchange="actualizarDetalles()" class="w-full border p-2 rounded text-sm" disabled required><option value="">Ubicación...</option></select>
                        <input type="hidden" id="ubicacion_text"><input type="hidden" id="nInventario"><input type="hidden" id="equipo">
                    </div>
                </div>

                <div class="space-y-3">
                    <input type="text" id="reportadoPor" placeholder="Reportado por..." class="w-full border p-2 rounded text-sm" required>
                    <select id="personal" class="w-full border p-2 rounded text-sm" required>
                        <option value="">Técnico Asignado...</option>
                        <option value="DSG">DSG</option><option value="MAP">MAP</option>
                        <option value="AGL">AGL</option><option value="RRG">RRG</option>
                    </select>
                    <textarea id="descripcion" rows="3" class="w-full border p-2 rounded text-sm" required placeholder="Descripción de la tarea..."></textarea>
                    <textarea id="observaciones" rows="2" class="w-full border p-2 rounded text-sm bg-yellow-50" placeholder="Observaciones / Repuestos faltantes..."></textarea>
                </div>

                <div class="md:col-span-2 flex justify-between gap-4 no-print mt-2">
                    <button type="button" onclick="window.print()" class="bg-gray-500 text-white font-bold py-2 px-6 rounded-lg">IMPRIMIR</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white font-extrabold py-2 rounded-lg shadow-lg">GUARDAR NUEVA OT</button>
                </div>
            </form>
        </div>

        <div id="sec-pendientes" class="hidden">
            <h1 class="text-xl font-bold text-orange-700 mb-4 text-center border-b pb-2">Órdenes Pendientes</h1>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold mb-1">1. Seleccionar Orden Abierta:</label>
                    <select id="listaAbiertas" class="w-full border p-3 rounded-lg bg-white shadow-sm">
                        <option value="">Cargando pendientes...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">2. Comentario de Cierre / Repuestos usados:</label>
                    <textarea id="comentarioCierre" rows="3" class="w-full border p-2 rounded-lg" placeholder="Describa el trabajo final realizado..."></textarea>
                </div>
                <button onclick="finalizarOrden()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl shadow-md hover:bg-green-700 transition-colors">
                    ✅ FINALIZAR Y CERRAR ORDEN
                </button>
            </div>
        </div>
    </div>

    <script>
        // REEMPLAZA ESTA URL POR LA DE TU IMPLEMENTACIÓN
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxWaeGgznHYJadF7fJsBptf7Ai-NzvQKRTZFs_BI91XXRzB9_LH_hLDvdLkfPTN7Ccn/exec"; 
        const TOKEN = "MANTENIMIENTO_FI_2026";
        const PIN_CORRECTO = "2026";
        let rawData = [];

        function verificarPIN() {
            if (document.getElementById('pin-input').value === PIN_CORRECTO) {
                localStorage.setItem('auth_mantenimiento', 'true');
                mostrarApp();
            } else { alert("PIN Incorrecto"); }
        }

        window.onload = () => { if (localStorage.getItem('auth_mantenimiento') === 'true') mostrarApp(); };

        function mostrarApp() {
            document.getElementById('auth-screen').style.display='none';
            document.getElementById('main-content').classList.remove('hidden');
            inicializarDatos();
            cargarPendientes();
        }

        function cambiarTab(tab) {
            document.getElementById('sec-nueva').classList.toggle('hidden', tab !== 'nueva');
            document.getElementById('sec-pendientes').classList.toggle('hidden', tab !== 'pendientes');
            document.getElementById('tab-nueva').className = `flex-1 py-3 text-center ${tab === 'nueva' ? 'tab-active' : 'text-gray-500'}`;
            document.getElementById('tab-pendientes').className = `flex-1 py-3 text-center ${tab === 'pendientes' ? 'tab-active' : 'text-gray-500'}`;
            if(tab === 'pendientes') cargarPendientes();
        }

        async function inicializarDatos() {
            const res = await fetch(`${WEB_APP_URL}?action=getEdificios&token=${TOKEN}`);
            const edificios = await res.json();
            const select = document.getElementById('edificio');
            edificios.forEach(n => { let opt = document.createElement('option'); opt.value = n; opt.textContent = n; select.appendChild(opt); });
        }

        async function cargarSectores() {
            const edif = document.getElementById('edificio').value;
            const res = await fetch(`${WEB_APP_URL}?action=getSectores&edificio=${encodeURIComponent(edif)}&token=${TOKEN}`);
            rawData = await res.json();
            const secSel = document.getElementById('sector');
            secSel.innerHTML = '<option value="">Sector...</option>';
            [...new Set(rawData.map(i => i.sector))].forEach(s => { let opt = document.createElement('option'); opt.value = s; opt.textContent = s; secSel.appendChild(opt); });
            secSel.disabled = false;
        }

        function filtrarUbicaciones() {
            const sector = document.getElementById('sector').value;
            const ubiSel = document.getElementById('ubicacionSelect');
            ubiSel.innerHTML = '<option value="">Ubicación...</option>';
            rawData.filter(i => i.sector === sector).forEach(item => { let opt = document.createElement('option'); opt.value = rawData.indexOf(item); opt.textContent = item.ubicacion; ubiSel.appendChild(opt); });
            ubiSel.disabled = false;
        }

        function actualizarDetalles() {
            const info = rawData[document.getElementById('ubicacionSelect').value];
            document.getElementById('ubicacion_text').value = info.ubicacion;
            document.getElementById('nInventario').value = info.inventario;
            document.getElementById('equipo').value = info.equipo;
        }

        async function cargarPendientes() {
            const select = document.getElementById('listaAbiertas');
            select.innerHTML = '<option>Cargando...</option>';
            try {
                const res = await fetch(`${WEB_APP_URL}?action=getAbiertas&token=${TOKEN}`);
                const abiertas = await res.json();
                select.innerHTML = '<option value="">Seleccione una OT pendiente...</option>';
                abiertas.forEach(ot => {
                    let opt = document.createElement('option');
                    opt.value = ot.id;
                    opt.textContent = `OT ${ot.id} | ${ot.detalle}`;
                    select.appendChild(opt);
                });
            } catch (e) { select.innerHTML = '<option>Error al cargar</option>'; }
        }

        async function finalizarOrden() {
            const idOT = document.getElementById('listaAbiertas').value;
            const comentario = document.getElementById('comentarioCierre').value;
            if (!idOT) return alert("Seleccione una orden");
            
            document.getElementById('loader').style.display = "flex";
            await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({
                    token: TOKEN,
                    action: 'cerrarOT',
                    idOT: idOT,
                    comentarioFinal: comentario
                })
            });
            alert("¡Orden " + idOT + " Cerrada con éxito!");
            location.reload();
        }

        document.getElementById('otForm').onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('loader').style.display = "flex";
            const payload = {
                token: TOKEN,
                tipo: document.getElementById('tipo').value,
                especialidad: document.getElementById('especialidad').value,
                prioridad: "Media",
                edificio: document.getElementById('edificio').value,
                sector: document.getElementById('sector').value,
                ubicacion: document.getElementById('ubicacion_text').value,
                nInventario: document.getElementById('nInventario').value,
                equipo: document.getElementById('equipo').value,
                reportadoPor: document.getElementById('reportadoPor').value,
                medioReporte: "App",
                personal: document.getElementById('personal').value,
                descripcion: document.getElementById('descripcion').value,
                observaciones: document.getElementById('observaciones').value,
                estado: document.getElementById('estado').value
            };
            await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("¡Orden Guardada!");
            location.reload();
        };
    </script>
</body>
</html>
