<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGM PRO 2026 - FIUNNE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 4px solid #f06423; color: #f06423; font-weight: 900; background: #fff7ed; }
        .ext-vencido { border-left: 5px solid #ef4444; background: #fef2f2; }
        .ext-ok { border-left: 5px solid #22c55e; background: #f0fdf4; }
    </style>
</head>
<body class="p-2">

    <div id="loader" class="fixed inset-0 bg-black/80 hidden z-[5000] flex flex-col items-center justify-center text-white">
        <div class="w-10 h-10 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-2"></div>
        <p class="text-[10px] font-black uppercase tracking-widest">Sincronizando...</p>
    </div>

    <div class="max-w-4xl mx-auto pb-20">
        <header class="mb-4 p-4 bg-white rounded-2xl border shadow-sm flex justify-between items-center">
            <h1 class="text-xl font-black text-slate-900 uppercase">Panel FIUNNE</h1>
            <span id="fecha-actual" class="text-[10px] font-black bg-slate-900 text-white px-3 py-1 rounded-lg"></span>
        </header>

        <nav class="flex border-b mb-6 bg-white rounded-t-xl sticky top-0 z-50 shadow-sm overflow-x-auto">
            <button onclick="tab('nueva')" id="btn-nueva" class="flex-1 py-4 text-[10px] font-black uppercase">Nueva OT</button>
            <button onclick="tab('pendientes')" id="btn-pendientes" class="flex-1 py-4 text-[10px] font-black uppercase">Cerrar OT</button>
            <button onclick="tab('extintores')" id="btn-extintores" class="flex-1 py-4 text-[10px] font-black uppercase">Extintores</button>
            <button onclick="tab('historial')" id="btn-historial" class="flex-1 py-4 text-[10px] font-black uppercase">Historial</button>
        </nav>

        <div id="sec-nueva" class="hidden space-y-3">
            <div class="bg-white p-4 rounded-2xl border shadow-sm space-y-3">
                <select id="n-edif" onchange="actualizarSectores(this.value)" class="w-full p-4 border rounded-xl font-bold bg-slate-50 text-sm"></select>
                <select id="n-sec" class="w-full p-4 border rounded-xl text-sm bg-white"></select>
                <select id="n-esp" class="w-full p-4 border rounded-xl text-sm bg-white font-bold">
                    <option value="Electricidad">Electricidad</option>
                    <option value="Refrigeración">Refrigeración</option>
                    <option value="Albañilería">Albañilería</option>
                    <option value="Limpieza">Limpieza</option>
                </select>
                <input type="text" id="n-pers" placeholder="Técnico responsable..." class="w-full p-4 border rounded-xl text-sm">
                <textarea id="n-desc" placeholder="Describa la falla o tarea..." class="w-full p-4 border rounded-xl text-sm h-28"></textarea>
                <button onclick="enviarNuevaOT()" class="w-full bg-[#f06423] text-white p-4 rounded-xl font-black uppercase shadow-lg">Registrar OT</button>
            </div>
        </div>

        <div id="sec-pendientes" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-2xl border shadow-sm space-y-3">
                <label class="text-[10px] font-black uppercase text-slate-500">Seleccionar Orden Abierta</label>
                <select id="c-lista" class="w-full p-4 border-2 border-orange-200 rounded-xl font-black text-xs bg-white"></select>
                <textarea id="c-obs" placeholder="Observaciones del trabajo realizado..." class="w-full p-4 border rounded-xl text-sm h-28"></textarea>
                <button onclick="confirmarCierre()" class="w-full bg-green-600 text-white p-4 rounded-xl font-black uppercase shadow-lg">Finalizar y Cerrar</button>
            </div>
        </div>

        <div id="sec-extintores" class="hidden space-y-4">
            <select id="e-edif" onchange="loadExtintores()" class="w-full p-4 border rounded-xl font-bold bg-white text-sm shadow-sm"></select>
            <div id="ext-container" class="space-y-2"></div>
        </div>

        <div id="sec-historial" class="hidden space-y-2">
            <div id="hist-container"></div>
        </div>
    </div>

    <script>
        // LA URL DEBE SER LA DE TU IMPLEMENTACIÓN
        const URL = "https://script.google.com/macros/s/AKfycbxK6eeFgCZRX0SfYr0f1fIFAt47MwFOvGvOYEEDYUc3j89Vr0VUpDtZaosu3tohK4ao/exec"; 
        const PIN = "4370";

        function showL(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }

        async function actualizarSectores(edif) {
            if(!edif) return;
            showL(true);
            try {
                const res = await fetch(`${URL}?action=getSectores&token=${PIN}&edificio=${encodeURIComponent(edif)}`);
                const data = await res.json();
                document.getElementById('n-sec').innerHTML = data.map(s => `<option value="${s}">${s}</option>`).join("");
            } catch (e) { console.error(e); }
            finally { showL(false); }
        }

        async function enviarNuevaOT() {
            const edif = document.getElementById('n-edif').value;
            const desc = document.getElementById('n-desc').value;
            if(!edif || !desc) return alert("Complete Edificio y Descripción");

            showL(true);
            try {
                const d = {
                    action: 'nuevaOT',
                    edificio: edif,
                    sector: document.getElementById('n-sec').value,
                    especialidad: document.getElementById('n-esp').value,
                    personal: document.getElementById('n-pers').value,
                    descripcion: desc
                };
                await fetch(URL, { method: 'POST', body: JSON.stringify(d) });
                alert("OT Registrada con éxito");
                location.reload();
            } catch (e) { alert("Error al registrar"); showL(false); }
        }

        async function confirmarCierre() {
            const id = document.getElementById('c-lista').value;
            if(!id) return alert("Seleccione una OT");
            
            showL(true);
            try {
                const d = {
                    action: 'cerrarOT',
                    idOT: id,
                    obs: document.getElementById('c-obs').value
                };
                await fetch(URL, { method: 'POST', body: JSON.stringify(d) });
                alert("OT Cerrada");
                location.reload();
            } catch (e) { alert("Error al cerrar"); showL(false); }
        }

        async function loadExtintores() {
            const edif = document.getElementById('e-edif').value;
            showL(true);
            try {
                const res = await fetch(`${URL}?action=getExtintores&token=${PIN}&edificio=${encodeURIComponent(edif)}`);
                const data = await res.json();
                document.getElementById('ext-container').innerHTML = data.map(e => `
                    <div class="p-3 rounded-xl shadow-sm border ${e.vencido ? 'ext-vencido' : 'ext-ok'}">
                        <p class="font-black text-xs uppercase">${e.tipo} ${e.cap} - SN: ${e.serie}</p>
                        <p class="text-[10px] text-slate-500 font-bold">${e.sector} | VENCE: ${e.f_venc}</p>
                    </div>
                `).join("");
            } catch (e) { }
            finally { showL(false); }
        }

        async function loadAbiertas() {
            try {
                const res = await fetch(`${URL}?action=getAbiertas&token=${PIN}`);
                const data = await res.json();
                document.getElementById('c-lista').innerHTML = data.length > 0 
                    ? data.map(o => `<option value="${o.id}">#${o.id} - ${o.edif} - ${o.detalle.substring(0,30)}...</option>`).join("")
                    : '<option value="">No hay OTs abiertas</option>';
            } catch (e) { }
        }

        async function loadHistorial() {
            showL(true);
            try {
                const res = await fetch(`${URL}?action=getHistorial&token=${PIN}`);
                const data = await res.json();
                document.getElementById('hist-container').innerHTML = data.map(h => `
                    <div class="bg-white p-3 rounded-xl border-l-4 ${h.est === 'Cerrada' ? 'border-green-500' : 'border-blue-500'} mb-2 shadow-sm">
                        <p class="text-[9px] font-black text-slate-400">#${h.id} | ${h.fecha}</p>
                        <p class="text-xs uppercase font-black text-slate-800">${h.edif} - ${h.tarea}</p>
                    </div>
                `).join("");
            } catch (e) { }
            finally { showL(false); }
        }

        function tab(name) {
            ['nueva', 'pendientes', 'extintores', 'historial'].forEach(s => {
                document.getElementById('sec-' + s).classList.add('hidden');
                document.getElementById('btn-' + s)?.classList.remove('tab-active');
            });
            document.getElementById('sec-' + name).classList.remove('hidden');
            document.getElementById('btn-' + name)?.classList.add('tab-active');
            if(name === 'pendientes') loadAbiertas();
            if(name === 'historial') loadHistorial();
        }

        async function init() {
            document.getElementById('fecha-actual').innerText = new Date().toLocaleDateString('es-AR', {day:'2-digit', month:'short'});
            showL(true); // Bloqueo inicial
            try {
                const res = await fetch(`${URL}?action=getEdificios&token=${PIN}`);
                const eds = await res.json();
                
                const opt = eds.map(e => `<option value="${e}">${e}</option>`).join("");
                document.getElementById('n-edif').innerHTML = '<option value="">Seleccione Edificio...</option>' + opt;
                document.getElementById('e-edif').innerHTML = opt;
                
                tab('nueva');
            } catch (e) {
                alert("Error de conexión. Verifique la URL del Script.");
            } finally {
                showL(false); // Desbloqueo garantizado
            }
        }

        window.onload = init;
    </script>
</body>
</html>
