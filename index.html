<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Gestión OT - Facultad de Ingeniería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div id="loader" class="loading-overlay italic text-blue-600 font-bold text-lg">Procesando...</div>

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-2xl font-bold text-blue-800 mb-6 text-center border-b pb-4">Carga de Orden de Trabajo (OT)</h1>
        
        <form id="otForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Tipo de Trabajo</label>
                    <select id="tipo" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500" required>
                        <option value="">Seleccione...</option>
                        <option value="Preventivo">Preventivo</option>
                        <option value="Correctivo">Correctivo</option>
                        <option value="Mejora">Mejora</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Especialidad</label>
                    <select id="especialidad" class="w-full border p-2 rounded" required>
                        <option value="">Seleccione...</option>
                        <option value="Electricidad">Electricidad</option>
                        <option value="Refrigeración">Refrigeración</option>
                        <option value="Ferretería">Ferretería</option>
                        <option value="Herrería">Herrería</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Prioridad</label>
                    <select id="prioridad" class="w-full border p-2 rounded" required>
                        <option value="Baja">Baja</option>
                        <option value="Media" selected>Media</option>
                        <option value="Alta">Alta</option>
                        <option value="Urgente">Urgente</option>
                    </select>
                </div>
            </div>

            <div class="space-y-4 bg-blue-50 p-4 rounded-lg border border-blue-100">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Edificio / Departamento</label>
                    <select id="edificio" onchange="cargarSectores()" class="w-full border p-2 rounded bg-white" required>
                        <option value="">Cargando edificios...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Sector / Aula</label>
                    <select id="sector" onchange="actualizarDetalles()" class="w-full border p-2 rounded bg-white" disabled required>
                        <option value="">Primero elija edificio...</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Ubicación Precisa</label>
                        <input type="text" id="ubicacion" class="w-full bg-gray-50 p-2 text-sm rounded border border-gray-200" readonly>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">N° Inventario</label>
                        <input type="text" id="nInventario" class="w-full bg-gray-50 p-2 text-sm rounded font-mono border border-gray-200" readonly>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Equipo Identificado</label>
                    <input type="text" id="equipo" class="w-full bg-gray-50 p-2 text-sm rounded border border-gray-200" readonly>
                </div>
            </div>

            <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-3 gap-4 border-t pt-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Reportado Por</label>
                    <input type="text" id="reportadoPor" class="w-full border p-2 rounded" placeholder="Nombre completo" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Medio de Reporte</label>
                    <select id="medioReporte" class="w-full border p-2 rounded">
                        <option value="WhatsApp">WhatsApp</option>
                        <option value="Personalmente">Personalmente</option>
                        <option value="Email">Email</option>
                        <option value="Teléfono">Teléfono</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Personal Asignado</label>
                    <input type="text" id="personal" class="w-full border p-2 rounded" placeholder="Técnicos" required>
                </div>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-semibold text-gray-700">Descripción del Problema/Tarea</label>
                <textarea id="descripcion" rows="3" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500" required></textarea>
            </div>
            
            <div class="md:col-span-2">
                <label class="block text-sm font-semibold text-gray-700">Materiales Utilizados</label>
                <input type="text" id="materiales" class="w-full border p-2 rounded" placeholder="Ej: 2 tubos led, cinta aisladora...">
            </div>

            <div class="md:col-span-2 flex flex-col md:flex-row justify-between items-center bg-gray-50 p-4 rounded border gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Estado de la OT</label>
                    <select id="estado" class="border p-2 rounded bg-white">
                        <option value="Abierta">Abierta (Pendiente)</option>
                        <option value="En Proceso">En Proceso</option>
                        <option value="Finalizada">Finalizada</option>
                    </select>
                </div>
                <button type="submit" id="btnGuardar" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-4 px-10 rounded-lg shadow-xl transition-all active:scale-95">
                    REGISTRAR ORDEN DE TRABAJO
                </button>
            </div>
        </form>
    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN - ACTUALIZAR AQUÍ
        // ==========================================
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx5pw0Iwhudg7zFa4YXUVz2y-btG1YUSD83cs0hqQi2WOPc7OuKMRCWjd8q0YqOw40D/exec"; 
        const TOKEN = "MANTENIMIENTO_FI_2026";
        let sectoresData = [];

        // 1. CARGAR EDIFICIOS (PESTAÑAS) AL INICIAR
        window.onload = async () => {
            const edificioSelect = document.getElementById('edificio');
            try {
                const response = await fetch(`${WEB_APP_URL}?action=getEdificios&token=${TOKEN}`);
                const edificios = await response.json();
                
                edificioSelect.innerHTML = '<option value="">Seleccione Edificio...</option>';
                edificios.forEach(nombre => {
                    const opt = document.createElement('option');
                    opt.value = nombre;
                    opt.textContent = nombre;
                    edificioSelect.appendChild(opt);
                });
            } catch (error) {
                alert("Error crítico: No se pudo conectar con la base de datos de edificios.");
                console.error(error);
            }
        };

        // 2. CARGAR SECTORES SEGÚN EDIFICIO
        async function cargarSectores() {
            const edificio = document.getElementById('edificio').value;
            const sectorSelect = document.getElementById('sector');
            
            // Reset de campos
            document.getElementById('ubicacion').value = "";
            document.getElementById('nInventario').value = "";
            document.getElementById('equipo').value = "";

            if (!edificio) {
                sectorSelect.disabled = true;
                sectorSelect.innerHTML = '<option value="">Primero elija edificio...</option>';
                return;
            }

            sectorSelect.innerHTML = '<option>Cargando sectores...</option>';
            sectorSelect.disabled = true;
            
            try {
                const response = await fetch(`${WEB_APP_URL}?action=getSectores&edificio=${encodeURIComponent(edificio)}&token=${TOKEN}`);
                sectoresData = await response.json();
                
                sectorSelect.innerHTML = '<option value="">Seleccione sector...</option>';
                sectoresData.forEach((item, index) => {
                    const opt = document.createElement('option');
                    opt.value = index;
                    opt.textContent = item.sector;
                    sectorSelect.appendChild(opt);
                });
                sectorSelect.disabled = false;
            } catch (error) {
                alert("Error cargando sectores.");
            }
        }

        // 3. ACTUALIZAR DETALLES AUTOMÁTICOS
        function actualizarDetalles() {
            const index = document.getElementById('sector').value;
            if (index !== "") {
                const info = sectoresData[index];
                document.getElementById('ubicacion').value = info.ubicacion || "n/c";
                document.getElementById('nInventario').value = info.inventario || "n/c";
                document.getElementById('equipo').value = info.equipo || "n/c";
            }
        }

        // 4. ENVIAR FORMULARIO (POST)
        document.getElementById('otForm').onsubmit = async (e) => {
            e.preventDefault();
            const loader = document.getElementById('loader');
            const btn = document.getElementById('btnGuardar');
            
            loader.style.display = "flex";
            btn.disabled = true;

            const payload = {
                token: TOKEN,
                tipo: document.getElementById('tipo').value,
                especialidad: document.getElementById('especialidad').value,
                prioridad: document.getElementById('prioridad').value,
                edificio: document.getElementById('edificio').value,
                sector: sectoresData[document.getElementById('sector').value].sector,
                ubicacion: document.getElementById('ubicacion').value,
                nInventario: document.getElementById('nInventario').value,
                equipo: document.getElementById('equipo').value,
                reportadoPor: document.getElementById('reportadoPor').value,
                medioReporte: document.getElementById('medioReporte').value,
                personal: document.getElementById('personal').value,
                descripcion: document.getElementById('descripcion').value,
                materiales: document.getElementById('materiales').value,
                estado: document.getElementById('estado').value,
                observaciones: ""
            };

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                
                alert("¡ÉXITO! La Orden de Trabajo ha sido enviada al Registro.");
                location.reload();
            } catch (error) {
                alert("Error al guardar. Revise su conexión.");
                btn.disabled = false;
                loader.style.display = "none";
            }
        };
    </script>
</body>
</html>
