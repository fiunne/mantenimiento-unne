<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión OT 2026 - Avanzado</title>
    <style>
        :root { 
            --primary: #0056b3; 
            --secondary: #6c757d; 
            --bg: #f4f7f6; 
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 20px; 
            color: #333;
        }

        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            max-width: 850px; 
            margin: auto; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
        }

        h2 { 
            color: var(--primary); 
            text-align: center; 
            border-bottom: 3px solid var(--primary); 
            padding-bottom: 15px;
            margin-top: 0;
            text-transform: uppercase;
        }

        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-top: 20px;
        }

        .form-group { margin-bottom: 15px; }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 0.9em;
            color: #555;
        }

        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px;
        }

        .full-width { grid-column: span 2; }

        .loading-text {
            color: var(--primary);
            font-size: 0.8em;
            font-style: italic;
            display: none;
        }

        .btn-container { 
            display: flex; 
            gap: 15px; 
            margin-top: 30px; 
        }

        button { 
            flex: 1; 
            padding: 15px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1em;
            transition: 0.3s; 
        }

        .btn-save { background: var(--primary); color: white; }
        .btn-save:hover { background: #004494; }
        .btn-save:disabled { background: #ccc; }

        .btn-print { background: var(--secondary); color: white; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: 1px solid #eee; max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Orden de Trabajo - Mantenimiento 2026</h2>
    
    <form id="otForm">
        <div class="grid">
            <div class="form-group">
                <label>N° DE ORDEN (OT)</label>
                <input type="text" id="numOt" value="ASIGNADO POR SISTEMA" disabled style="background:#e9ecef; font-weight:bold;">
            </div>

            <div class="form-group">
                <label>ESPECIALIDAD</label>
                <select id="especialidad">
                    <option value="Electricidad">Electricidad</option>
                    <option value="Refrigeración">Refrigeración</option>
                    <option value="Herrería y Gral">Herrería y Gral</option>
                    <option value="HySL">HySL</option>
                </select>
            </div>

            <div class="form-group">
                <label>EDIFICIO</label>
                <select id="edificio" onchange="fetchSectores()" required>
                    <option value="">-- Seleccione Edificio --</option>
                    <option value="Edificio Principal">Edificio Principal</option>
                    <option value="Edificio IEM">Edificio IEM</option>
                    <option value="Lab de Aerodinamica">Lab de Aerodinamica</option>
                    <option value="Departamento de Geociencias">Departamento de Geociencias</option>
                    <option value="Departamento de Hidraulica">Departamento de Hidraulica</option>
                </select>
                <div id="loader" class="loading-text">Conectando con base de datos...</div>
            </div>

            <div class="form-group">
                <label>SECTOR / LOCAL</label>
                <select id="sector" onchange="actualizarEquipo()" required>
                    <option value="">Primero elija edificio</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label>ESPECIFICACIÓN ADICIONAL DE UBICACIÓN</label>
                <input type="text" id="ubicacionDetalle" placeholder="Ej: Pasillo fondo, junto a tablero principal...">
            </div>

            <div class="form-group">
                <label>EQUIPO / ACTIVO</label>
                <select id="equipo" onchange="actualizarInventario()">
                    <option value="">-- Seleccione --</option>
                </select>
            </div>

            <div class="form-group">
                <label>N° INVENTARIO</label>
                <input type="text" id="nInventario" placeholder="Carga automática" readonly style="background:#f8f9fa;">
            </div>

            <div class="form-group">
                <label>PERSONAL ASIGNADO</label>
                <select id="personal">
                    <option value="GLA">GLA (Electricista y apoyo)</option>
                    <option value="DSF">DSF (Refrigeración y apoyo)</option>
                    <option value="RRG">RRG (Reparador general y apoyo)</option>
                    <option value="MAP">MAP (Conducción y apoyo)</option>
                    <option value="SDB">SDB (Especialista HySL)</option>
                </select>
            </div>

            <div class="form-group">
                <label>ESTADO</label>
                <select id="estado">
                    <option value="Abierta">ABIERTA / EN PROCESO</option>
                    <option value="Cerrada">CERRADA / FINALIZADA</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label>DESCRIPCIÓN DEL TRABAJO</label>
                <textarea id="descripcion" rows="3"></textarea>
            </div>
        </div>

        <div class="btn-container no-print">
            <button type="submit" id="btnSave" class="btn-save">GUARDAR EN SISTEMA</button>
            <button type="button" class="btn-print" onclick="window.print()">IMPRIMIR PDF</button>
        </div>
    </form>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby6g6Y4BTQOlIqz-vaNo8QgciWHDUV-OkyQZg89GbrgOHzE5FKHBPHlhUYIi24Zysa3/exec'; // <--- PEGA AQUÍ TU URL
    let cacheSectores = [];

    // Función para traer locales desde Google Sheets
    async function fetchSectores() {
        const edificio = document.getElementById('edificio').value;
        const sectorSelect = document.getElementById('sector');
        const loader = document.getElementById('loader');

        if (!edificio) return;

        sectorSelect.innerHTML = '<option>Cargando...</option>';
        loader.style.display = 'block';

        try {
            const response = await fetch(`${WEB_APP_URL}?action=getSectores&edificio=${encodeURIComponent(edificio)}`);
            cacheSectores = await response.json();

            sectorSelect.innerHTML = '<option value="">-- Seleccione Local --</option>';
            // Filtrar sectores únicos
            const nombresUnicos = [...new Set(cacheSectores.map(s => s.nombre))];
            nombresUnicos.forEach(nombre => {
                let op = document.createElement('option');
                op.value = nombre;
                op.text = nombre;
                sectorSelect.appendChild(op);
            });
        } catch (err) {
            alert("Error al conectar con la base de datos.");
            sectorSelect.innerHTML = '<option value="">Error de carga</option>';
        } finally {
            loader.style.display = 'none';
        }
    }

    // Al elegir un local, buscamos si tiene equipos asociados
    function actualizarEquipo() {
        const sectorSeleccionado = document.getElementById('sector').value;
        const equipoSelect = document.getElementById('equipo');
        equipoSelect.innerHTML = '<option value="">-- Seleccione --</option>';

        const equiposEncontrados = cacheSectores.filter(s => s.nombre === sectorSeleccionado);
        
        equiposEncontrados.forEach(e => {
            if(e.equipo && e.equipo !== "n/c" && e.equipo !== "cargar") {
                let op = document.createElement('option');
                op.value = e.equipo;
                op.text = e.equipo;
                op.dataset.inv = e.inventario;
                equipoSelect.appendChild(op);
            }
        });
        
        // Si no hay equipos específicos, permitimos escritura o general
        if(equipoSelect.options.length === 1) {
            let op = document.createElement('option');
            op.value = "General / Instalación";
            op.text = "General / Instalación";
            equipoSelect.appendChild(op);
        }
    }

    function actualizarInventario() {
        const sel = document.getElementById('equipo');
        const invInput = document.getElementById('nInventario');
        const selectedOption = sel.options[sel.selectedIndex];
        invInput.value = selectedOption.dataset.inv || "";
    }

    document.getElementById('otForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSave');
        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        const data = {
            edificio: document.getElementById('edificio').value,
            sector: document.getElementById('sector').value,
            equipo: document.getElementById('equipo').value,
            nInventario: document.getElementById('nInventario').value,
            especialidad: document.getElementById('especialidad').value,
            personal: document.getElementById('personal').value,
            descripcion: document.getElementById('descripcion').value,
            ubicacionDetalle: document.getElementById('ubicacionDetalle').value,
            estado: document.getElementById('estado').value,
            tipo: "Mantenimiento"
        };

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            });
            alert("¡OT REGISTRADA CORRECTAMENTE!");
            document.getElementById('otForm').reset();
        } catch(e) {
            alert("Error al guardar los datos.");
        } finally {
            btn.disabled = false;
            btn.innerText = "GUARDAR EN SISTEMA";
        }
    };
</script>

</body>
</html>
