<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Gestión OT - Facultad de Ingeniería</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-2xl font-bold text-blue-800 mb-6 text-center border-b pb-4">Carga de Orden de Trabajo (OT)</h1>
        
        <form id="otForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Tipo de Trabajo</label>
                    <select id="tipo" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500" required>
                        <option value="">Seleccione...</option>
                        <option value="Preventivo">Preventivo</option>
                        <option value="Correctivo">Correctivo</option>
                        <option value="Mejora">Mejora</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Especialidad</label>
                    <select id="especialidad" class="w-full border p-2 rounded" required>
                        <option value="">Seleccione...</option>
                        <option value="Electricidad">Electricidad</option>
                        <option value="Refrigeración">Refrigeración</option>
                        <option value="Ferretería">Ferretería</option>
                        <option value="Herrería">Herrería</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Prioridad</label>
                    <select id="prioridad" class="w-full border p-2 rounded" required>
                        <option value="Baja">Baja</option>
                        <option value="Media" selected>Media</option>
                        <option value="Alta">Alta</option>
                        <option value="Urgente">Urgente</option>
                    </select>
                </div>
            </div>

            <div class="space-y-4 bg-blue-50 p-4 rounded-lg">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Edificio</label>
                    <select id="edificio" onchange="cargarSectores()" class="w-full border p-2 rounded" required>
                        <option value="">Seleccione edificio...</option>
                        <option value="Edificio Principal">Edificio Principal</option>
                        <option value="Edificio IEM">Edificio IEM</option>
                        <option value="Edificio Laboratorios">Edificio Laboratorios</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Sector / Aula</label>
                    <select id="sector" onchange="actualizarDetalles()" class="w-full border p-2 rounded" disabled required>
                        <option value="">Primero elija edificio...</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-bold text-gray-500">Ubicación Precisa</label>
                        <input type="text" id="ubicacion" class="w-full bg-gray-100 p-2 text-sm rounded" readonly>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500">N° Inventario</label>
                        <input type="text" id="nInventario" class="w-full bg-gray-100 p-2 text-sm rounded font-mono" readonly>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500">Equipo Identificado</label>
                    <input type="text" id="equipo" class="w-full bg-gray-100 p-2 text-sm rounded" readonly>
                </div>
            </div>

            <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-3 gap-4 border-t pt-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Reportado Por</label>
                    <input type="text" id="reportadoPor" class="w-full border p-2 rounded" placeholder="Nombre completo" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Medio de Reporte</label>
                    <select id="medioReporte" class="w-full border p-2 rounded">
                        <option value="WhatsApp">WhatsApp</option>
                        <option value="Personalmente">Personalmente</option>
                        <option value="Email">Email</option>
                        <option value="Teléfono">Teléfono</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Personal Asignado</label>
                    <input type="text" id="personal" class="w-full border p-2 rounded" placeholder="Técnicos" required>
                </div>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-semibold text-gray-700">Descripción del Problema/Tarea</label>
                <textarea id="descripcion" rows="3" class="w-full border p-2 rounded" required></textarea>
            </div>
            
            <div class="md:col-span-2">
                <label class="block text-sm font-semibold text-gray-700">Materiales Utilizados</label>
                <input type="text" id="materiales" class="w-full border p-2 rounded" placeholder="Separar por comas">
            </div>

            <div class="md:col-span-2 flex justify-between items-center bg-gray-50 p-4 rounded">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Estado Inicial</label>
                    <select id="estado" class="border p-2 rounded">
                        <option value="Abierta">Abierta (Pendiente)</option>
                        <option value="En Proceso">En Proceso</option>
                        <option value="Finalizada">Finalizada</option>
                    </select>
                </div>
                <button type="submit" id="btnGuardar" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-md transition-all">
                    GUARDAR ORDEN DE TRABAJO
                </button>
            </div>
        </form>
    </div>

    <script>
        // CONFIGURACIÓN (REEMPLAZA CON TU URL)
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw4Xc8y6571gwPDhUm2GgamFg8hXZ2r_yMwF51kVV5U0AKJspQc6xLZxVRy72P6G1nxLg/exec";
        const TOKEN = "MANTENIMIENTO_FI_2026";
        let sectoresData = [];

        async function cargarSectores() {
            const edificio = document.getElementById('edificio').value;
            const sectorSelect = document.getElementById('sector');
            
            if (!edificio) {
                sectorSelect.disabled = true;
                return;
            }

            sectorSelect.innerHTML = '<option>Cargando...</option>';
            
            try {
                const response = await fetch(`${WEB_APP_URL}?action=getSectores&edificio=${edificio}&token=${TOKEN}`);
                sectoresData = await response.json();
                
                sectorSelect.innerHTML = '<option value="">Seleccione sector...</option>';
                sectoresData.forEach((item, index) => {
                    const opt = document.createElement('option');
                    opt.value = index;
                    opt.textContent = item.sector;
                    sectorSelect.appendChild(opt);
                });
                sectorSelect.disabled = false;
            } catch (error) {
                alert("Error cargando sectores. Verifique la conexión.");
            }
        }

        function actualizarDetalles() {
            const index = document.getElementById('sector').value;
            if (index !== "") {
                const info = sectoresData[index];
                document.getElementById('ubicacion').value = info.ubicacion;
                document.getElementById('nInventario').value = info.inventario;
                document.getElementById('equipo').value = info.equipo;
            }
        }

        document.getElementById('otForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            btn.disabled = true;
            btn.innerText = "PROCESANDO...";

            const payload = {
                token: TOKEN,
                tipo: document.getElementById('tipo').value,
                especialidad: document.getElementById('especialidad').value,
                prioridad: document.getElementById('prioridad').value,
                edificio: document.getElementById('edificio').value,
                sector: sectoresData[document.getElementById('sector').value].sector,
                ubicacion: document.getElementById('ubicacion').value,
                nInventario: document.getElementById('nInventario').value,
                equipo: document.getElementById('equipo').value,
                reportadoPor: document.getElementById('reportadoPor').value,
                medioReporte: document.getElementById('medioReporte').value,
                personal: document.getElementById('personal').value,
                descripcion: document.getElementById('descripcion').value,
                materiales: document.getElementById('materiales').value,
                estado: document.getElementById('estado').value,
                observaciones: ""
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                alert("OT REGISTRADA CON ÉXITO");
                location.reload();
            } catch (error) {
                alert("Error al guardar. Intente nuevamente.");
                btn.disabled = false;
                btn.innerText = "GUARDAR ORDEN DE TRABAJO";
            }
        };
    </script>
</body>
</html>
