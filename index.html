<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento FI-UNNE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e9ecef; padding: 20px; font-family: sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .header-logo { background-color: #004a87; color: white; border-radius: 15px 15px 0 0; padding: 20px; text-align: center; }
        .btn-enviar { background-color: #004a87; border: none; padding: 12px; font-weight: bold; width: 100%; }
        .btn-enviar:hover { background-color: #00335e; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card col-12 col-md-6">
        <div class="header-logo">
            <h4 class="mb-0">Gestión de OT</h4>
            <small>Facultad de Ingeniería - UNNE</small>
        </div>
        <div class="card-body p-4">
            <form id="otForm">
                <div class="mb-3">
                    <label class="form-label font-weight-bold">Edificio / Área</label>
                    <select class="form-select form-select-lg" id="edificio" required>
                        <option value="" disabled selected>Seleccionar...</option>
                        <option value="Edificio Principal">Edificio Principal</option>
                        <option value="IEM">IEM</option>
                        <option value="Geociencias">Geociencias</option>
                        <option value="Hidráulica">Hidráulica</option>
                        <option value="Aerodinámica">Aerodinámica</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label font-weight-bold">Técnico</label>
                    <select class="form-select form-select-lg" id="tecnico" required>
                        <option value="" disabled selected>¿Quién realizó la tarea?</option>
                        <option value="Electricista">Electricista</option>
                        <option value="Refrigeración">Refrigeración</option>
                        <option value="Soldador">Soldador</option>
                        <option value="Miguel">Miguel (Conducción)</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label font-weight-bold">Descripción del Trabajo</label>
                    <textarea class="form-control" id="descripcion" rows="4" placeholder="Ej: Cambio de capacitor en AA Aula 5" required></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label d-block font-weight-bold">Estado Final</label>
                    <div class="btn-group w-100" role="group">
                        <input type="radio" class="btn-check" name="estado" id="est1" value="Operativo" checked>
                        <label class="btn btn-outline-success p-3" for="est1">OPERATIVO</label>

                        <input type="radio" class="btn-check" name="estado" id="est2" value="Pendiente">
                        <label class="btn btn-outline-warning p-3" for="est2">PENDIENTE</label>
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="btn btn-primary btn-enviar text-white">
                    <span id="spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                    REGISTRAR ORDEN
                </button>
            </form>
            <div id="mensajeExito" class="alert alert-success mt-3 d-none">¡OT enviada correctamente!</div>
        </div>
    </div>
</div>

<script>
    const URL_GOOGLE_SCRIPT = "https://script.google.com/macros/s/AKfycbzK13KgMLa_6erzqonLaaLgUNjCv8F6H_sFOrVaQoFnBTyvrwRuzHROcsr03CjM3nM07Q/exec"; // REEMPLAZA ESTO CON TU URL DE APPS SCRIPT

    document.getElementById('otForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btnSubmit');
        const spinner = document.getElementById('spinner');
        const alertMsg = document.getElementById('mensajeExito');

        // Bloquear botón para evitar doble click
        btn.disabled = true;
        spinner.classList.remove('d-none');

        const datos = {
            edificio: document.getElementById('edificio').value,
            tecnico: document.getElementById('tecnico').value,
            descripcion: document.getElementById('descripcion').value,
            estado: document.querySelector('input[name="estado"]:checked').value
        };

        fetch(URL_GOOGLE_SCRIPT, {
            method: 'POST',
            mode: 'no-cors', // Necesario para Google Apps Script
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        })
        .then(() => {
            alertMsg.classList.remove('d-none');
            document.getElementById('otForm').reset();
            setTimeout(() => { alertMsg.classList.add('d-none'); }, 3000);
        })
        .catch(err => alert('Error al enviar: ' + err))
        .finally(() => {
            btn.disabled = false;
            spinner.classList.add('d-none');
        });
    });
</script>

</body>
</html>
