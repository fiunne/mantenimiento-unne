<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGM - Ingeniería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .tab-active { border-bottom: 4px solid #1e40af; color: #1e40af; font-weight: bold; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-4 text-gray-800">
    <div id="loader" class="loading-overlay font-bold italic text-blue-600">Procesando...</div>

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-4 md:p-6">
        <div class="flex border-b mb-6 overflow-x-auto no-scrollbar">
            <button onclick="tab('nueva')" id="btn-n" class="flex-1 py-3 tab-active uppercase text-[10px] md:text-xs font-bold whitespace-nowrap px-4">Nueva Orden</button>
            <button onclick="tab('pendientes')" id="btn-p" class="flex-1 py-3 text-gray-500 uppercase text-[10px] md:text-xs font-bold whitespace-nowrap px-4">Cierre OT</button>
        </div>

        <div id="nueva" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-blue-700 uppercase mb-1">Tipo de Tarea</label>
                    <select id="tipo" class="w-full p-3 bg-blue-50 border rounded-lg text-sm outline-none">
                        <option>Preventivo</option>
                        <option selected>Correctivo</option>
                        <option>Mejora</option>
                        <option>Emergencia</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-blue-700 uppercase mb-1">Especialidad (Rubro)</label>
                    <select id="rubro" class="w-full p-3 bg-blue-50 border rounded-lg text-sm outline-none">
                        <option>Electricidad</option>
                        <option>Aire Acondicionado</option>
                        <option>Sanitarios</option>
                        <option>Edificio</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-blue-700 uppercase mb-1">Edificio</label>
                <select id="edif" onchange="cargarSectores()" class="w-full p-3 bg-white border-2 border-blue-200 rounded-lg text-sm font-bold"></select>
            </div>

            <div id="div-sector" class="hidden">
                <label class="block text-[10px] font-bold text-blue-700 uppercase mb-1">Sector / Área</label>
                <select id="sect" onchange="llenarCampos()" class="w-full p-3 bg-white border-2 border-blue-600 rounded-lg text-sm font-bold"></select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-[10px] uppercase font-bold text-gray-400">Ubicación</label><input id="h_ubi" readonly class="w-full p-3 bg-gray-100 border rounded-lg text-xs"></div>
                <div><label class="text-[10px] uppercase font-bold text-gray-400">Inventario</label><input id="h_inv" readonly class="w-full p-3 bg-gray-100 border rounded-lg text-xs"></div>
            </div>
            <div><label class="text-[10px] uppercase font-bold text-gray-400">Equipo Detectado</label><input id="h_eq" readonly class="w-full p-3 bg-gray-100 border rounded-lg text-xs"></div>

            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-[10px] uppercase font-bold text-gray-400">Personal Asignado</label>
                    <select id="tecnico" class="w-full p-3 bg-gray-50 border rounded-lg text-sm font-bold text-blue-800">
                        <option>Téc. Arrieta</option>
                        <option>Téc. Coria</option>
                        <option>Téc. Orellano</option>
                        <option>Téc. Sosa</option>
                        <option>Mantenimiento General</option>
                    </select>
                </div>
                <div><label class="text-[10px] uppercase font-bold text-gray-400">Estado</label>
                    <select id="estado" class="w-full p-3 bg-gray-50 border rounded-lg text-sm"><option>Abierta</option><option>En Proceso</option></select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input id="reportado" placeholder="Reportado por" class="p-3 bg-gray-50 border rounded-lg text-sm">
                <select id="medio" class="p-3 bg-gray-50 border rounded-lg text-sm"><option>WhatsApp</option><option>Email</option><option>Personalmente</option></select>
            </div>

            <textarea id="desc" rows="3" placeholder="Descripción de la falla o tarea..." class="w-full p-3 bg-gray-50 border rounded-lg text-sm"></textarea>
            
            <button onclick="enviarOT()" class="w-full bg-blue-700 text-white p-4 rounded-xl font-bold uppercase shadow-lg active:scale-95 transition-all">Emitir Orden de Trabajo</button>
        </div>

        <div id="pendientes" class="hidden space-y-4">
            <label class="block text-[10px] font-bold text-red-700 uppercase">Seleccionar OT Abierta</label>
            <select id="listaOT" class="w-full p-4 bg-red-50 border-2 border-red-200 rounded-xl text-sm font-bold"></select>
            <textarea id="obsFinal" rows="4" placeholder="Observaciones finales del técnico..." class="w-full p-3 bg-gray-50 border rounded-lg text-sm"></textarea>
            <button onclick="cerrarOT()" class="w-full bg-red-600 text-white p-4 rounded-xl font-bold uppercase shadow-lg">Finalizar y Archivar</button>
        </div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbwoJfQxH2J9CTLQSpQ5FArnPSoL0yjskJQEBcu_7ddcVo-O0RD9uqlVm42STr_mh1bMKA/exec"; 
        const TOKEN = "4370";
        let SECTORES_DATA = [];

        function tab(t) {
            document.getElementById('nueva').classList.toggle('hidden', t !== 'nueva');
            document.getElementById('pendientes').classList.toggle('hidden', t !== 'pendientes');
            document.getElementById('btn-n').classList.toggle('tab-active', t === 'nueva');
            document.getElementById('btn-p').classList.toggle('tab-active', t === 'pendientes');
            if(t === 'pendientes') loadAbiertas();
        }

        async function init() {
            const r = await fetch(`${URL}?action=getEdificios&token=${TOKEN}`).then(res=>res.json());
            document.getElementById('edif').innerHTML = '<option value="">Seleccione Edificio...</option>' + r.map(e=>`<option value="${e}">${e}</option>`).join("");
        }

        async function cargarSectores() {
            const e = document.getElementById('edif').value;
            if(!e) return;
            const r = await fetch(`${URL}?action=getSectores&edificio=${encodeURIComponent(e)}&token=${TOKEN}`).then(res=>res.json());
            SECTORES_DATA = r;
            document.getElementById('sect').innerHTML = r.map((s,i)=>`<option value="${s.sector}" data-idx="${i}">${s.sector}</option>`).join("");
            document.getElementById('div-sector').classList.remove('hidden');
            llenarCampos();
        }

        function llenarCampos() {
            const sel = document.getElementById('sect');
            const item = SECTORES_DATA[sel.options[sel.selectedIndex].dataset.idx];
            document.getElementById('h_ubi').value = item.ubi || "";
            document.getElementById('h_inv').value = item.inv_aire || "";
            document.getElementById('h_eq').value = item.eq_aire || "";
        }

        async function enviarOT() {
            if(!document.getElementById('edif').value) return alert("Seleccione Edificio");
            document.getElementById('loader').style.display = "flex";
            const p = {
                action: 'nuevaOT', token: TOKEN,
                tipo: document.getElementById('tipo').value, especialidad: document.getElementById('rubro').value,
                edificio: document.getElementById('edif').value, sector: document.getElementById('sect').value,
                ubicacion: document.getElementById('h_ubi').value, nInventario: document.getElementById('h_inv').value,
                equipo: document.getElementById('h_eq').value, reportadoPor: document.getElementById('reportado').value,
                medioReporte: document.getElementById('medio').value, personal: document.getElementById('tecnico').value,
                descripcion: document.getElementById('desc').value, estado: document.getElementById('estado').value
            };
            await fetch(URL, {method:'POST', body: JSON.stringify(p)});
            alert("Orden Guardada Correctamente"); 
            location.reload();
        }

        async function loadAbiertas() {
            const d = await fetch(`${URL}?action=getAbiertas&token=${TOKEN}`).then(r=>r.json());
            document.getElementById('listaOT').innerHTML = d.map(o=>`<option value="${o.id}">${o.detalle}</option>`).join("");
        }

        async function cerrarOT() {
            if(!document.getElementById('listaOT').value) return;
            document.getElementById('loader').style.display="flex";
            const p = { 
                action:'cerrarOT', token: TOKEN, idOT: document.getElementById('listaOT').value, 
                comentarioFinal: document.getElementById('obsFinal').value 
            };
            await fetch(URL, {method:'POST', body: JSON.stringify(p)});
            alert("OT Finalizada!"); 
            location.reload();
        }

        init();
    </script>
</body>
</html>
