<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGM PRO 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: none; justify-content: center; align-items: center; z-index: 3000; flex-direction: column; }
        .tab-active { border-bottom: 4px solid #1e40af; color: #1e40af; font-weight: bold; background: #f8fafc; }
        .card-vencida { border-left: 8px solid #ef4444; background: #fff1f2; }
        .card-proxima { border-left: 8px solid #f59e0b; background: #fffbeb; }
        .card-ok { border-left: 8px solid #22c55e; background: #f0fdf4; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 p-2 text-slate-800">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[2000] p-4">
        <div class="bg-white p-10 rounded-[45px] shadow-2xl w-full max-w-sm text-center">
            <h2 class="font-black text-2xl mb-8 uppercase tracking-tighter text-blue-900">SGM INGENIERÍA</h2>
            <input type="password" id="pin-input" placeholder="PIN" class="w-full border-2 p-5 rounded-3xl text-center text-4xl mb-6 outline-none focus:border-blue-500">
            <button onclick="verificarAcceso()" class="w-full bg-blue-600 text-white font-black py-5 rounded-3xl uppercase">Entrar</button>
        </div>
    </div>

    <div id="loader" class="loading-overlay">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-black text-blue-900 text-[10px] uppercase">Sincronizando...</p>
    </div>

    <div id="main-content" class="max-w-4xl mx-auto bg-white rounded-[40px] shadow-xl p-4 hidden mt-2 mb-10">
        
        <div class="flex border-b mb-6 overflow-x-auto no-scrollbar text-[10px] font-black uppercase whitespace-nowrap sticky top-0 bg-white z-50">
            <button onclick="tab('nueva')" id="btn-nueva" class="flex-1 py-5 tab-active">Nueva OT</button>
            <button onclick="tab('pendientes')" id="btn-pendientes" class="flex-1 py-5 text-slate-400">Cerrar OT</button>
            <button onclick="tab('relev')" id="btn-relev" class="flex-1 py-5 text-blue-600">Relevamiento</button>
            <button onclick="tab('extintores')" id="btn-extintores" class="flex-1 py-5 text-red-500">Extintores</button>
            <button onclick="tab('historial')" id="btn-historial" class="flex-1 py-5 text-slate-400">Historial</button>
        </div>

        <div id="sec-nueva" class="space-y-4">
            <div class="grid grid-cols-2 gap-2">
                <select id="n-tipo" class="p-4 bg-slate-50 border rounded-2xl font-bold"><option>Correctivo</option><option>Preventivo</option><option>Mejora</option></select>
                <select id="n-rubro" onchange="checkRefrig()" class="p-4 bg-slate-50 border rounded-2xl font-bold"><option>Electricidad</option><option>General</option><option>Refrigeración</option><option>Herrería</option></select>
            </div>
            <select id="n-edif" onchange="loadCascada('n-edif','n-sec','n-ubi','dbU')" class="w-full p-4 border-2 border-blue-100 rounded-2xl font-black bg-blue-50"></select>
            <select id="n-sec" onchange="filterUbi('n-sec','n-ubi','dbU')" class="w-full p-4 border rounded-2xl" disabled><option>Sector...</option></select>
            <select id="n-ubi" onchange="autoFill()" class="w-full p-4 border rounded-2xl font-bold" disabled><option>Ubicación...</option></select>
            <div id="div-refrig" class="hidden grid grid-cols-2 gap-2 bg-blue-50 p-4 rounded-2xl border border-blue-100">
                <input id="n-inv" placeholder="N° Inv" class="p-3 border rounded-xl bg-white" readonly>
                <input id="n-eq" placeholder="Equipo" class="p-3 border rounded-xl bg-white" readonly>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input id="n-rep" placeholder="Reportó..." class="p-4 border rounded-2xl bg-slate-50">
                <select id="n-tec" class="p-4 border-2 border-yellow-200 rounded-2xl font-black bg-yellow-50"><option value="">Técnico...</option><option>DSF</option><option>AGL</option><option>MAP</option><option>RRG</option></select>
            </div>
            <textarea id="n-desc" placeholder="Descripción..." class="w-full p-4 border rounded-2xl bg-slate-50" rows="3"></textarea>
            <button onclick="saveOT()" class="w-full bg-blue-700 text-white p-5 rounded-3xl font-black uppercase">Registrar OT</button>
        </div>

        <div id="sec-pendientes" class="hidden space-y-4">
            <select id="c-lista" class="w-full p-4 border-2 border-green-100 rounded-2xl font-black bg-green-50"></select>
            <div class="p-5 bg-slate-50 rounded-[35px] border-2 border-dashed space-y-3">
                <select id="m-rub" onchange="loadG()" class="w-full p-3 border rounded-xl bg-white font-bold"></select>
                <div class="grid grid-cols-2 gap-2">
                    <select id="m-gru" onchange="loadI()" class="p-3 border rounded-xl bg-white" disabled><option>Grupo...</option></select>
                    <select id="m-ite" class="p-3 border rounded-xl bg-white text-[10px]" disabled><option>Item...</option></select>
                </div>
                <div class="flex gap-2">
                    <input type="number" id="m-cant" value="1" class="w-20 p-3 border-2 border-blue-200 rounded-xl text-center font-black">
                    <button onclick="addItem()" class="flex-1 bg-slate-800 text-white rounded-xl font-black text-[10px] uppercase">Añadir</button>
                </div>
                <div id="cesta" class="space-y-1"></div>
            </div>
            <textarea id="c-obs" placeholder="Observaciones cierre..." class="w-full p-4 border rounded-2xl bg-slate-50" rows="3"></textarea>
            <button onclick="cerrarOT()" class="w-full bg-green-600 text-white p-6 rounded-[35px] font-black uppercase">Cerrar Orden</button>
        </div>

        <div id="sec-relev" class="hidden space-y-4">
            <select id="r-edif" onchange="loadCascada('r-edif','r-sec','r-ubi','dbR')" class="w-full p-4 border-2 border-blue-200 rounded-2xl font-black bg-blue-50"></select>
            <div class="grid grid-cols-2 gap-2">
                <select id="r-sec" onchange="filterUbi('r-sec','r-ubi','dbR')" class="p-4 border rounded-2xl" disabled><option>Sector...</option></select>
                <select id="r-ubi" onchange="fillRelev()" class="p-4 border rounded-2xl" disabled><option>Ubicación...</option></select>
            </div>
            <div class="grid grid-cols-1 gap-3 p-5 bg-slate-50 rounded-[35px] border">
                <div class="grid grid-cols-2 gap-2">
                    <input id="r-inv-a" placeholder="Inv. Aire" class="p-3 border rounded-xl">
                    <input id="r-eq-a" placeholder="Equipo Aire" class="p-3 border rounded-xl">
                </div>
                <input id="r-tlum" placeholder="Tipo Iluminación" class="p-3 border rounded-xl">
                <div class="grid grid-cols-2 gap-2">
                    <input id="r-cart" type="number" placeholder="Cant. Art." class="p-3 border rounded-xl">
                    <input id="r-clam" type="number" placeholder="Cant. Lam." class="p-3 border rounded-xl">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input id="r-em" placeholder="Emergencia" class="p-3 border rounded-xl">
                    <input id="r-vent" placeholder="Ventilador" class="p-3 border rounded-xl">
                </div>
                <input id="r-inv-v" placeholder="Inv. Vent." class="p-3 border rounded-xl">
                <button onclick="updateRelev()" class="w-full bg-blue-600 text-white p-5 rounded-3xl font-black uppercase">Actualizar Ficha</button>
            </div>
        </div>

        <div id="sec-extintores" class="hidden space-y-4">
            <select id="e-edif" onchange="loadExt()" class="w-full p-5 bg-slate-900 text-white rounded-[25px] font-black"></select>
            <button onclick="downloadOC()" class="w-full bg-red-600 text-white p-4 rounded-2xl font-black text-[10px] uppercase">Generar Orden Compra</button>
            <div id="e-lista" class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-h-[60vh] overflow-y-auto"></div>
        </div>

        <div id="sec-historial" class="hidden space-y-3">
            <input type="text" id="h-search" onkeyup="filterHist()" placeholder="Buscar..." class="w-full p-4 border rounded-[25px] bg-slate-50 font-bold">
            <div id="hist-lista" class="space-y-2 max-h-[60vh] overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxeOk3-M2jhwadnJ0fru79S7GKHOB7cVzs0I8qEv_-ifFVuhVANAZSuC0O8-3xKj0nB/exec"; // REEMPLAZAR
        const PIN_CORRECTO = "4370";
        let dbU = [], dbR = [], dbM = {}, cesta = [], dbH = [];

        function showL(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }

        window.onload = () => { if(localStorage.getItem('sgm_session') === PIN_CORRECTO) { loginExitoso(); } };

        function verificarAcceso() {
            if(document.getElementById('pin-input').value === PIN_CORRECTO) {
                localStorage.setItem('sgm_session', PIN_CORRECTO);
                loginExitoso();
            } else alert("PIN Incorrecto");
        }

        function loginExitoso() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            init();
        }

        async function init() {
            showL(true);
            try {
                const eds = await fetch(`${URL}?action=getEdificios&token=${PIN_CORRECTO}`).then(r=>r.json());
                ['n-edif','e-edif','r-edif'].forEach(id => {
                    document.getElementById(id).innerHTML = '<option value="">Edificio...</option>' + eds.map(e=>`<option value="${e}">${e}</option>`).join("");
                });
                dbM = await fetch(`${URL}?action=getMateriales&token=${PIN_CORRECTO}`).then(r=>r.json());
                document.getElementById('m-rub').innerHTML = '<option value="">Rubro Material</option>' + Object.keys(dbM).map(x=>`<option value="${x}">${x}</option>`).join("");
            } catch(e) { console.error(e); }
            showL(false);
        }

        function tab(t) {
            ['nueva','pendientes','relev','extintores','historial'].forEach(s => {
                document.getElementById('sec-'+s).classList.toggle('hidden', s!==t);
                document.getElementById('btn-'+s).classList.toggle('tab-active', s===t);
            });
            if(t==='pendientes') loadAbiertas();
            if(t==='historial') loadHist();
        }

        // --- CASCADA ---
        async function loadCascada(edId, secId, ubiId, dbName) {
            const ed = document.getElementById(edId).value; if(!ed) return;
            showL(true);
            const r = await fetch(`${URL}?action=getSectores&edificio=${encodeURIComponent(ed)}&token=${PIN_CORRECTO}`).then(r=>r.json());
            if(dbName === 'dbU') dbU = r; else dbR = r;
            document.getElementById(secId).innerHTML = '<option value="">Sector...</option>' + [...new Set(r.map(x=>x.sector))].map(s=>`<option value="${s}">${s}</option>`).join("");
            document.getElementById(secId).disabled = false;
            showL(false);
        }

        function filterUbi(secId, ubiId, dbName) {
            const s = document.getElementById(secId).value;
            const data = (dbName === 'dbU') ? dbU : dbR;
            document.getElementById(ubiId).innerHTML = '<option value="">Ubicación...</option>' + data.filter(x=>x.sector===s).map(x=>`<option value='${JSON.stringify(x)}'>${x.ubi}</option>`).join("");
            document.getElementById(ubiId).disabled = false;
        }

        // --- RELEVAMIENTO ---
        function fillRelev() {
            const d = JSON.parse(document.getElementById('r-ubi').value);
            document.getElementById('r-inv-a').value = d.inv_aire || "";
            document.getElementById('r-eq-a').value = d.eq_aire || "";
            document.getElementById('r-tlum').value = d.t_lum || "";
            document.getElementById('r-cart').value = d.c_art || "";
            document.getElementById('r-clam').value = d.c_lam || "";
            document.getElementById('r-em').value = d.em || "";
            document.getElementById('r-vent').value = d.vent || "";
            document.getElementById('r-inv-v').value = d.inv_vent || "";
        }

        async function updateRelev() {
            showL(true);
            const sel = JSON.parse(document.getElementById('r-ubi').value);
            const p = {
                action: 'updateRelevamiento', token: PIN_CORRECTO,
                edificio: document.getElementById('r-edif').value,
                fila: sel.fila, sector: sel.sector, ubi: sel.ubi,
                inv_aire: document.getElementById('r-inv-a').value, eq_aire: document.getElementById('r-eq-a').value,
                t_lum: document.getElementById('r-tlum').value, c_art: document.getElementById('r-cart').value,
                c_lam: document.getElementById('r-clam').value, em: document.getElementById('r-em').value,
                vent: document.getElementById('r-vent').value, inv_vent: document.getElementById('r-inv-v').value
            };
            await fetch(URL, {method:'POST', body: JSON.stringify(p)});
            alert("FICHA ACTUALIZADA"); location.reload();
        }

        // --- EXTINTORES ---
        async function loadExt() {
            const ed = document.getElementById('e-edif').value; if(!ed) return;
            showL(true);
            const data = await fetch(`${URL}?action=getExtintores&edificio=${encodeURIComponent(ed)}&token=${PIN_CORRECTO}`).then(r=>r.json());
            const list = document.getElementById('e-lista'); list.innerHTML = "";
            const hoy = new Date();
            data.forEach(x => {
                const partes = x.f_venc.split('/');
                const fv = new Date(partes[2], partes[1]-1, partes[0]);
                const diff = (fv - hoy) / (1000 * 60 * 60 * 24);
                let cls = diff < 0 ? "card-vencida" : (diff < 30 ? "card-proxima" : "card-ok");
                list.innerHTML += `<div class="p-4 rounded-3xl border shadow-sm ${cls}"><p class="font-black text-xs">${x.unne}</p><p class="text-[9px] uppercase">${x.ubi}</p><p class="text-[10px] font-black mt-2 uppercase text-slate-500">Vence: ${x.f_venc}</p></div>`;
            });
            showL(false);
        }

        // --- CIERRE Y MATERIALES ---
        async function loadAbiertas() { showL(true); const d = await fetch(`${URL}?action=getAbiertas&token=${PIN_CORRECTO}`).then(r=>r.json()); document.getElementById('c-lista').innerHTML = d.map(o=>`<option value="${o.id}">${o.detalle}</option>`).join(""); showL(false); }
        function loadG() { const r = document.getElementById('m-rub').value; document.getElementById('m-gru').innerHTML = '<option value="">Grupo...</option>' + Object.keys(dbM[r]).map(x=>`<option value="${x}">${x}</option>`).join(""); document.getElementById('m-gru').disabled = false; }
        function loadI() { const r = document.getElementById('m-rub').value, g = document.getElementById('m-gru').value; document.getElementById('m-ite').innerHTML = '<option value="">Item...</option>' + dbM[r][g].map(x=>`<option value='${JSON.stringify(x)}'>${x.nombre} (S:${x.stock})</option>`).join(""); document.getElementById('m-ite').disabled = false; }
        function addItem() { const it = JSON.parse(document.getElementById('m-ite').value); cesta.push({nombre: it.nombre, cantidad: document.getElementById('m-cant').value, hoja: it.hoja}); renderCesta(); }
        function renderCesta() { document.getElementById('cesta').innerHTML = cesta.map((x,i)=>`<div class="flex justify-between bg-blue-600 text-white p-2 rounded-xl text-[9px] font-bold"><span>${x.cantidad} x ${x.nombre}</span><button onclick="cesta.splice(${i},1);renderCesta()">X</button></div>`).join(""); }
        
        async function cerrarOT() {
            showL(true);
            const p = { action: 'cerrarOT', token: PIN_CORRECTO, idOT: document.getElementById('c-lista').value, materialesUsados: cesta.map(x=>`${x.cantidad} ${x.nombre}`).join(", "), listaParaDescontar: cesta, comentarioFinal: document.getElementById('c-obs').value };
            await fetch(URL, {method:'POST', body: JSON.stringify(p)});
            alert("OT CERRADA"); location.reload();
        }

        // --- RESTO ---
        function autoFill() { const d = JSON.parse(document.getElementById('n-ubi').value); document.getElementById('n-inv').value = d.inv_aire || ""; document.getElementById('n-eq').value = d.eq_aire || ""; }
        function checkRefrig() { document.getElementById('div-refrig').classList.toggle('hidden', document.getElementById('n-rubro').value !== "Refrigeración"); }
        async function saveOT() { showL(true); const u = JSON.parse(document.getElementById('n-ubi').value); const p = { action: 'nuevaOT', token: PIN_CORRECTO, tipo: document.getElementById('n-tipo').value, especialidad: document.getElementById('n-rubro').value, edificio: document.getElementById('n-edif').value, sector: u.sector, ubicacion: u.ubi, nInventario: document.getElementById('n-inv').value, equipo: document.getElementById('n-eq').value, reportadoPor: document.getElementById('n-rep').value, personal: document.getElementById('n-tec').value, descripcion: document.getElementById('n-desc').value }; await fetch(URL, {method:'POST', body: JSON.stringify(p)}); alert("OT CREADA"); location.reload(); }
        async function loadHist() { showL(true); dbH = await fetch(`${URL}?action=getHistorial&token=${PIN_CORRECTO}`).then(r=>r.json()); filterHist(); showL(false); }
        function filterHist() { const q = document.getElementById('h-search').value.toLowerCase(); document.getElementById('hist-lista').innerHTML = dbH.filter(o => o.est.toLowerCase().includes(q) || o.edif.toLowerCase().includes(q)).map(o => `<div class="bg-white p-3 rounded-2xl border shadow-sm text-[10px] border-l-8 ${o.est==='Abierta'?'border-orange-400':'border-blue-500'}"><p class="font-black">#${o.id} - ${o.est}</p><p class="font-bold uppercase">${o.edif}</p><p>${o.tarea}</p></div>`).join(""); }
    </script>
</body>
</html>
