<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGM FIUNNE 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .tab-active { border-bottom: 4px solid #f06423; color: #f06423; font-weight: 900; }
    </style>
</head>
<body class="p-2">

    <div id="loader" class="fixed inset-0 bg-black/60 hidden z-[5000] flex flex-col items-center justify-center text-white">
        <div class="w-10 h-10 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-2"></div>
        <p class="text-[10px] font-bold">CARGANDO...</p>
    </div>

    <div class="max-w-2xl mx-auto">
        <header class="p-4 bg-white rounded-xl shadow-sm mb-4 flex justify-between items-center">
            <h1 class="font-black text-slate-800">SGM FIUNNE</h1>
            <span id="fecha" class="text-xs font-bold bg-slate-100 px-2 py-1 rounded"></span>
        </header>

        <nav class="flex bg-white rounded-t-xl border-b mb-4 overflow-x-auto">
            <button onclick="tab('nueva')" id="btn-nueva" class="flex-1 py-4 text-[10px] font-black uppercase">Nueva OT</button>
            <button onclick="tab('cerrar')" id="btn-cerrar" class="flex-1 py-4 text-[10px] font-black uppercase">Cerrar OT</button>
            <button onclick="tab('historial')" id="btn-historial" class="flex-1 py-4 text-[10px] font-black uppercase">Historial</button>
        </nav>

        <div id="sec-nueva" class="hidden space-y-3">
            <div class="bg-white p-4 rounded-xl shadow-sm space-y-3">
                <select id="n-edif" onchange="loadSectores(this.value)" class="w-full p-3 border rounded-lg font-bold"></select>
                <select id="n-sec" class="w-full p-3 border rounded-lg text-sm"></select>
                <input type="text" id="n-pers" placeholder="Personal Responsable" class="w-full p-3 border rounded-lg text-sm">
                <textarea id="n-desc" placeholder="Descripción de la tarea" class="w-full p-3 border rounded-lg text-sm h-24"></textarea>
                <button onclick="registrarOT()" class="w-full bg-[#f06423] text-white p-4 rounded-lg font-black shadow-lg">REGISTRAR ORDEN</button>
            </div>
        </div>

        <div id="sec-cerrar" class="hidden space-y-3">
            <div class="bg-white p-4 rounded-xl shadow-sm space-y-3">
                <select id="c-lista" class="w-full p-3 border-2 border-orange-200 rounded-lg text-xs font-bold"></select>
                <textarea id="c-obs" placeholder="Novedades del cierre..." class="w-full p-3 border rounded-lg text-sm h-24"></textarea>
                <button onclick="finalizarOT()" class="w-full bg-green-600 text-white p-4 rounded-lg font-black shadow-lg">CERRAR TRABAJO</button>
            </div>
        </div>

        <div id="sec-historial" class="hidden space-y-2" id="hist-cont"></div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbyviyiaJCs1VjElfeB3e_5D_GIxKVoHNJUwubZbttJqgLDZAyWdITHdk1e9xA63cmAK/exec"; // REEMPLAZA ESTO
        const PIN = "4370";

        function showL(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }

        async function loadSectores(edif) {
            if(!edif) return;
            const res = await fetch(`${URL}?action=getSectores&token=${PIN}&edificio=${encodeURIComponent(edif)}`);
            const data = await res.json();
            document.getElementById('n-sec').innerHTML = data.map(s => `<option value="${s.sector}">${s.sector} - ${s.ubi}</option>`).join("");
        }

        async function registrarOT() {
            showL(true);
            const d = {
                edificio: document.getElementById('n-edif').value,
                sector: document.getElementById('n-sec').value,
                personal: document.getElementById('n-pers').value,
                descripcion: document.getElementById('n-desc').value,
                tipo: "Correctivo",
                especialidad: "General",
                token: PIN
            };
            await fetch(URL, { method: 'POST', body: JSON.stringify(d) });
            alert("Registrado");
            location.reload();
        }

        async function finalizarOT() {
            const id = document.getElementById('c-lista').value;
            if(!id) return alert("Seleccione OT");
            showL(true);
            const d = {
                action: 'cerrarOT',
                idOT: id,
                comentario: document.getElementById('c-obs').value,
                token: PIN
            };
            await fetch(URL, { method: 'POST', body: JSON.stringify(d) });
            alert("Cerrada");
            location.reload();
        }

        async function loadAbiertas() {
            const res = await fetch(`${URL}?action=getAbiertas&token=${PIN}`);
            const data = await res.json();
            if(Array.isArray(data)) {
                document.getElementById('c-lista').innerHTML = data.length > 0 
                    ? '<option value="">Seleccione OT...</option>' + data.map(o => `<option value="${o.id}">${o.detalle}</option>`).join("")
                    : '<option>No hay pendientes</option>';
            }
        }

        async function loadHistorial() {
            showL(true);
            const res = await fetch(`${URL}?action=getHistorial&token=${PIN}`);
            const data = await res.json();
            document.getElementById('sec-historial').innerHTML = data.map(h => `
                <div class="bg-white p-3 rounded-lg border-l-4 ${h.est === 'Cerrada' ? 'border-green-500' : 'border-blue-400'} mb-2 shadow-sm text-xs">
                    <p class="font-black">#${h.id} - ${h.fecha}</p>
                    <p class="uppercase">${h.edif} | ${h.tarea}</p>
                </div>
            `).join("");
            showL(false);
        }

        function tab(name) {
            ['nueva', 'cerrar', 'historial'].forEach(s => {
                document.getElementById('sec-' + s).classList.add('hidden');
                document.getElementById('btn-' + s).classList.remove('tab-active');
            });
            document.getElementById('sec-' + name).classList.remove('hidden');
            document.getElementById('btn-' + name).classList.add('tab-active');
            if(name === 'cerrar') loadAbiertas();
            if(name === 'historial') loadHistorial();
        }

        async function init() {
            document.getElementById('fecha').innerText = new Date().toLocaleDateString();
            showL(true);
            try {
                const res = await fetch(`${URL}?action=getEdificios&token=${PIN}`);
                const eds = await res.json();
                document.getElementById('n-edif').innerHTML = '<option value="">Seleccione Edificio...</option>' + eds.map(e => `<option value="${e}">${e}</option>`).join("");
                tab('nueva');
            } catch(e) { alert("Error de conexión"); }
            finally { showL(false); }
        }

        window.onload = init;
    </script>
</body>
</html>
