<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mantenimiento FIUNNE 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --fiunne-orange: #f06423; --fiunne-gray: #374151; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; touch-action: manipulation; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); display: none; justify-content: center; align-items: center; z-index: 3000; flex-direction: column; color: white; }
        .tab-active { border-bottom: 4px solid var(--fiunne-orange); color: var(--fiunne-orange); font-weight: 900; background: #fff7ed; }
        .btn-fiunne { background-color: var(--fiunne-orange); color: white; transition: all 0.2s; }
        .btn-fiunne:active { transform: scale(0.96); opacity: 0.9; }
        input, select, textarea { font-size: 16px !important; }
    </style>
</head>
<body class="p-2 md:p-4 select-none">

    <div id="login-screen" class="fixed inset-0 bg-slate-950 flex items-center justify-center z-[2000] p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center border-t-8 border-[#f06423]">
            <div class="mb-6 h-32 w-32 mx-auto flex items-center justify-center rounded-full border-4 border-[#f06423]/20 p-2 overflow-hidden bg-slate-50">
                <img src="https://raw.githubusercontent.com/fiunne/mantenimiento-unne/main/logo.png" alt="Logo FIUNNE" class="max-h-[85%] max-w-[85%] object-contain">
            </div>
            <h2 class="font-black text-2xl text-slate-900 uppercase tracking-tighter">Mantenimiento</h2>
            <p class="text-slate-400 text-[10px] mb-8 font-black tracking-[0.2em] uppercase mt-1">Facultad de Ingeniería UNNE</p>
            <input type="password" id="pin-input" inputmode="numeric" placeholder="PIN" class="w-full border-2 p-4 rounded-xl text-center text-4xl mb-6 outline-none focus:border-[#f06423] bg-slate-50">
            <button onclick="verificarAcceso()" class="w-full btn-fiunne font-black py-5 rounded-xl uppercase shadow-xl tracking-widest">Acceder</button>
        </div>
    </div>

    <div id="loader" class="loading-overlay">
        <div class="w-12 h-12 border-4 border-[#f06423] border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-black text-[10px] uppercase tracking-[0.3em]">Sincronizando FIUNNE...</p>
    </div>

    <div id="main-content" class="max-w-4xl mx-auto hidden pb-20">
        
        <header class="mb-4 p-4 bg-white rounded-2xl border shadow-sm">
            <div class="flex justify-between items-start mb-5">
                <div>
                    <h1 class="text-xl font-black text-slate-900 uppercase tracking-tighter">Panel de Control</h1>
                    <p class="text-[9px] font-black text-[#f06423] uppercase tracking-widest mt-1">FIUNNE • Gestión Operativa</p>
                </div>
                <div class="text-right">
                    <span id="fecha-actual" class="text-[9px] font-black bg-slate-950 text-white px-3 py-1.5 rounded-lg uppercase">-- --- 202X</span>
                </div>
            </div>

            <div id="dashboard" class="space-y-2">
                <div class="bg-red-50 p-4 rounded-xl border border-red-100 flex justify-between items-center">
                    <div>
                        <p class="text-[9px] font-black text-red-500 uppercase tracking-widest">Estado HySL (Vencidos)</p>
                        <p id="dash-venc" class="text-3xl font-black text-red-900 mt-1">0</p>
                    </div>
                    <div class="h-10 w-10 bg-red-600 rounded-lg flex items-center justify-center">
                        <span class="text-white text-lg">⚠️</span>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                        <p class="text-[8px] font-black text-blue-500 uppercase tracking-wider">OT Abiertas</p>
                        <p id="dash-ot" class="text-2xl font-black text-blue-900 mt-1">0</p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                        <p class="text-[8px] font-black text-slate-500 uppercase tracking-wider">Edificios</p>
                        <p id="dash-sec" class="text-2xl font-black text-slate-900 mt-1">0</p>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex border-b mb-6 overflow-x-auto text-[9px] font-black uppercase sticky top-0 bg-slate-100/90 backdrop-blur-md z-50 py-2">
            <button onclick="tab('nueva')" id="btn-nueva" class="flex-1 py-4 tab-active">Nueva OT</button>
            <button onclick="tab('pendientes')" id="btn-pendientes" class="flex-1 py-4 text-slate-400">Cerrar OT</button>
            <button onclick="tab('relev')" id="btn-relev" class="flex-1 py-4 text-slate-400">Relevamiento</button>
            <button onclick="tab('extintores')" id="btn-extintores" class="flex-1 py-4 text-green-600">HySL / Ext.</button>
            <button onclick="tab('historial')" id="btn-historial" class="flex-1 py-4 text-slate-400">Historial</button>
        </div>

        <div id="sec-pendientes" class="hidden space-y-4 px-1">
            <div class="relative">
                <select id="c-lista" class="w-full p-4 border-2 border-orange-200 rounded-xl font-black bg-white text-xs appearance-none shadow-sm outline-none focus:border-orange-500 transition-all">
                    </select>
                <div class="absolute right-4 top-4 pointer-events-none text-orange-400">▼</div>
            </div>

            <div class="p-5 bg-white rounded-2xl border shadow-sm space-y-4">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest border-b pb-2">Materiales Utilizados</p>
                <select id="m-rub" onchange="loadG()" class="w-full p-4 border rounded-lg text-xs font-bold bg-slate-50"></select>
                <div class="grid grid-cols-2 gap-2">
                    <select id="m-gru" onchange="loadI()" class="p-4 border rounded-lg text-xs bg-slate-50" disabled><option>Grupo...</option></select>
                    <select id="m-ite" class="p-4 border rounded-lg text-[10px] bg-slate-50" disabled><option>Item...</option></select>
                </div>
                <div class="flex gap-2">
                    <input type="number" id="m-cant" value="1" class="w-20 p-4 border-2 border-slate-300 rounded-lg text-center font-black">
                    <button onclick="addItem()" class="flex-1 bg-slate-800 text-white rounded-lg font-black text-xs uppercase shadow active:scale-95 transition-transform">Añadir Insumo</button>
                </div>
                <div id="cesta" class="space-y-1"></div>
            </div>

            <textarea id="c-obs" placeholder="Novedades del cierre..." class="w-full p-4 border rounded-xl bg-white text-xs shadow-sm" rows="3"></textarea>
            <button onclick="cerrarOT()" class="w-full bg-green-600 text-white p-5 rounded-xl font-black uppercase shadow-lg active:scale-[0.98] transition-all">Finalizar Tarea</button>
        </div>

        <div id="sec-nueva" class="space-y-4 px-1">
            <div class="grid grid-cols-2 gap-2">
                <select id="n-tipo" class="p-4 bg-white border rounded-xl text-xs font-bold shadow-sm outline-none"><option>Correctivo</option><option>Preventivo</option><option>Mejora</option></select>
                <select id="n-rubro" onchange="checkRefrig()" class="p-4 bg-white border rounded-xl text-xs font-black text-blue-800 shadow-sm outline-none">
                    <option>Electricidad</option><option>General</option><option>Refrigeración</option><option>Herrería</option><option>HySL (Seguridad)</option>
                </select>
            </div>
            <select id="n-edif" onchange="loadCascada('n-edif','n-sec','n-ubi')" class="w-full p-4 border-2 border-slate-200 rounded-xl text-xs font-black bg-white focus:border-[#f06423] outline-none"></select>
            <select id="n-sec" onchange="filterUbi('n-sec','n-ubi')" class="w-full p-4 border rounded-xl text-xs bg-white" disabled><option>Sector...</option></select>
            <select id="n-ubi" onchange="autoFill()" class="w-full p-4 border rounded-xl text-xs font-bold bg-white" disabled><option>Ubicación...</option></select>
            
            <div id="div-refrig" class="hidden grid grid-cols-2 gap-2 bg-slate-900 p-4 rounded-xl text-white shadow-inner">
                <div class="space-y-1"><label class="text-[8px] font-bold text-slate-400 uppercase">Inventario</label><input id="n-inv" class="bg-slate-800 w-full p-2 rounded-lg text-xs" readonly></div>
                <div class="space-y-1"><label class="text-[8px] font-bold text-slate-400 uppercase">Equipo</label><input id="n-eq" class="bg-slate-800 w-full p-2 rounded-lg text-xs" readonly></div>
            </div>

            <input id="n-rep" placeholder="Reportado por..." class="w-full p-4 border rounded-xl text-xs bg-white shadow-sm">
            <select id="n-tec" class="w-full p-4 border-2 border-yellow-200 rounded-xl text-xs font-black bg-yellow-50 outline-none">
                <option value="">Asignar Técnico...</option><option>DSF</option><option>AGL</option><option>MAP</option><option>RRG</option>
            </select>
            <textarea id="n-desc" placeholder="Descripción de la falla..." class="w-full p-4 border rounded-xl bg-white text-xs shadow-sm" rows="3"></textarea>
            <button onclick="saveOT()" class="w-full btn-fiunne p-5 rounded-xl font-black uppercase shadow-lg tracking-widest transition-all">Registrar Trabajo</button>
        </div>

        <div id="sec-relev" class="hidden space-y-3 px-1">
            <select id="r-edif" onchange="loadCascadaRelev()" class="w-full p-4 border-2 border-slate-200 rounded-xl text-xs font-black bg-white"></select>
            <select id="r-sec" onchange="filterUbiRelev()" class="w-full p-4 border rounded-xl text-xs bg-white" disabled><option>Sector...</option></select>
            <select id="r-ubi" onchange="fillRelevFields()" class="w-full p-4 border rounded-xl text-xs font-bold bg-white" disabled><option>Ubicación...</option></select>
            <div id="relev-form" class="hidden bg-white p-5 rounded-2xl shadow-lg border space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1"><label class="text-[8px] font-bold text-slate-400 uppercase">Inv Aire</label><input id="r-inv-a" class="w-full p-3 border rounded-lg text-xs bg-slate-50"></div>
                    <div class="space-y-1"><label class="text-[8px] font-bold text-slate-400 uppercase">Eq Aire</label><input id="r-eq-a" class="w-full p-3 border rounded-lg text-xs bg-slate-50"></div>
                </div>
                <button onclick="saveRelevamiento()" class="w-full bg-slate-800 text-white p-4 rounded-xl font-black uppercase text-xs shadow">Actualizar Datos</button>
            </div>
        </div>

        <div id="sec-extintores" class="hidden space-y-4 px-1">
            <select id="e-edif" onchange="loadExtintores()" class="w-full p-4 border-2 border-slate-200 rounded-xl text-xs font-black bg-white outline-none focus:border-[#f06423]"></select>
            <div id="ext-lista" class="grid grid-cols-1 gap-2"></div>
        </div>

        <div id="sec-historial" class="hidden space-y-4 px-1">
            <div id="historial-container" class="space-y-2"></div>
        </div>

    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbyALUU--qMV981OYeLVJHRQLBhuF3rNqxjA9na1oGfDcbP4KxuUrpcWSPvEEHzq7w7a/exec"; 
        const PIN_CORRECTO = "4370";
        let dbU = [], dbM = {}, cesta = [];

        function showL(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }
        
        window.onload = () => { 
            const hoy = new Date();
            document.getElementById('fecha-actual').innerText = hoy.toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' }).toUpperCase();
            if(localStorage.getItem('sgm_session') === PIN_CORRECTO) loginExitoso(); 
        };
        
        function verificarAcceso() { 
            if(document.getElementById('pin-input').value === PIN_CORRECTO) { 
                localStorage.setItem('sgm_session', PIN_CORRECTO); 
                loginExitoso(); 
            } else { alert("PIN Incorrecto"); }
        }

        function loginExitoso() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            init();
        }

        async function init() {
            showL(true);
            try {
                const eds = await fetch(`${URL}?action=getEdificios&token=${PIN_CORRECTO}`).then(r=>r.json());
                const optEdif = '<option value="">Edificio...</option>' + eds.map(e=>`<option value="${e}">${e}</option>`).join("");
                ['n-edif', 'r-edif', 'e-edif'].forEach(id => document.getElementById(id).innerHTML = optEdif);
                
                dbM = await fetch(`${URL}?action=getMateriales&token=${PIN_CORRECTO}`).then(r=>r.json());
                document.getElementById('m-rub').innerHTML = '<option value="">1. Rubro...</option>' + Object.keys(dbM).map(x=>`<option value="${x}">${x}</option>`).join("");
                
                const abiertas = await fetch(`${URL}?action=getAbiertas&token=${PIN_CORRECTO}`).then(r=>r.json());
                document.getElementById('dash-ot').innerText = abiertas.length;
                document.getElementById('dash-sec').innerText = eds.length;
            } catch(e) { console.error(e); }
            showL(false);
        }

        function tab(t) {
            ['nueva','pendientes','relev','extintores','historial'].forEach(s => {
                document.getElementById('sec-'+s).classList.add('hidden');
                document.getElementById('btn-'+s).classList.remove('tab-active');
                document.getElementById('btn-'+s).classList.add('text-slate-400');
            });
            document.getElementById('sec-'+t).classList.remove('hidden');
            document.getElementById('btn-'+t).classList.add('tab-active');
            if(t==='pendientes') loadAbiertas();
            if(t==='historial') loadHistorial();
        }

        // --- LÓGICA DE CARGA DE ÓRDENES ABIERTAS (CORREGIDA) ---
        async function loadAbiertas() { 
            showL(true); 
            try {
                const d = await fetch(`${URL}?action=getAbiertas&token=${PIN_CORRECTO}`).then(r=>r.json()); 
                const select = document.getElementById('c-lista');
                
                select.innerHTML = '<option value="">Seleccione OT a Cerrar...</option>';
                
                d.forEach(o => {
                    // 1. Identificador
                    const id = o.id || o.numero || "S/N";
                    
                    // 2. Ubicación (buscamos en varias posibles propiedades)
                    let ubi = o.ubi || o.ubicacion || o.lugar || "";
                    if (!ubi || ubi === "undefined") ubi = o.edificio || "Sin Ubicación";
                    
                    // 3. Descripción
                    let desc = o.detalle || o.descripcion || o.tarea || "";
                    if (!desc || desc === "undefined") desc = "Sin detalles";
                    
                    // 4. Formateo de Fecha (Extraemos solo DD/MM)
                    let fechaStr = "S/F";
                    if (o.fecha) {
                        try {
                            const f = new Date(o.fecha);
                            if (!isNaN(f.getTime())) {
                                fechaStr = f.toLocaleDateString('es-AR', {day:'2-digit', month:'2-digit'});
                            } else {
                                // Si es un string directo tipo "2026-03-27"
                                const partes = o.fecha.split(/[-/T ]/);
                                if (partes.length >= 3) fechaStr = `${partes[2]}/${partes[1]}`;
                            }
                        } catch(e) {}
                    }
                    
                    const option = document.createElement('option');
                    option.value = id;
                    option.textContent = `#${id} (${fechaStr}) - ${ubi} - ${desc}`;
                    select.appendChild(option);
                });
            } catch(e) { console.error("Error al cargar abiertas:", e); }
            showL(false); 
        }

        // --- FUNCIONES DE SOPORTE ---
        function loadG() { const r = document.getElementById('m-rub').value; document.getElementById('m-gru').innerHTML = '<option value="">2. Grupo...</option>' + Object.keys(dbM[r]).map(x=>`<option value="${x}">${x}</option>`).join(""); document.getElementById('m-gru').disabled = false; }
        function loadI() { const r = document.getElementById('m-rub').value, g = document.getElementById('m-gru').value; document.getElementById('m-ite').innerHTML = '<option value="">3. Item...</option>' + dbM[r][g].map(x=>`<option value='${JSON.stringify(x)}'>${x.nombre} (Stock: ${x.stock})</option>`).join(""); document.getElementById('m-ite').disabled = false; }
        function addItem() { const it = JSON.parse(document.getElementById('m-ite').value); cesta.push({nombre: it.nombre, cantidad: document.getElementById('m-cant').value, hoja: it.hoja}); renderCesta(); }
        function renderCesta() { document.getElementById('cesta').innerHTML = cesta.map((x,i)=>`<div class="flex justify-between bg-slate-800 text-white p-3 rounded-lg text-[10px] mb-2 font-bold"><span>${x.cantidad} x ${x.nombre}</span><button onclick="cesta.splice(${i},1);renderCesta()" class="text-red-400">X</button></div>`).join(""); }
        
        async function cerrarOT() { 
            const id = document.getElementById('c-lista').value;
            if(!id) return alert("Seleccione una orden");
            showL(true); 
            await fetch(URL, {method:'POST', body: JSON.stringify({ action:'cerrarOT', token:PIN_CORRECTO, idOT:id, materialesUsados:cesta.map(x=>`${x.cantidad} ${x.nombre}`).join(", "), listaParaDescontar:cesta, comentarioFinal:document.getElementById('c-obs').value })}); 
            location.reload(); 
        }

        async function loadCascada(eI, sI, uI) { const ed = document.getElementById(eI).value; showL(true); dbU = await fetch(`${URL}?action=getSectores&edificio=${encodeURIComponent(ed)}&token=${PIN_CORRECTO}`).then(r=>r.json()); document.getElementById(sI).innerHTML = '<option value="">Sector...</option>' + [...new Set(dbU.map(x=>x.sector))].map(s=>`<option value="${s}">${s}</option>`).join(""); document.getElementById(sI).disabled = false; showL(false); }
        function filterUbi(sI, uI) { const s = document.getElementById(sI).value; document.getElementById(uI).innerHTML = '<option value="">Ubi...</option>' + dbU.filter(x=>x.sector===s).map(x=>`<option value='${JSON.stringify(x)}'>${x.ubi}</option>`).join(""); document.getElementById(uI).disabled = false; }
        function autoFill() { const d = JSON.parse(document.getElementById('n-ubi').value); document.getElementById('n-inv').value = d.inv_aire||"N/A"; document.getElementById('n-eq').value = d.eq_aire||"N/A"; }
        function checkRefrig() { document.getElementById('div-refrig').classList.toggle('hidden', document.getElementById('n-rubro').value !== "Refrigeración"); }
        
        async function saveOT() { 
            const uValue = document.getElementById('n-ubi').value;
            if(!uValue) return alert("Seleccione ubicación");
            const u = JSON.parse(uValue); 
            showL(true); 
            try {
                await fetch(URL, {method:'POST', body: JSON.stringify({ action:'nuevaOT', token:PIN_CORRECTO, tipo:document.getElementById('n-tipo').value, especialidad:document.getElementById('n-rubro').value, edificio:document.getElementById('n-edif').value, sector:u.sector, ubicacion:u.ubi, nInventario:document.getElementById('n-inv').value, equipo:document.getElementById('n-eq').value, reportadoPor:document.getElementById('n-rep').value, personal:document.getElementById('n-tec').value, descripcion:document.getElementById('n-desc').value })}); 
                location.reload(); 
            } catch(e) { alert("Error"); showL(false); }
        }
    </script>
</body>
</html>
