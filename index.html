<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión OT 2026 - Formulario Completo</title>
    <style>
        :root { --primary: #0056b3; --secondary: #6c757d; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; max-width: 850px; margin: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; border-bottom: 3px solid var(--primary); padding-bottom: 15px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9em; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .full-width { grid-column: span 2; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1.1em; margin-top: 20px; }
        .btn-save:disabled { background: #ccc; }
        .loading-text { color: var(--primary); font-size: 0.8em; font-style: italic; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Orden de Trabajo 2026</h2>
    
    <form id="otForm">
        <div class="grid">
            <div class="form-group">
                <label>ESPECIALIDAD</label>
                <select id="especialidad">
                    <option value="Electricidad">Electricidad</option>
                    <option value="Refrigeración">Refrigeración</option>
                    <option value="Herrería y Gral">Herrería y Gral</option>
                    <option value="HySL">HySL</option>
                </select>
            </div>

            <div class="form-group">
                <label>PERSONAL ASIGNADO</label>
                <select id="personal">
                    <option value="GLA">GLA (Electricidad)</option>
                    <option value="DSF">DSF (Refrigeración)</option>
                    <option value="RRG">RRG (General)</option>
                    <option value="MAP">MAP (Conducción)</option>
                    <option value="SDB">SDB (HySL)</option>
                </select>
            </div>

            <div class="form-group">
                <label>EDIFICIO</label>
                <select id="edificio" onchange="cargarDatosEdificio()" required>
                    <option value="">-- Seleccione Edificio --</option>
                    <option value="Edificio Principal">Edificio Principal</option>
                    <option value="Edificio IEM">Edificio IEM</option>
                    <option value="Lab de Aerodinamica">Lab de Aerodinamica</option>
                    <option value="Departamento de Geociencias">Departamento de Geociencias</option>
                    <option value="Departamento de Hidraulica">Departamento de Hidraulica</option>
                </select>
                <div id="loader" class="loading-text">Cargando sectores...</div>
            </div>

            <div class="form-group">
                <label>SUB-ÁREA / PISO (Ubicación)</label>
                <select id="subarea" onchange="filtrarLocales()" disabled>
                    <option value="">Primero elija edificio</option>
                </select>
            </div>

            <div class="form-group">
                <label>LOCAL ESPECÍFICO (Sector)</label>
                <select id="sector" onchange="actualizarEquipo()" disabled>
                    <option value="">Primero elija sub-área</option>
                </select>
            </div>

            <div class="form-group">
                <label>EQUIPO (AIRE ACONDICIONADO)</label>
                <select id="equipo" onchange="actualizarInventario()">
                    <option value="">-- Seleccione Aire --</option>
                </select>
            </div>

            <div class="form-group">
                <label>N° INVENTARIO</label>
                <input type="text" id="nInventario" readonly style="background:#f0f0f0;" placeholder="Carga automática">
            </div>

            <div class="form-group">
                <label>ESTADO DE LA OT</label>
                <select id="estado">
                    <option value="Abierta">Abierta / En Proceso</option>
                    <option value="Cerrada">Cerrada / Finalizada</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label>ESPECIFICACIÓN DE UBICACIÓN / REFERENCIAS</label>
                <input type="text" id="ubicacionDetalle" placeholder="Ej: Cerca de la puerta, arriba del escritorio...">
            </div>

            <div class="form-group full-width">
                <label>DESCRIPCIÓN DEL TRABAJO O PROBLEMA</label>
                <textarea id="descripcion" rows="4" required></textarea>
            </div>
        </div>

        <button type="submit" id="btnSave" class="btn-save">GUARDAR ORDEN DE TRABAJO</button>
    </form>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzb9Yy7Vto-gUM6AqM00DSJeIukKIEj7-CIUGAh96d6IoTXKVVOEW9jZXPA9RoEisIl/exec'; // <--- PEGA AQUÍ TU URL /EXEC
    let datosCompletos = [];

    async function cargarDatosEdificio() {
        const edif = document.getElementById('edificio').value;
        const subSelect = document.getElementById('subarea');
        const loader = document.getElementById('loader');
        if(!edif) return;

        loader.style.display = 'block';
        subSelect.disabled = true;

        try {
            const res = await fetch(`${WEB_APP_URL}?action=getSectores&edificio=${encodeURIComponent(edif)}`);
            datosCompletos = await res.json();

            const subareas = [...new Set(datosCompletos.map(item => item.ubicacion))];
            subSelect.innerHTML = '<option value="">-- Seleccione Sub-área --</option>';
            subareas.forEach(s => {
                let op = document.createElement('option');
                op.value = s; op.text = s;
                subSelect.appendChild(op);
            });
            subSelect.disabled = false;
        } catch(e) { alert("Error al cargar datos del edificio"); }
        loader.style.display = 'none';
    }

    function filtrarLocales() {
        const sub = document.getElementById('subarea').value;
        const locSelect = document.getElementById('sector');
        locSelect.innerHTML = '<option value="">-- Seleccione Local --</option>';
        
        const locales = datosCompletos.filter(item => item.ubicacion === sub);
        const localesUnicos = [...new Set(locales.map(l => l.sector))];

        localesUnicos.forEach(l => {
            let op = document.createElement('option');
            op.value = l; op.text = l;
            locSelect.appendChild(op);
        });
        locSelect.disabled = false;
    }

    function actualizarEquipo() {
        const localNom = document.getElementById('sector').value;
        const eqSelect = document.getElementById('equipo');
        eqSelect.innerHTML = '<option value="">-- Seleccione Aire --</option>';

        const aires = datosCompletos.filter(item => item.sector === localNom);
        aires.forEach(a => {
            if(a.equipo && a.equipo !== "n/c" && a.equipo !== "cargar") {
                let op = document.createElement('option');
                op.value = a.equipo; op.text = a.equipo;
                op.dataset.inv = a.inventario;
                eqSelect.appendChild(op);
            }
        });
        if(eqSelect.options.length === 1) {
            let op = document.createElement('option');
            op.value = "General"; op.text = "Sin equipo específico";
            eqSelect.appendChild(op);
        }
    }

    function actualizarInventario() {
        const eq = document.getElementById('equipo');
        const inv = document.getElementById('nInventario');
        inv.value = eq.options[eq.selectedIndex].dataset.inv || "";
    }

    document.getElementById('otForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSave');
        btn.disabled = true;
        btn.innerText = "REGISTRANDO...";

        const data = {
            edificio: document.getElementById('edificio').value,
            sector: document.getElementById('sector').value,
            equipo: document.getElementById('equipo').value,
            nInventario: document.getElementById('nInventario').value,
            especialidad: document.getElementById('especialidad').value,
            personal: document.getElementById('personal').value,
            descripcion: document.getElementById('descripcion').value,
            ubicacionDetalle: document.getElementById('ubicacionDetalle').value,
            estado: document.getElementById('estado').value
        };

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            });
            alert("¡OT REGISTRADA CON ÉXITO!");
            location.reload(); 
        } catch(e) {
            alert("Error al guardar");
            btn.disabled = false;
            btn.innerText = "GUARDAR ORDEN DE TRABAJO";
        }
    };
</script>
</body>
</html>
